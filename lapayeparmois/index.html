function openWorkerModal(id=''){let old=id?workerById(id):null;let isEdit=!!old;openModal(isEdit?'تعديل عامل':'إضافة عامل',`<div class="notice ${isEdit?'blue':'green'}">${isEdit?'تاريخ الدخول لا يعدل هنا. لتغيير الاستحقاق استعمل زر توحيد تاريخ الاستحقاق.':'تاريخ الدخول يصبح تاريخ الاستحقاق الأول. يمنع التسجيل في 29 أو 30 أو 31.'}</div><form id="workerForm"><div class="form-grid"><div class="field"><label>الاسم واللقب *</label><input name="name" required value="${esc(old?.name||'')}"></div><div class="field"><label>تاريخ الدخول *</label><input name="startDate" type="date" required ${isEdit?'disabled':''} value="${esc(old?.startDate||today())}"></div><div class="field"><label>الراتب الشهري *</label><input name="salary" type="number" min="0" step="0.01" required value="${esc(old?.salary||'')}"></div><div class="field"><label>الصفة / الآلة</label><input name="type" value="${esc(old?.type||'')}"></div><div class="field"><label>الهاتف</label><input name="phone" value="${esc(old?.phone||'')}"></div><div class="field"><label>رقم الهوية</label><input name="idNumber" value="${esc(old?.idNumber||'')}"></div></div><div class="modal-actions"><button type="button" class="btn" onclick="closeModal()">إلغاء</button><button class="btn primary">💾 حفظ</button></div></form>`);$('#workerForm').onsubmit=e=>{e.preventDefault();let f=new FormData(e.target),start=old?.startDate||f.get('startDate');let day=Number(String(start).slice(-2));if(!isEdit&&(day>=29||day<=0)){toast('لا يسمح بإدخال عامل بتاريخ 29 أو 30 أو 31.','err');return;}let w=old?clone(old):{workerId:uid('WRK'),initialPayday:day,payday:day,paydayHistory:[],createdAt:now(),revision:1,status:'active'};Object.assign(w,{name:cleanText(f.get('name')),startDate:start,salary:Number(f.get('salary')||0),type:cleanText(f.get('type')),phone:cleanText(f.get('phone')),idNumber:cleanText(f.get('idNumber')),updatedAt:now()});saveWorker(w);closeModal();toast('تم حفظ العامل.');};}
function cyclesSelect(w,selected=''){let cs=normalCycles(w,w.exitDate||addDays(today(),70));return cs.map(c=>`<option value="${c.cycleId}" ${c.cycleId===selected?'selected':''}>${dateAr(c.startDate)} → ${dateAr(c.endDate)}</option>`).join('');}
function openOperationModal(id=''){let old=id?txById(id):null;let workers=sortedWorkers(false);if(!workers.length){toast('أضف عاملاً أولاً.','warn');return;}let wopts=workers.map(w=>`<option value="${esc(w.workerId)}" ${old?.workerId===w.workerId?'selected':''}>${esc(w.name)} — ${esc(w.workerId)}</option>`).join('');let types=['advance','overtime','bonus','absence','debt','debt_payment'];openModal(old?'تعديل عملية':'عملية جديدة',`<div class="notice blue">الحساب لا يعتمد على الاسم؛ العملية مرتبطة بـ workerId وtransactionId. تعديل عملية موجودة يولد حدث مراجعة جديداً مع نفس ID.</div><form id="opForm"><div class="form-grid"><div class="field"><label>العامل *</label><select name="workerId" id="opWorker">${wopts}</select></div><div class="field"><label>نوع العملية *</label><select name="type" id="opType">${types.map(t=>`<option value="${t}" ${old?.type===t?'selected':''}>${typeLabel(t)}</option>`).join('')}</select></div><div class="field"><label>تاريخ الدفع / العملية *</label><input name="effectiveDate" type="date" value="${esc(old?.effectiveDate||today())}" required></div><div class="field"><label>المبلغ *</label><input name="amount" type="number" min="0" step="0.01" value="${esc(old?.grossAmount??old?.amount??'')}" required></div></div><div id="opExtra" style="margin-top:11px"></div><div class="field" style="margin-top:11px"><label>ملاحظة</label><textarea name="note">${esc(old?.note||'')}</textarea></div><div class="modal-actions"><button type="button" class="btn" onclick="closeModal()">إلغاء</button><button class="btn primary">💾 حفظ العملية</button></div></form>`);
 function draw(){let type=$('#opType').value;let x=old||{};let html='';if(type==='advance'){let w=workerById($('#opWorker').value);html=`<div class="form-grid"><div class="field"><label>الدورة المالكة للتسبيق</label><select name="cycleId" id="opCycle"><option value="">تحديد تلقائي حسب تاريخ العملية</option>${w?cyclesSelect(w,x.ownership?.cycleId||''):''}</select></div><div class="field"><label>قسط دين داخل التسبيق</label><input name="debtInstallment" type="number" min="0" step="0.01" value="${esc(x.debtInstallment||0)}"></div><div class="field"><label>الدين المعني (اختياري)</label><select name="debtId">${debtOptions(w,x.debtId||x.debtLegacyId||'')}</select></div></div><div class="notice green" style="margin-top:10px">مثال: تسبيق 15 000، قسط دين 5 000 ⇒ التسبيق المحاسبي 15 000، النقد للعامل 10 000، وقسط الدين لا يخصم مرة ثانية.</div>`;}
 if(type==='overtime'){html=`<div class="form-grid"><div class="field"><label>عدد الساعات</label><input name="hours" type="number" min="0" step="0.25" value="${esc(x.hours||'')}"></div><div class="field"><label>هل سُددت خارج هذه التصفية؟</label><select name="paid"><option value="false" ${!x.paid?'selected':''}>لا، تظهر كمستحق</option><option value="true" ${x.paid?'selected':''}>نعم، سُددت</option></select></div></div>`;}
 if(type==='bonus'){html=`<div class="field"><label>هل سُددت المكافأة؟</label><select name="paid"><option value="false" ${!x.paid?'selected':''}>لا، تظهر كمستحق</option><option value="true" ${x.paid?'selected':''}>نعم، سُددت</option></select></div>`;}
 if(type==='absence'){html=`<div class="field"><label>عدد أيام الغياب</label><input name="days" type="number" min="0" step="0.5" value="${esc(x.days||'')}"></div><div class="notice amber" style="margin-top:10px">الخصم من الغياب يطبق أولاً على الساعات، ثم المكافآت، ثم الراتب الأساسي داخل نفس الدورة.</div>`;}
 if(type==='debt'){html=`<div class="form-grid"><div class="field"><label>قسط تلقائي مفعل</label><select name="autoInstallment"><option value="false" ${!x.autoInstallment?'selected':''}>غير مفعل</option><option value="true" ${x.autoInstallment?'selected':''}>مفعل — يسجل يدوياً عند الاستحقاق</option></select></div><div class="field"><label>قيمة القسط</label><input name="installmentAmount" type="number" min="0" step="0.01" value="${esc(x.installmentAmount||'')}"></div></div>`;}
 if(type==='debt_payment'){let w=workerById($('#opWorker').value);html=`<div class="form-grid"><div class="field"><label>الدين المعني</label><select name="debtId">${debtOptions(w,x.debtId||x.debtLegacyId||'')}</select></div><div class="field"><label>طريقة التسديد</label><select name="paymentMethod"><option value="cash_return" ${(x.paymentMethod||'cash_return')==='cash_return'?'selected':''}>نقداً للمؤسسة</option><option value="income_deduction" ${x.paymentMethod==='income_deduction'?'selected':''}>خصم من مستحقات الدورة</option></select></div></div>`;}
 $('#opExtra').innerHTML=html; }
 $('#opType').onchange=draw;$('#opWorker').onchange=draw;draw();
 $('#opForm').onsubmit=e=>{e.preventDefault();let f=new FormData(e.target),type=f.get('type'),worker=workerById(f.get('workerId'));if(!worker)return;let amount=Number(f.get('amount')||0);if(amount<0){toast('المبلغ غير صالح.','err');return;}let t=old?clone(old):{transactionId:uid('TX'),createdAt:now(),revision:1,status:'active'};Object.assign(t,{type,workerId:worker.workerId,effectiveDate:f.get('effectiveDate'),enteredAt:old?.enteredAt||now(),note:cleanText(f.get('note')),updatedAt:now(),by:state.settings.userName||''});
 delete t.grossAmount;delete t.cashPaid;delete t.debtInstallment;delete t.hours;delete t.days;delete t.installmentAmount;delete t.autoInstallment;delete t.paymentMethod;delete t.debtId;delete t.ownership;
 if(type==='advance'){let di=Math.min(amount,Number(f.get('debtInstallment')||0));t.grossAmount=amount;t.debtInstallment=di;t.cashPaid=amount-di;t.debtId=f.get('debtId')||'';let selected=f.get('cycleId');let c=selected?normalCycles(worker,addDays(today(),90)).find(x=>x.cycleId===selected):findCycleForDate(worker,t.effectiveDate);if(c)t.ownership={cycleStart:c.startDate,cycleEnd:c.endDate,cycleId:c.cycleId};if(di>0&&t.debtId){let prior=activeTx().find(x=>x.type==='debt_payment'&&x.linkedAdvanceId===t.transactionId);let pay=prior?clone(prior):{transactionId:uid('TX'),createdAt:now(),revision:1,status:'active'};Object.assign(pay,{type:'debt_payment',workerId:worker.workerId,effectiveDate:t.effectiveDate,enteredAt:now(),amount:di,debtId:t.debtId,paymentMethod:'advance_deduction',linkedAdvanceId:t.transactionId,reducesIncome:false,note:'قسط دين داخل التسبيق '+t.transactionId,by:state.settings.userName||'',updatedAt:now()});saveTransaction(t);saveTransaction(pay);closeModal();toast('تم حفظ التسبيق والقسط المرتبط به دون احتساب مزدوج.');return;}}
 else if(type==='overtime'){t.amount=amount;t.hours=Number(f.get('hours')||0);t.paid=f.get('paid')==='true';}
 else if(type==='bonus'){t.amount=amount;t.paid=f.get('paid')==='true';}
 else if(type==='absence'){t.amount=amount;t.days=Number(f.get('days')||0);}
 else if(type==='debt'){t.amount=amount;t.autoInstallment=f.get('autoInstallment')==='true';t.installmentAmount=Number(f.get('installmentAmount')||0);}
 else if(type==='debt_payment'){t.amount=amount;t.debtId=f.get('debtId')||'';t.paymentMethod=f.get('paymentMethod')||'cash_return';t.reducesIncome=t.paymentMethod==='income_deduction';}
 if(old?.legacySection)t.legacyModified=true;saveTransaction(t);closeModal();toast('تم حفظ العملية.');};}
function debtOptions(w,selected){let ds=activeTx().filter(t=>t.workerId===w?.workerId&&t.type==='debt');return '<option value="">— اختر الدين —</option>'+ds.map(t=>`<option value="${esc(t.transactionId)}" ${selected===t.transactionId||selected===t.legacyId?'selected':''}>${money(t.amount)} · ${esc(t.transactionId)}</option>`).join('');}
function confirmDeleteTx(id){let t=txById(id);openModal('حذف عملية',`<div class="notice red">لن تُحذف العملية نهائياً. تتحول إلى سجل محذوف ولا يمكن استرجاعها إلا من الإعدادات بعد إدخال ID نفسه.</div><p><b>${typeLabel(t.type)}</b> — ${money(t.grossAmount??t.amount??0)}</p><div class="keybox">${esc(id)}</div><div class="field" style="margin-top:12px"><label>سبب الحذف</label><input id="deleteReason" placeholder="مثال: إدخال مكرر"></div><div class="modal-actions"><button class="btn" onclick="closeModal()">إلغاء</button><button class="btn danger" onclick="doDeleteTx('${id}')">حذف مع حفظ الأثر</button></div>`);}

function openPaydayChange(workerId){let w=workerById(workerId),ref=today(),oldCycle=findCycleForDate(w,ref);if(!oldCycle){toast('تعذر تحديد الدورة الحالية.','err');return;}openModal('توحيد تاريخ الاستحقاق',`<div class="notice blue">لا يتغير تاريخ الدخول الحقيقي ولا الدورات المغلقة. تنشأ تسوية انتقالية مستقلة للأجر الأساسي فقط؛ الساعات والغيابات والمكافآت والديون والتسبيقات تنتقل لأول دورة جديدة.</div><p>العامل: <b>${esc(w.name)}</b><br>الاستحقاق الحالي: يوم <b>${currentPhase(w,ref).payday}</b><br>آخر دورة قديمة: <b>${dateAr(oldCycle.startDate)} → ${dateAr(oldCycle.endDate)}</b></p><div class="field"><label>يوم الاستحقاق الجديد (1 إلى 28)</label><input id="newPayday" type="number" min="1" max="28" value="${w.payday}"></div><div id="transitionPreview" class="notice green" style="margin-top:12px"></div><div class="modal-actions"><button class="btn" onclick="closeModal()">إلغاء</button><button class="btn primary" onclick="confirmPaydayChange('${workerId}','${oldCycle.startDate}','${oldCycle.endDate}')">تأكيد التسوية والتحويل</button></div>`);let inp=$('#newPayday');inp.oninput=()=>previewPaydayChange(w,oldCycle,Number(inp.value));previewPaydayChange(w,oldCycle,Number(inp.value));}
function computePaydayTransition(w,lastCycle,newPayday){if(!validPayday(newPayday))throw new Error('يوم الاستحقاق يجب أن يكون بين 1 و28.');if(Number(newPayday)===Number(w.payday))throw new Error('يوم الاستحقاق الجديد مطابق للاستحقاق الحالي.');let transitionStart=addDays(lastCycle.endDate,1);let d=dateObj(transitionStart),y=d.getFullYear(),m=d.getMonth();let candidate=`${y}-${String(m+1).padStart(2,'0')}-${String(Math.min(newPayday,new Date(y,m+1,0).getDate())).padStart(2,'0')}`;if(candidate<transitionStart){let nd=new Date(y,m+1,1);candidate=`${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,'0')}-${String(Math.min(newPayday,new Date(nd.getFullYear(),nd.getMonth()+1,0).getDate())).padStart(2,'0')}`;}let transitionEnd=addDays(candidate,-1);let days=transitionEnd>=transitionStart?diffDays(transitionStart,transitionEnd)+1:0;return {transitionStart,transitionEnd,newCycleStart:candidate,days,amount:(Number(w.salary)||0)/30*days};}
function previewPaydayChange(w,lastCycle,newDay){let out=$('#transitionPreview');try{let x=computePaydayTransition(w,lastCycle,newDay);out.innerHTML=`<b>تسوية انتقال الاستحقاق</b><br>${dateAr(x.transitionStart)} → ${dateAr(x.transitionEnd)} · ${x.days} يوم · <b>${money(x.amount)}</b><br><span class="small-note">أول دورة جديدة: ${dateAr(x.newCycleStart)} → ${dateAr(addDays(addMonths(x.newCycleStart,1),-1))}</span>`;}catch(e){out.className='notice red';out.textContent=e.message;}}
function confirmPaydayChange(workerId,oldStart,oldEnd){let w=workerById(workerId),newDay=Number($('#newPayday').value),last={startDate:oldStart,endDate:oldEnd};let x;try{x=computePaydayTransition(w,last,newDay);}catch(e){toast(e.message,'err');return;}let tx={transactionId:uid('TX'),type:'transition_wage',workerId:w.workerId,effectiveDate:x.transitionStart,enteredAt:now(),startDate:x.transitionStart,endDate:x.transitionEnd,days:x.days,amount:x.amount,note:`تسوية تغيير الاستحقاق من يوم ${w.payday} إلى يوم ${newDay}`,status:'active',revision:1,createdAt:now(),by:state.settings.userName||''};commit('worker.payday_change',{workerId:w.workerId,newPayday:newDay,effectiveFrom:x.newCycleStart,transitionTransaction:tx},'worker:'+w.workerId);closeModal();toast('تم تغيير الاستحقاق وتسجيل تسوية انتقال مستقلة.');}

function downloadFile(name,text,type='application/json;charset=utf-8'){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},1000);}
function exportState(){let out=clone(state);if(out.settings?.sync){delete out.settings.sync._rememberedPassphrase;}return out;}
function downloadJsonBackup(){downloadFile('EGTPH_clean_backup_'+today()+'.json',JSON.stringify(exportState(),null,2));toast('تم تنزيل النسخة الاحتياطية JSON.');}
function downloadPortableHtml(){let html=document.documentElement.outerHTML.replace(/window\.__EGTPH_CLEAN_SEED__\s*=\s*[\s\S]*?;\/\*EGTPH_CLEAN_SEED_MARKER\*\//,'window.__EGTPH_CLEAN_SEED__='+JSON.stringify(exportState()).replace(/<\//g,'<\\/')+';/*EGTPH_CLEAN_SEED_MARKER*/');downloadFile('EGTPH_clean_portable_'+today()+'.html',html,'text/html;charset=utf-8');toast('تم تنزيل HTML محمول بكل البيانات الحالية.');}
function importJsonFile(e){let f=e.target.files?.[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let incoming=JSON.parse(r.result);if(!incoming.workers||!incoming.transactions)throw new Error('الملف لا يحمل بنية النسخة النظيفة.');openModal('تأكيد استيراد النسخة',`<div class="notice red">سيتم استبدال البيانات المحلية الحالية بهذه النسخة. Firebase لا يتغير حتى تضغط مزامنة بنفسك بعد الاستيراد.</div><p>عمال: <b>${Object.keys(incoming.workers||{}).length}</b> · عمليات: <b>${Object.keys(incoming.transactions||{}).length}</b></p><div class="modal-actions"><button class="btn" onclick="closeModal()">إلغاء</button><button class="btn danger" onclick="confirmImport()">استبدال المخزن المحلي</button></div>`);window.__importCandidate=incoming;}catch(err){toast('تعذر قراءة الملف: '+err.message,'err');}};r.readAsText(f);}
function confirmImport(){state=window.__importCandidate;normalizeState();persist(true);closeModal();renderAll();toast('تم استيراد البيانات محلياً. راجعها ثم شغل المزامنة يدوياً.','warn');}

// ── Firebase REST + encrypted immutable event sync ──
function base64Encode(bytes){let s='';bytes.forEach(b=>s+=String.fromCharCode(b));return btoa(s);}function base64Decode(s){let b=atob(s),a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a;}
async function deriveKey(pass,workspace){let material=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:new TextEncoder().encode('EGTPH-CLEAN|'+workspace),iterations:150000,hash:'SHA-256'},material,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}
async function encryptEvent(evt){let s=state.settings.sync;if(!s.encrypt)return {encrypted:false,event:evt};if(!session.passphrase)throw new Error('أدخل عبارة التشفير للمزامنة.');let key=await deriveKey(session.passphrase,s.workspaceKey),iv=crypto.getRandomValues(new Uint8Array(12)),plain=new TextEncoder().encode(JSON.stringify(evt)),cipher=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,plain);return {encrypted:true,iv:base64Encode(iv),cipher:base64Encode(new Uint8Array(cipher)),at:evt.at,deviceId:evt.deviceId};}
async function decryptEvent(record){if(!record)return null;if(!record.encrypted)return record.event||record;if(!session.passphrase)throw new Error('عبارة التشفير مطلوبة لقراءة أحداث السحابة.');let key=await deriveKey(session.passphrase,state.settings.sync.workspaceKey),plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:base64Decode(record.iv)},key,base64Decode(record.cipher));return JSON.parse(new TextDecoder().decode(plain));}
function syncConfigValid(){let s=state.settings.sync;return !!(s.databaseURL&&s.apiKey&&s.email&&s.workspaceKey&&(!s.encrypt||session.passphrase));}
function normalizedDbUrl(){return cleanText(state.settings.sync.databaseURL).replace(/\/+$/,'');}
async function firebaseToken(){let s=state.settings.sync;if(session.idToken&&Date.now()<session.tokenExpiry-60000)return session.idToken;if(!session.firebasePassword)throw new Error('أدخل كلمة مرور Firebase لهذه الجلسة.');let r=await fetch('https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key='+encodeURIComponent(s.apiKey),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:s.email,password:session.firebasePassword,returnSecureToken:true})});let j=await r.json();if(!r.ok)throw new Error(j?.error?.message||'فشل تسجيل Firebase Authentication');session.idToken=j.idToken;session.tokenExpiry=Date.now()+Number(j.expiresIn||3600)*1000;return j.idToken;}
async function firebaseFetch(path,opts={}){let token=await firebaseToken(),url=normalizedDbUrl()+'/egtphCleanV1/workspaces/'+encodeURIComponent(state.settings.sync.workspaceKey)+'/events'+path+'.json?auth='+encodeURIComponent(token);let r=await fetch(url,opts);if(!r.ok){let text=await r.text();throw new Error('Firebase '+r.status+' '+text.slice(0,140));}return r;}
async function saveSyncConfig(){let s=state.settings.sync;s.databaseURL=cleanText($('#syncDbUrl').value);s.apiKey=cleanText($('#syncApiKey').value);s.email=cleanText($('#syncEmail').value);s.workspaceKey=cleanText($('#syncWorkspace').value);s.encrypt=$('#syncEncrypt').checked;s.auto=$('#syncAuto').checked;s.rememberPassphrase=$('#syncRemember').checked;session.firebasePassword=$('#syncPassword').value||session.firebasePassword;session.passphrase=$('#syncPassphrase').value||session.passphrase;if(s.rememberPassphrase&&session.passphrase)s._rememberedPassphrase=session.passphrase;else delete s._rememberedPassphrase;if(!/^[A-Za-z0-9_-]{12,120}$/.test(s.workspaceKey)){toast('مفتاح مساحة العمل يجب أن يكون 12 رمزاً أو أكثر، ويستعمل حروفاً وأرقاماً و _ أو - فقط.','err');return;}await persist(true);syncBadge();renderSettings();toast('تم حفظ إعدادات المزامنة على هذا الجهاز.');}
function generateWorkspaceKey(){let key='EGTPH-'+Array.from(crypto.getRandomValues(new Uint8Array(18))).map(n=>'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789'[n%57]).join('');$('#syncWorkspace').value=key;toast('تم توليد مفتاح مساحة العمل. احتفظ به ولا تشاركه إلا مع جهازك الآخر.');}
async function publishBootstrap(){try{await saveSyncConfig();if(!syncConfigValid())throw new Error('أكمل رابط قاعدة البيانات وAPI key والبريد وكلمة المرور وعبارة التشفير.');if(state.sync.bootstrapPublished){if(!confirm('تمت تهيئة السحابة سابقاً. هل تريد فقط إرسال ما هو جديد؟'))return;}let n=0;for(const w of Object.values(state.workers)){let key='worker:'+w.workerId;if(!state.sync.bootstrapPublished||!Object.values(state.sync.outbox).some(e=>e.entityKey===key)){let e=eventFor('worker.upsert',{worker:clone(w)},key,entityVersion(key));queueEvent(e);n++;}}
for(const t of Object.values(state.transactions)){let key='tx:'+t.transactionId;if(!state.sync.bootstrapPublished||!Object.values(state.sync.outbox).some(e=>e.entityKey===key)){let e=eventFor('tx.upsert',{transaction:clone(t),allowRestore:t.status!=='deleted'},key,entityVersion(key));queueEvent(e);n++;}}
for(const c of Object.values(state.cycleClosures)){let key='closure:'+c.cycleId;let e=eventFor('closure.upsert',{closure:clone(c)},key,entityVersion(key));queueEvent(e);n++;}state.sync.bootstrapPublished=true;await persist(true);await syncNow(true);toast('تمت تهيئة مساحة السحابة بـ '+n+' حدثاً مستقلاً.');}catch(e){state.sync.lastSyncMessage='خطأ: '+e.message;persist();syncBadge();toast(e.message,'err');}}
async function cloudPayloadForEvent(evt){if(evt._cloudPayload)return evt._cloudPayload;evt._cloudPayload=await encryptEvent(evt);await persist(true);return evt._cloudPayload;}
async function syncNow(manual=true){try{if(state.settings.sync._rememberedPassphrase&&!session.passphrase)session.passphrase=state.settings.sync._rememberedPassphrase;if(!syncConfigValid())throw new Error('أكمل إعدادات Firebase وأدخل كلمة المرور وعبارة التشفير.');if(!navigator.onLine)throw new Error('لا يوجد اتصال بالإنترنت. العمليات محفوظة محلياً بانتظار المزامنة.');let remote=await (await firebaseFetch('',{headers:{'Accept':'application/json'}})).json();let received=0;for(const [id,record] of Object.entries(remote||{})){if(state.sync.seenEvents[id])continue;let evt=await decryptEvent(record);if(evt?.eventId){applyEvent(evt,true);received++;}}
let sent=0;for(const evt of Object.values(state.sync.outbox)){let existing=await (await firebaseFetch('/'+encodeURIComponent(evt.eventId),{headers:{'Accept':'application/json'}})).json();if(existing){let remoteEvt=await decryptEvent(existing);if(remoteEvt?.eventId!==evt.eventId||remoteEvt?.hash!==evt.hash){state.sync.conflicts.unshift({conflictId:uid('CF'),at:now(),event:evt,reason:'حدث بنفس ID موجود في Firebase بمحتوى مختلف'});continue;}delete state.sync.outbox[evt.eventId];sent++;continue;}let payload=await cloudPayloadForEvent(evt);await firebaseFetch('/'+encodeURIComponent(evt.eventId),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});delete state.sync.outbox[evt.eventId];sent++;}
state.sync.lastSyncAt=now();state.sync.lastSyncMessage='مزامنة ناجحة: أرسل '+sent+' · استقبل '+received;await persist(true);renderAll();if(manual)toast(state.sync.lastSyncMessage);}catch(e){state.sync.lastSyncMessage='خطأ: '+e.message;await persist(true);syncBadge();if(manual)toast(e.message,'err');}}
setInterval(()=>{try{if(state?.settings?.sync?.auto&&Object.keys(state.sync.outbox||{}).length)syncNow(false);}catch(e){}},45000);
window.addEventListener('online',()=>{if(state?.settings?.sync?.auto)syncNow(false);});

// ── boot ──
(async function boot(){await loadState();if(state.settings.sync._rememberedPassphrase)session.passphrase=state.settings.sync._rememberedPassphrase;renderAll();if(state.settings.sync.auto&&state.settings.sync.databaseURL)syncNow(false);})();
</script>
</body></html>
