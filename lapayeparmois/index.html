    syncInFlight=true;
    try {
      const remote=await (await firebaseRequest("",{method:"GET"})).json();
      const beforeConflicts=S.conflicts.length;
      const received=mergeEvents(orderedRemoteEvents(remote));
      let sent=0;
      for(const event of [...S.outbox]) {
        const existing=await (await firebaseRequest(encodeURIComponent(event.eventId),{method:"GET"})).json();
        if(existing!==null){
          if(sameCloudEvent(existing,event)){ S.outbox=S.outbox.filter((x)=>x.eventId!==event.eventId); sent++; continue; }
          makeConflict({entityType:event.entityType,entityId:event.entityId,payload:event.payload,eventId:event.eventId},"eventId موجود في Firebase بمحتوى مختلف",null);
          S.outbox=S.outbox.filter((x)=>x.eventId!==event.eventId);

        await firebaseRequest(encodeURIComponent(event.eventId),{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(cloudRecord(event))});
        S.outbox=S.outbox.filter((x)=>x.eventId!==event.eventId);

      const stamp=nowMs();
      setSyncStatus(`متزامن: استلم ${received.applied} حدثاً وأرسل ${sent} حدثاً`,{at:stamp});
      audit("مزامنة Firebase",{details:`استلام ${received.applied}، إرسال ${sent}، تعارض ${S.conflicts.length-beforeConflicts+received.conflicted}`});
      saveState(); renderPage();
      if(manual) toast(`تمت المزامنة: ${received.applied} وارد، ${sent} صادر`,"success");
      return {received:received.applied,sent,conflicts:S.conflicts.length-beforeConflicts+received.conflicted};
    } catch(err) {

  function bindPage() {
    $("#main").onclick = handleAction;
    if (currentPage === "settlement") {
      $("#settlementWorker").onchange = showSettlement;
      $("#settlementMode").onchange = showSettlement;
    }
    if (currentPage === "print") {
      $("#printKind").onchange = handlePrintKind;
      $("#printWorker").onchange = populatePrintCycles;
      $("#printCycle").onchange = showPrintPreview;
    }

  async function handleAction(e) {
    const b = e.target.closest("[data-action]");
    if (!b) return;
    e.preventDefault();
    try {
      const a = b.dataset.action;
      if (a === "modal-close") closeModal();
      else if (a === "open-worker") openWorker();
      else if (a === "edit-worker") openWorker(b.dataset.worker);
      else if (a === "change-payday") openChangePayday(b.dataset.worker);
      else if (a === "exit-worker") openExitWorker(b.dataset.worker);
      else if (a === "worker-ledger") openWorkerLedger(b.dataset.worker);
      else if (a === "open-advance") openAdvance(b.dataset.worker || "");
      else if (a === "allocate-advance") openAllocateAdvance(b.dataset.id);
      else if (a === "open-overtime") openOvertime(b.dataset.worker || "");
      else if (a === "open-absence") openAbsence(b.dataset.worker || "");
      else if (a === "open-bonus") openBonus(b.dataset.worker || "");
      else if (a === "open-debt") openDebt(b.dataset.worker || "");
      else if (a === "open-installment") openInstallment(b.dataset.debt);
      else if (a === "debt-log") openDebtLog(b.dataset.debt);
      else if (a === "open-settlement") {
        go("settlement");
        setTimeout(() => {
          $("#settlementWorker").value = b.dataset.worker;
          showSettlement();
        }, 0);
      } else if (a === "record-payment")
        openSalaryPayment(b.dataset.worker, b.dataset.cycle);
      else if (a === "edit-tx") openEditTx(b.dataset.id);
      else if (a === "delete-tx") confirmDelete(b.dataset.id);
      else if (a === "restore-prompt") openRestore(b.dataset.id);
      else if (a === "run-search") runSearch();
      else if (a === "save-settings") saveSettingsUI();
      else if (a === "backup") doBackup();
      else if (a === "open-import") openImport();
      else if (a === "open-trash") go("trash");
      else if (a === "export-sync")
        downloadFile(
          `EGTPH_sync_events_${localToday()}.json`,
          "application/json",
          JSON.stringify(exportSyncBundle(), null, 2),
        );
      else if (a === "open-sync-import") openSyncImport();
      else if (a === "firebase-login-sync") openFirebaseLogin();
      else if (a === "firebase-sync-now") await syncNow(true);
      else if (a === "firebase-logout") await firebaseLogout();
      else if (a === "view-conflicts") openConflicts();
      else if (a === "add-holiday") addHolidayUI();
      else if (a === "remove-holiday") removeHolidayUI(Number(b.dataset.index));
      else if (a === "add-bonus-type") addBonusTypeUI();
      else if (a === "remove-bonus-type")
        removeBonusTypeUI(Number(b.dataset.index));
      else if (a === "resolve-conflict") {
        resolveConflict(b.dataset.id, b.dataset.choice);
        saveState();
        closeModal();
        renderPage();
        toast("تم حل التعارض", "success");
      } else if (a === "run-tests") showTestResults();
      else if (a === "print-report") printCurrentReport();
      else if (a === "share-report") shareCurrentReport();
    } catch (err) {
      console.error(err);
      toast(err.message || "حدث خطأ", "error");
    }
  }

      .filter((c) => !onlyPayable || cycleSummary(w, c).remaining > 0)

      fields = `<div class="form-grid"><div class="field"><label>التاريخ</label><input class="input" type="date" name="effectiveDate" value="${t.effectiveDate}"></div><div class="field"><label>المبلغ</label><input class="input" name="amount" value="${moneyMinorToInput(t.amountMinor)}"></div></div>`;
    else throw new Error("هذا النوع لا يعدل مباشرة");
    openModal(

  function settlementHtml(w, mode) {
    if (!w) return empty("💳", "اختر العامل");
    const result =
      mode === "final" ? finalSettlement(w) : temporarySettlement(w);
    const details = result.details || [];
    const rows = details.map((s) => ({ cycle: s.cycle, summary: s }));
    const pendingMinor = rows
      .filter((x) => cmpDate(x.cycle.cycleEnd, localToday()) < 0)
      .reduce((n, x) => n + Math.max(0, x.summary.remaining), 0);
    const current =
      rows.find((x) =>
        dateIn(localToday(), x.cycle.cycleStart, x.cycle.cycleEnd),
      )?.summary || null;
    const overtimeMinor = rows.reduce((n, x) => n + x.summary.overtime, 0);
    const bonusMinor = rows.reduce((n, x) => n + x.summary.bonus, 0);
    const deductionsMinor = rows.reduce(
      (n, x) =>
        n + x.summary.absence + x.summary.installments + x.summary.adjustMinus,
      0,
    );
    const advancesMinor = rows.reduce((n, x) => n + x.summary.advances, 0);
    const accountingAdvancesMinor = rows.reduce((n, x) => n + x.summary.accountingAdvances, 0);
    const fullDebtMinor = result.debtRemainingMinor || 0;
    const label =
      mode === "final" ? "التصفية النهائية" : "التصفية المؤقتة حتى اليوم";
    const direction =
      result.netMinor > 0
        ? "المؤسسة تدفع للعامل"
        : result.netMinor < 0
          ? "العامل مدين للمؤسسة"
          : "✅ لا يوجد رصيد";
    const klass =
      result.netMinor > 0
        ? "money-pos"
        : result.netMinor < 0
          ? "money-neg"
          : "";
    return `<div class="settlement-box"><div class="settlement-label">${label}</div><div class="settlement-value ${klass}">${direction}: ${fmtMoney(Math.abs(result.netMinor))}</div><div class="summary-grid" style="margin-top:14px"><div class="summary-cell"><div class="l">أجور معلقة</div><div class="v">${fmtMoney(pendingMinor)}</div></div><div class="summary-cell"><div class="l">الدورة الجارية/الأخيرة</div><div class="v">${fmtMoney(current?.remaining || 0)}</div></div><div class="summary-cell"><div class="l">ساعات + مكافآت</div><div class="v">${fmtMoney(overtimeMinor + bonusMinor)}</div></div><div class="summary-cell"><div class="l">خصومات</div><div class="v">${fmtMoney(deductionsMinor)}</div></div><div class="summary-cell"><div class="l">نقد تسبيقات</div><div class="v">${fmtMoney(advancesMinor)}</div></div><div class="summary-cell"><div class="l">تسبيقات محاسبية</div><div class="v">${fmtMoney(accountingAdvancesMinor)}</div></div>${mode === "final" ? `<div class="summary-cell"><div class="l">كامل الدين المتبقي</div><div class="v">${fmtMoney(fullDebtMinor)}</div></div>` : ""}</div><div class="table-wrap" style="margin-top:14px"><table class="table"><thead><tr><th>الدورة</th><th>المستحق الصافي</th><th>المدفوع</th><th>المتبقي</th><th>الحالة</th><th>إجراء</th></tr></thead><tbody>${rows.map((x) => `<tr><td>${cycleLabel(x.cycle)}</td><td>${fmtMoney(x.summary.netBeforePayments)}</td><td>${fmtMoney(x.summary.paid)}</td><td class="${x.summary.remaining < 0 ? "money-neg" : ""}">${fmtMoney(x.summary.remaining)}</td><td>${statusPill(x.summary.status)}</td><td>${x.summary.remaining > 0 ? `<button class="btn gold small" data-action="record-payment" data-worker="${w.workerId}" data-cycle="${x.cycle.cycleId}">تسديد</button>` : "—"}</td></tr>`).join("") || `<tr><td colspan="6">لا توجد دورات</td></tr>`}</tbody></table></div><div class="form-note">التصفية لا تنشئ دفعاً نقدياً. أي مبلغ مدفوع يسجل كـ salary_payment منفصل.</div></div>`;
  }

  function handlePrintKind() {
    const kind = $("#printKind")?.value || "worker_cycle";
    const needsWorker = ["worker_cycle", "temporary_settlement", "final_settlement"].includes(kind);
    const needsCycle = kind === "worker_cycle";
    $$(".print-worker-field").forEach((x) => (x.style.display = needsWorker ? "" : "none"));
    $$(".print-cycle-field").forEach((x) => (x.style.display = needsCycle ? "" : "none"));
    $("#printPreview").innerHTML = empty("🖨️", needsCycle ? "اختر العامل والدورة" : needsWorker ? "اختر العامل" : "اضغط لاختيار التقرير");
    if (!needsWorker) showPrintPreview();
  }
  function genericReportModel(kind, workerId = "") {
    const title = (PRINT_TYPES.find((x) => x[0] === kind) || ["", "تقرير"])[1];
    const rows = [];
    if (kind === "advances")
      for (const t of activeTx().filter((t) => t.type === TX.ADVANCE))
        rows.push([
          workerName(t.workerId),
          t.effectiveDate,
          fmtMoney(t.amountMinor),
          fmtMoney(t.cashPaidMinor || 0),
          t.unallocatedAmountMinor
            ? `غير موزع: ${fmtMoney(t.unallocatedAmountMinor)}`
            : "موزع",
        ]);
    else if (kind === "overtime")
      for (const t of activeTx().filter((t) => t.type === TX.OVERTIME))
        rows.push([
          workerName(t.workerId),
          t.effectiveDate,
          t.calculationMode === "fixed_amount"
            ? "ثابت"
            : `${t.hoursMinutes} دقيقة`,
          fmtMoney(t.amountMinor),
        ]);
    else if (kind === "absences")
      for (const t of activeTx().filter((t) => t.type === TX.ABSENCE))
        rows.push([
          workerName(t.workerId),
          `${t.startDate} → ${t.endDate}`,
          `${t.totalDays} يوم`,
          fmtMoney(t.amountMinor),
        ]);
    else if (kind === "bonuses")
      for (const t of activeTx().filter((t) => t.type === TX.BONUS))
        rows.push([
          workerName(t.workerId),
          t.effectiveDate,
          t.bonusType || "عادية",
          fmtMoney(t.amountMinor),
        ]);
    if (kind === "debts") {
      rows.length = 0;
      for (const d of activeTx().filter((t) => t.type === TX.DEBT_CREATE))
        rows.push([
          workerName(d.workerId),
          fmtMoney(d.amountMinor),
          fmtMoney(debtRemaining(d.debtId)),
          fmtMoney(d.suggestedInstallmentMinor || 0),
        ]);
    }
    if (kind === "overview") {
      const m = globalMetrics();
      rows.push(
        ["العمال النشطون", String(m.workers)],
        ["العمال الخارجون بدين", String(m.exitedDebt)],
        ["الأجور المعلقة", fmtMoney(m.pending)],
        ["التسبيقات الموزعة", fmtMoney(m.adv)],
        ["الساعات", fmtMoney(m.ot)],
        ["المكافآت", fmtMoney(m.bonus)],
        ["الغيابات", fmtMoney(m.absence)],
        ["الديون المتبقية", fmtMoney(m.debts)],
        ["مدفوع فعلياً", fmtMoney(m.pay)],
        ["على العمال للمؤسسة", fmtMoney(m.companyReceivable)],
      );
    }
    if (kind === "yearly") {
      const year = new Date().getFullYear();
      for (let m = 1; m <= 12; m++) {
        const prefix = `${year}-${pad(m)}-`,
          tx = activeTx().filter((t) => t.effectiveDate.startsWith(prefix)),
          sum = (type) =>
            tx
              .filter((t) => t.type === type)
              .reduce((n, t) => n + t.amountMinor, 0);
        rows.push([
          String(m),
          fmtMoney(sum(TX.SALARY_PAYMENT)),
          fmtMoney(sum(TX.ADVANCE)),
          fmtMoney(sum(TX.OVERTIME)),
          fmtMoney(sum(TX.BONUS)),
          fmtMoney(
            tx
              .filter((t) => t.type === TX.ABSENCE)
              .reduce((n, t) => n + t.amountMinor, 0),
          ),
          fmtMoney(
            sum(TX.DEBT_INSTALLMENT) + sum(TX.DEBT_SETTLEMENT_FROM_ADVANCE),
          ),
        ]);
      }
    }
    if (kind === "temporary_settlement" || kind === "final_settlement") {
      const worker = findWorker(workerId);
      if (!worker) throw new Error("اختر العامل للتصفية");
      if (kind === "final_settlement" && !worker.exitDate) throw new Error("التصفية النهائية تتطلب تسجيل خروج العامل");
      const result = kind === "final_settlement" ? finalSettlement(worker) : temporarySettlement(worker);
      for (const summary of result.details) rows.push([cycleLabel(summary.cycle), fmtMoney(summary.netBeforePayments), fmtMoney(summary.paid), fmtMoney(summary.remaining), summary.status]);
      rows.push(["النتيجة", "—", "—", fmtMoney(result.netMinor), kind === "final_settlement" ? `دين نهائي: ${fmtMoney(result.debtRemainingMinor)}` : "حتى اليوم"]);
    }
    if (kind === "weekly" || kind === "monthly") {
      const today=localToday();
      const start = kind === "weekly" ? addDays(today,-6) : `${today.slice(0,7)}-01`;
      for (const t of activeTx().filter((x)=>cmpDate(x.effectiveDate,start)>=0 && cmpDate(x.effectiveDate,today)<=0).sort((a,b)=>cmpDate(a.effectiveDate,b.effectiveDate))) rows.push([t.effectiveDate,workerName(t.workerId),t.type,fmtMoney(t.amountMinor),t.note||"—"]);
    }
    const headers =
      {
        advances: ["العامل", "التاريخ", "المبلغ المحاسبي", "النقد", "التوزيع"],
        overtime: ["العامل", "التاريخ", "التفاصيل", "المبلغ"],
        absences: ["العامل", "الفترة", "الأيام", "الخصم"],
        bonuses: ["العامل", "التاريخ", "النوع", "المبلغ"],
        debts: ["العامل", "الأصل", "المتبقي", "القسط المقترح"],
        overview: ["المؤشر", "القيمة"],
        temporary_settlement: ["الدورة", "المستحق الصافي", "المدفوع", "المتبقي", "الحالة"],
        final_settlement: ["الدورة", "المستحق الصافي", "المدفوع", "المتبقي", "الحالة"],
        weekly: ["التاريخ", "العامل", "العملية", "المبلغ", "ملاحظة"],
        monthly: ["التاريخ", "العامل", "العملية", "المبلغ", "ملاحظة"],
        yearly: [
          "الشهر",
          "مدفوع أجور",
          "تسبيقات",
          "ساعات",
          "مكافآت",
          "غيابات",
          "ديون مسددة",
        ],
      }[kind] || [];
    return { kind, title, headers, rows, printedAt: localToday() };
  }
  function genericReportHtml(m, forPrint = false) {
    return `<article class="print-report ${forPrint ? "print-mode" : ""}"><header><div><h1>${esc(S.settings.companyName)}</h1><div>${esc(m.title)} — مستخرج من Ledger الموحّد</div></div><div class="report-stamp">تاريخ الإصدار: ${m.printedAt}</div></header><table class="report-table"><thead><tr>${m.headers.map((h) => `<th>${esc(h)}</th>`).join("")}</tr></thead><tbody>${m.rows.length ? m.rows.map((r) => `<tr>${r.map((v) => `<td>${esc(v)}</td>`).join("")}</tr>`).join("") : `<tr><td colspan="${m.headers.length || 1}">لا توجد بيانات</td></tr>`}</tbody></table><footer>الأرقام مشتقة من Ledger فقط؛ هذا التقرير لا ينشئ عملية جديدة. لحفظ PDF استخدم نافذة الطباعة في المتصفح.</footer></article>`;
  }

      : genericReportHtml(m, forPrint);
  }

  function reportModel(workerId, cycleId) {
    const w = findWorker(workerId),
      c = w && cyclesForWorker(w).find((x) => x.cycleId === cycleId),
      s = c && cycleSummary(w, c);

  function reportHtml(m, forPrint = false) {
    const w = m.worker,
      c = m.cycle,
      s = m.summary;
    const rows = [
      ["الراتب الأساسي", s.base],
      ["الساعات الإضافية", s.overtime],
      ["المكافآت", s.bonus],
      ["تعديلات موجبة", s.adjustPlus],
      ["الغيابات", -s.absence],
      ["أقساط الدين — مستقلة وضمن التسبيق", -s.installments],

      ["دفع فعلي salary_payment", -s.salaryPayments],
    ];
    return `<article class="print-report ${forPrint ? "print-mode" : ""}"><header><div><h1>${esc(S.settings.companyName)}</h1><div>كشف أجر العامل — مستخرج من Ledger الموحّد</div></div><div class="report-stamp">تاريخ الإصدار: ${m.printedAt}</div></header><section class="report-worker"><div><b>العامل:</b> ${esc(w.fullName)}</div><div><b>المنصب:</b> ${esc(w.jobTitle || "—")}</div><div><b>workerId:</b> ${esc(w.workerId)}</div><div><b>الدورة:</b> ${cycleLabel(c)}</div><div><b>نسخة الاستحقاق:</b> ${esc(c.paydayScheduleVersionId)}</div><div><b>إجمالي التسبيق المحاسبي:</b> ${fmtMoney(s.accountingAdvances)}</div></section><table class="report-table"><tbody>${rows.map(([l, v]) => `<tr><td>${l}</td><td class="${v < 0 ? "negative" : ""}">${v < 0 ? "− " : ""}${fmtMoney(Math.abs(v))}</td></tr>`).join("")}<tr class="total"><td>المتبقي للدورة</td><td class="${s.remaining < 0 ? "negative" : ""}">${fmtMoney(s.remaining)}</td></tr></tbody></table><footer>حالة الدورة: ${statusPill(s.status)}<br>هذا الكشف لا ينشئ عملية مالية جديدة. الدفع الفعلي يسجل في Ledger.</footer></article>`;
  }
  function showPrintPreview() {
    const kind=$("#printKind")?.value||"worker_cycle", box=$("#printPreview"); if(!box)return;
    const workerId=$("#printWorker")?.value||"", cycleId=$("#printCycle")?.value||"";
    try {

  function runSearch() {
    const q = normalizeText($("#searchInput")?.value || "").toLowerCase(),
      box = $("#searchResults");
    if (!box) return;
    if (!q) {
      box.innerHTML = empty("🔍", "اكتب عبارة البحث");
      return;
    }
    const moneyQuery = (() => {
      try {
        return parseMoneyMinor(q);
      } catch {
        return null;
      }
    })();
    const workers = S.workers.filter((w) =>
      [w.fullName, w.workerId, w.jobTitle].join(" ").toLowerCase().includes(q),
    );
    const tx = S.transactions.filter(
      (t) =>
        [
          t.transactionId,
          t.workerId,
          t.type,
          t.effectiveDate,
          t.note || "",
          String(t.amountMinor),
          fmtMoney(t.amountMinor, false),
        ]
          .join(" ")
          .toLowerCase()
          .includes(q) ||
        (moneyQuery !== null &&
          Math.abs(t.amountMinor) === Math.abs(moneyQuery)),
    );
    box.innerHTML = `<div class="search-section"><h3>العمال (${workers.length})</h3>${workers.length ? workers.map((w) => `<button class="search-result" data-action="worker-ledger" data-worker="${w.workerId}"><b>${esc(w.fullName)}</b><span>${esc(w.workerId)}</span></button>`).join("") : empty("👷", "لا توجد نتائج")}</div><div class="search-section"><h3>العمليات (${tx.length})</h3>${tx.length ? tx.map((t) => `<button class="search-result" data-action="edit-tx" data-id="${t.transactionId}"><b>${esc(t.type)} · ${fmtMoney(t.amountMinor)}</b><span>${esc(workerName(t.workerId))} · ${t.effectiveDate} · ${esc(t.transactionId)}</span></button>`).join("") : empty("🧾", "لا توجد عمليات")}</div>`;
