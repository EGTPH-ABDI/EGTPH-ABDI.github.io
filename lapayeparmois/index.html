<!DOCTYPE html>
<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EGTPH — سجل الأجور v200</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  /* ═══ CLEAN WHITE PALETTE (default) ═══ */
  --bg:#f4f6f5;
  --bg2:#ffffff;
  --surface:#ffffff;
  --surface2:#f2f5f3;
  --glass:rgba(255,255,255,0.92);
  --glass2:rgba(246,249,247,0.85);
  --green1:#0a8a4d;
  --green2:#0f9c57;
  --green3:#0c7a42;
  --green4:#0a6336;
  --teal:#0d9488;
  --lime:#3f8f3f;
  --red:#dc2840;
  --amber:#c07600;
  --blue:#1f6fd0;
  --purple:#7c3aed;
  --white:#16241d;     /* main text color (dark, on white) */
  --gray:#5f7068;      /* muted text */
  --gray2:#dbe4de;
  --border:rgba(15,80,46,0.14);
  --border2:rgba(15,80,46,0.26);
  --border3:rgba(15,80,46,0.45);
  --shadow3d:0 10px 30px rgba(20,45,28,0.12),inset 0 1px 0 rgba(255,255,255,0.9);
  --shadow-sm:0 2px 10px rgba(20,45,28,0.07);
  --shadow-btn:0 4px 14px rgba(10,138,77,0.22),0 1px 4px rgba(0,0,0,0.08);
  --shadow-card:0 4px 18px rgba(20,45,28,0.08),0 0 1px rgba(15,80,46,0.2);
  --grad-main:linear-gradient(135deg,#12b566,#0e9a52);
  --grad-surface:linear-gradient(160deg,#ffffff,#f4f8f5);
  --grad-card:linear-gradient(145deg,#ffffff,#f5f9f6);
  --grad-glow:radial-gradient(ellipse at top,rgba(10,138,77,0.05) 0%,transparent 60%);
  --radius:14px;--radius-sm:8px;--radius-lg:20px;
  --text:var(--white);
}

/* ══ THEME: LIGHT ══ */
body.light{
  --bg:#f0f7f2;--bg2:#ffffff;--surface:#e4f0e8;--surface2:#d5e8db;
  --glass:rgba(255,255,255,0.85);--glass2:rgba(230,245,235,0.7);
  --white:#0a2012;--text:#0a2012;--gray:#4a7a5a;--gray2:#c5e0cc;
  --border:rgba(0,153,68,0.15);--border2:rgba(0,153,68,0.3);
  --shadow3d:0 10px 40px rgba(0,0,0,0.15),inset 0 1px 0 rgba(255,255,255,0.9);
  --shadow-card:0 4px 20px rgba(0,0,0,0.1),0 0 1px rgba(0,153,68,0.3);
}

/* ══ THEME: BLUE DARK ══ */
body.theme-blue{
  --bg:#050a14;--bg2:#080e1c;--surface:#0c1628;--surface2:#101e35;
  --glass:rgba(14,30,55,0.8);--glass2:rgba(18,38,70,0.6);
  --green1:#44aaff;--green2:#2288ee;--green3:#1166cc;--green4:#0044aa;
  --teal:#44eeff;--lime:#88ccff;
  --white:#e4eefc;--text:#e4eefc;--gray:#4466aa;--gray2:#1a2a4a;
  --border:rgba(68,170,255,0.12);--border2:rgba(68,170,255,0.25);--border3:rgba(68,170,255,0.5);
  --shadow3d:0 20px 60px rgba(0,0,0,0.8),0 0 40px rgba(68,170,255,0.08),inset 0 1px 0 rgba(68,170,255,0.15);
  --shadow-btn:0 6px 24px rgba(68,170,255,0.3),0 2px 8px rgba(0,0,0,0.5);
  --shadow-card:0 8px 32px rgba(0,0,0,0.7),0 0 1px rgba(68,170,255,0.3);
  --grad-main:linear-gradient(135deg,#44aaff,#2288ee);
  --grad-glow:radial-gradient(ellipse at top,rgba(68,170,255,0.12) 0%,transparent 60%);
}

/* ══ THEME: PURPLE ══ */
body.theme-purple{
  --bg:#0a0514;--bg2:#0e081c;--surface:#160c28;--surface2:#1c1235;
  --glass:rgba(22,12,40,0.8);--glass2:rgba(28,18,53,0.6);
  --green1:#aa66ff;--green2:#8844ee;--green3:#6622cc;--green4:#4400aa;
  --teal:#cc88ff;--lime:#ee88ff;
  --white:#f0e8ff;--text:#f0e8ff;--gray:#6644aa;--gray2:#1e1035;
  --border:rgba(170,102,255,0.12);--border2:rgba(170,102,255,0.25);--border3:rgba(170,102,255,0.5);
  --shadow3d:0 20px 60px rgba(0,0,0,0.8),0 0 40px rgba(170,102,255,0.08),inset 0 1px 0 rgba(170,102,255,0.15);
  --shadow-btn:0 6px 24px rgba(170,102,255,0.3),0 2px 8px rgba(0,0,0,0.5);
  --grad-main:linear-gradient(135deg,#aa66ff,#8844ee);
  --grad-glow:radial-gradient(ellipse at top,rgba(170,102,255,0.12) 0%,transparent 60%);
}

/* ══ THEME: RED DARK ══ */
body.theme-red{
  --bg:#140505;--bg2:#1c0808;--surface:#280c0c;--surface2:#321010;
  --glass:rgba(40,12,12,0.8);--glass2:rgba(50,16,16,0.6);
  --green1:#ff4466;--green2:#ee2244;--green3:#cc1122;--green4:#aa0011;
  --teal:#ff8888;--lime:#ffaaaa;
  --white:#ffe8e8;--text:#ffe8e8;--gray:#aa4444;--gray2:#351515;
  --border:rgba(255,68,102,0.12);--border2:rgba(255,68,102,0.25);--border3:rgba(255,68,102,0.5);
  --shadow3d:0 20px 60px rgba(0,0,0,0.8),0 0 40px rgba(255,68,102,0.08),inset 0 1px 0 rgba(255,68,102,0.15);
  --shadow-btn:0 6px 24px rgba(255,68,102,0.3),0 2px 8px rgba(0,0,0,0.5);
  --grad-main:linear-gradient(135deg,#ff4466,#ee2244);
  --grad-glow:radial-gradient(ellipse at top,rgba(255,68,102,0.12) 0%,transparent 60%);
}
body.theme-sand{
  --bg:#1a1408;--bg2:#221b09;--surface:#2c2210;--surface2:#362a14;
  --glass:rgba(44,34,16,0.8);--glass2:rgba(54,42,20,0.6);
  --green1:#ffcc44;--green2:#ee9900;--green3:#cc7700;--green4:#aa5500;
  --teal:#ffee88;--lime:#ffe066;
  --white:#fdf0d5;--text:#fdf0d5;--gray:#997744;--gray2:#3a2e18;
  --border:rgba(255,204,68,0.12);--border2:rgba(255,204,68,0.25);--border3:rgba(255,204,68,0.5);
  --shadow3d:0 20px 60px rgba(0,0,0,0.8),0 0 40px rgba(255,204,68,0.08),inset 0 1px 0 rgba(255,204,68,0.15);
  --shadow-btn:0 6px 24px rgba(255,204,68,0.3),0 2px 8px rgba(0,0,0,0.5);
  --grad-main:linear-gradient(135deg,#ffcc44,#ee9900);
  --grad-glow:radial-gradient(ellipse at top,rgba(255,204,68,0.12) 0%,transparent 60%);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Tajawal',sans-serif;
  background:var(--bg);
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
  background-image:
    var(--grad-glow),
    radial-gradient(ellipse at 80% 80%,rgba(0,204,102,0.05) 0%,transparent 50%);
}

/* ══════════════════════════════════
   SCROLLBAR
══════════════════════════════════ */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--green3);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--green2)}

/* ══════════════════════════════════
   GLASS PANELS
══════════════════════════════════ */
.glass-panel{
  background:var(--glass);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);
  box-shadow:var(--shadow3d);
}
.glass-card{
  background:var(--grad-card);
  backdrop-filter:blur(12px);
  border:1px solid var(--border);
  box-shadow:var(--shadow-card);
  position:relative;
  overflow:hidden;
}
.glass-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,255,136,0.04) 0%,transparent 50%);
  pointer-events:none;
}

/* ══════════════════════════════════
   TOPBAR
══════════════════════════════════ */
.topbar{
  background:var(--glass);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border2);
  display:flex;align-items:center;
  justify-content:space-between;
  padding:0 18px;min-height:58px;
  position:sticky;top:0;z-index:100;
  gap:8px;
  box-shadow:0 4px 24px rgba(0,0,0,0.5),0 0 60px rgba(0,255,136,0.05);
}
.tlogo{
  font-size:18px;font-weight:900;
  background:var(--grad-main);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  white-space:nowrap;
  filter:drop-shadow(0 0 12px rgba(0,255,136,0.4));
}
.tlogo span{
  font-size:11px;font-weight:400;
  -webkit-text-fill-color:var(--gray);
  filter:none;
}
.tright{display:flex;align-items:center;gap:5px;flex-wrap:wrap}

/* ── Status Badge ── */
.ubadge{
  display:flex;align-items:center;gap:6px;
  background:rgba(0,255,136,0.06);
  border:1px solid var(--border2);
  border-radius:20px;padding:4px 12px;
  font-size:11px;font-weight:600;
}
.udot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green1);
  box-shadow:0 0 8px var(--green1);
  animation:pulse3d 2s infinite;
}
@keyframes pulse3d{
  0%,100%{opacity:1;box-shadow:0 0 8px var(--green1)}
  50%{opacity:.4;box-shadow:0 0 4px var(--green1)}
}

/* ── Top Buttons ── */
.bsm{
  padding:5px 11px;
  border-radius:20px;
  border:1px solid var(--border);
  background:rgba(0,255,136,0.05);
  color:var(--white);
  font-family:'Tajawal',sans-serif;
  font-size:11px;cursor:pointer;
  transition:all .2s;font-weight:600;
  white-space:nowrap;
}
.bsm:hover{
  background:rgba(0,255,136,0.15);
  border-color:var(--green2);
  color:var(--green1);
  box-shadow:0 0 12px rgba(0,255,136,0.2);
  transform:translateY(-1px);
}

/* ══════════════════════════════════
   LAYOUT
══════════════════════════════════ */
.layout{display:flex;min-height:calc(100vh - 58px)}

/* ══════════════════════════════════
   SIDEBAR
══════════════════════════════════ */
.sidebar{
  width:220px;
  background:var(--glass);
  backdrop-filter:blur(20px);
  border-left:1px solid var(--border);
  padding:14px 0;
  position:sticky;top:58px;
  height:calc(100vh - 58px);
  overflow-y:auto;flex-shrink:0;
  box-shadow:4px 0 24px rgba(0,0,0,0.4);
}
.slbl{
  font-size:9px;color:var(--gray);
  font-weight:800;text-transform:uppercase;
  padding:0 16px;margin:16px 0 5px;
  letter-spacing:1.5px;
  display:flex;align-items:center;gap:6px;
}
.slbl::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(to left,transparent,var(--border2));
}
.nv{
  display:flex;align-items:center;gap:9px;
  padding:9px 16px;cursor:pointer;
  transition:all .2s;color:var(--white);
  font-size:13px;font-weight:500;
  position:relative;
}
.nv:hover{
  background:rgba(0,255,136,0.06);
  color:var(--green1);
}
.nv.active{
  background:linear-gradient(90deg,rgba(0,255,136,0.12),transparent);
  border-right:3px solid var(--green1);
  color:var(--green1);
}
.nv.active::before{
  content:'';position:absolute;right:0;top:0;bottom:0;width:3px;
  background:var(--green1);
  box-shadow:0 0 10px var(--green1);
}
.nic{font-size:16px;width:22px;text-align:center}
.nbadge{
  background:var(--red);
  color:#fff;border-radius:10px;
  padding:1px 7px;font-size:9px;
  font-weight:800;margin-right:auto;
  box-shadow:0 0 8px rgba(255,68,102,0.5);
}

/* ══════════════════════════════════
   MAIN CONTENT
══════════════════════════════════ */
.main{flex:1;padding:20px;overflow-y:auto;max-width:100%}
.page{display:none}.page.active{display:block}
.pgtitle{
  font-size:24px;font-weight:900;margin-bottom:4px;
  background:var(--grad-main);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 8px rgba(0,255,136,0.3));
}
.pgsub{font-size:12px;color:var(--gray);margin-bottom:18px}

/* ══════════════════════════════════
   BOTTOM NAV (mobile)
══════════════════════════════════ */
.bnav{
  display:none;position:fixed;bottom:0;
  left:0;right:0;
  background:var(--glass);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--border2);
  z-index:100;overflow-x:auto;
  box-shadow:0 -4px 24px rgba(0,0,0,0.5);
}
.bnav-in{display:flex;padding:4px;min-width:max-content}
.bb{
  display:flex;flex-direction:column;align-items:center;
  gap:2px;padding:5px 9px;
  background:transparent;border:none;
  color:var(--gray);font-family:'Tajawal',sans-serif;
  font-size:9px;cursor:pointer;border-radius:10px;
  transition:all .2s;white-space:nowrap;position:relative;
}
.bb:hover{background:rgba(0,255,136,0.06);color:var(--green1)}
.bb.active{color:var(--green1);background:rgba(0,255,136,0.1)}
.bic{font-size:18px}
.bbdot{
  position:absolute;top:3px;left:4px;
  width:7px;height:7px;border-radius:50%;
  background:var(--red);display:none;
  box-shadow:0 0 6px var(--red);
}
@media(max-width:900px){
  .sidebar{display:none}
  .bnav{display:block}
  .main{padding:14px;padding-bottom:65px}
}
@media print{.topbar,.sidebar,.bnav,.mo,#toast{display:none!important}}


/* ══════════════════════════════════
   STAT CARDS
══════════════════════════════════ */
.crow{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:18px}
.scard{
  background:var(--grad-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;text-align:center;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow-card);
  transition:transform .2s,box-shadow .2s;
}
.scard:hover{transform:translateY(-2px);box-shadow:var(--shadow3d)}
.scard::after{
  content:'';position:absolute;
  inset:0;border-radius:inherit;
  background:linear-gradient(145deg,rgba(0,255,136,0.06) 0%,transparent 60%);
  pointer-events:none;
}
.sclbl{font-size:10px;color:var(--gray);font-weight:700;text-transform:uppercase;margin-bottom:5px;letter-spacing:.5px}
.scval{font-size:20px;font-weight:900;text-shadow:0 0 20px currentColor}
.scsub{font-size:10px;color:var(--gray);margin-top:3px}

/* ══════════════════════════════════
   SECTION WRAPPER
══════════════════════════════════ */
.sec{
  background:var(--grad-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  margin-bottom:16px;
  box-shadow:var(--shadow-card);
  overflow:hidden;
}
.sechdr{
  display:flex;align-items:center;
  justify-content:space-between;
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  gap:8px;flex-wrap:wrap;
  background:linear-gradient(90deg,rgba(0,255,136,0.05),transparent);
}
.sechdr h3{font-size:14px;font-weight:800;color:var(--green1)}
.secbody{padding:18px}

/* ══════════════════════════════════
   SUM ROW
══════════════════════════════════ */
.sumrow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.scell{
  background:var(--grad-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:13px;min-width:120px;flex:1;
  text-align:center;box-shadow:var(--shadow-sm);
  transition:transform .15s;
}
.scell:hover{transform:translateY(-1px)}
.scell .sclbl{font-size:10px;color:var(--gray);font-weight:700;text-transform:uppercase;margin-bottom:5px}
.scell .scval{font-size:17px;font-weight:900}
/* color variants */
.sb{border-color:rgba(68,170,255,.3)}.sb .scval{color:var(--blue)}
.sr{border-color:rgba(255,68,102,.3)}.sr .scval{color:var(--red)}
.sg{border-color:rgba(0,255,136,.2)}.sg .scval{color:var(--green1)}
.sv{border-color:rgba(0,255,204,.2)}.sv .scval{color:var(--teal)}
.sp{border-color:rgba(170,102,255,.3)}.sp .scval{color:var(--purple)}

/* ══════════════════════════════════
   TABLES
══════════════════════════════════ */
.twrap{
  background:var(--grad-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  margin-bottom:16px;overflow:hidden;
  box-shadow:var(--shadow-card);
}
.thdr{
  display:flex;align-items:center;
  justify-content:space-between;
  padding:13px 18px;
  border-bottom:1px solid var(--border);
  gap:8px;flex-wrap:wrap;
  background:linear-gradient(90deg,rgba(0,255,136,0.05),transparent);
}
.thdr h3{font-size:14px;font-weight:800;color:var(--green1)}
.twrap table{width:100%;border-collapse:collapse}
.twrap th{
  padding:10px 13px;text-align:right;
  font-size:10px;color:var(--gray);
  font-weight:800;text-transform:uppercase;
  border-bottom:1px solid var(--border);
  letter-spacing:.5px;
}
.twrap td{
  padding:10px 13px;
  border-bottom:1px solid rgba(0,255,136,0.05);
  font-size:12px;
}
.twrap tr:last-child td{border-bottom:none}
.twrap tr:hover td{background:rgba(0,255,136,0.03)}
.trow-total td{
  background:rgba(0,153,68,.12);
  font-weight:800;
  border-top:2px solid var(--green3);
}

/* ══════════════════════════════════
   BADGES
══════════════════════════════════ */
.badge{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700}
.bg{background:rgba(0,255,136,.12);color:var(--green1);border:1px solid rgba(0,255,136,.2)}
.bb2{background:rgba(68,170,255,.12);color:var(--blue);border:1px solid rgba(68,170,255,.2)}
.bgr{background:rgba(0,255,204,.12);color:var(--teal);border:1px solid rgba(0,255,204,.2)}
.br{background:rgba(255,68,102,.12);color:var(--red);border:1px solid rgba(255,68,102,.2)}
.bp{background:rgba(170,102,255,.12);color:var(--purple);border:1px solid rgba(170,102,255,.2)}
.ba{background:rgba(255,170,0,.12);color:var(--amber);border:1px solid rgba(255,170,0,.2)}
.wn{
  display:inline-flex;align-items:center;justify-content:center;
  width:24px;height:24px;border-radius:7px;
  background:linear-gradient(135deg,var(--green3),var(--green2));
  color:#fff;font-size:10px;font-weight:900;flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,204,102,.4);
}

/* ══════════════════════════════════
   BUTTONS
══════════════════════════════════ */
.btn1{
  padding:9px 16px;
  background:var(--grad-main);
  border:none;border-radius:25px;
  color:#061208;font-family:'Tajawal',sans-serif;
  font-size:13px;font-weight:800;cursor:pointer;
  transition:all .2s;white-space:nowrap;
  box-shadow:var(--shadow-btn);
}
.btn1:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(0,255,136,.4),0 2px 8px rgba(0,0,0,.5);
  filter:brightness(1.1);
}
.btn2{
  padding:8px 15px;
  background:rgba(0,255,136,.06);
  border:1px solid var(--border2);
  border-radius:25px;color:var(--white);
  font-family:'Tajawal',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;
  transition:all .2s;white-space:nowrap;
}
.btn2:hover{
  border-color:var(--green2);color:var(--green1);
  background:rgba(0,255,136,.12);
  box-shadow:0 0 12px rgba(0,255,136,.15);
}
.btn3{
  padding:8px 15px;
  background:rgba(255,68,102,.08);
  border:1px solid rgba(255,68,102,.3);
  border-radius:25px;color:var(--red);
  font-family:'Tajawal',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;
  transition:all .2s;
}
.btn3:hover{background:var(--red);border-color:var(--red);color:#fff}

/* icon action buttons */
.eb,.db,.pb{
  padding:5px 9px;border-radius:8px;
  border:1px solid var(--border);
  background:rgba(0,255,136,.03);
  color:var(--white);font-size:13px;cursor:pointer;transition:all .2s;
}
.eb:hover{background:rgba(0,255,136,.12);border-color:var(--border2);color:var(--green1)}
.db:hover{background:rgba(255,68,102,.1);border-color:rgba(255,68,102,.3);color:var(--red)}
.pb:hover{background:rgba(0,255,204,.1);border-color:rgba(0,255,204,.3);color:var(--teal)}

/* ══════════════════════════════════
   FORMS
══════════════════════════════════ */
.fg{margin-bottom:13px}
.fg label{
  display:block;font-size:10px;color:var(--gray);
  margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
}
.fg input,.fg select,.fg textarea{
  width:100%;padding:9px 13px;
  background:rgba(0,255,136,.04);
  border:1px solid var(--border);
  border-radius:10px;color:var(--white);
  font-family:'Tajawal',sans-serif;font-size:13px;
  outline:none;transition:all .2s;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{
  border-color:var(--green2);
  background:rgba(0,255,136,.08);
  box-shadow:0 0 0 3px rgba(0,255,136,.08);
}
.fg select option{background:#0c1f12;color:var(--white)}
.fg textarea{resize:vertical;min-height:65px}
.fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:13px}
.sinp{
  padding:8px 12px;
  background:rgba(0,255,136,.04);
  border:1px solid var(--border);
  border-radius:10px;color:var(--white);
  font-family:'Tajawal',sans-serif;font-size:12px;outline:none;
  transition:all .2s;
}
.sinp:focus{border-color:var(--green2);box-shadow:0 0 0 3px rgba(0,255,136,.08)}

/* ══════════════════════════════════
   TABS
══════════════════════════════════ */
.wtabs{
  display:flex;gap:6px;flex-wrap:wrap;margin-bottom:13px;
  padding:10px;
  background:var(--grad-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
}
.wtab{
  padding:7px 12px;
  background:rgba(0,255,136,.04);
  border:1px solid var(--border);
  border-radius:20px;color:var(--white);
  font-family:'Tajawal',sans-serif;font-size:12px;
  font-weight:600;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:5px;
}
.wtab:hover{border-color:var(--border2)}
.wtab.active{
  background:rgba(0,255,136,.15);
  border-color:var(--green2);color:var(--green1);
  box-shadow:0 0 12px rgba(0,255,136,.15);
}
.mtabs{
  display:flex;gap:4px;flex-wrap:wrap;margin-bottom:13px;
  padding:10px;
  background:var(--grad-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
}
.mtab{
  padding:5px 10px;
  background:rgba(0,255,136,.04);
  border:1px solid var(--border);
  border-radius:15px;color:var(--white);
  font-family:'Tajawal',sans-serif;font-size:11px;
  font-weight:600;cursor:pointer;transition:all .2s;
}
.mtab:hover{border-color:var(--border2)}
.mtab.active{
  background:rgba(0,255,136,.15);
  border-color:var(--green2);color:var(--green1);
}

/* ══════════════════════════════════
   QUICK GRID (dashboard)
══════════════════════════════════ */
.qgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:18px}
.qcard{
  background:var(--grad-card);
  border:1px solid var(--border);
  border-radius:var(--radius);padding:13px;
  box-shadow:var(--shadow-card);
  transition:all .2s;position:relative;overflow:hidden;
}
.qcard:hover{
  border-color:var(--border2);
  transform:translateY(-2px);
  box-shadow:var(--shadow3d);
}
.qcard::before{
  content:'';position:absolute;top:0;right:0;
  width:60px;height:60px;
  background:radial-gradient(circle,rgba(0,255,136,0.06),transparent 70%);
  border-radius:50%;
}
.qcname{
  font-size:13px;font-weight:800;margin-bottom:8px;
  display:flex;align-items:center;gap:7px;
}
.qbtns{display:flex;gap:4px;flex-wrap:wrap}
.qb{
  padding:5px 10px;border-radius:8px;
  border:1px solid var(--border);
  background:rgba(0,0,0,.2);color:var(--white);
  font-family:'Tajawal',sans-serif;font-size:11px;
  font-weight:600;cursor:pointer;transition:all .2s;
  flex:1;min-width:82px;text-align:center;
}
.qb.a{border-color:rgba(0,255,136,.2);color:var(--green1)}.qb.a:hover{background:rgba(0,255,136,.12)}
.qb.h{border-color:rgba(0,255,204,.2);color:var(--teal)}.qb.h:hover{background:rgba(0,255,204,.1)}
.qb.s{border-color:rgba(255,68,102,.2);color:var(--red)}.qb.s:hover{background:rgba(255,68,102,.1)}
.qb.d{border-color:rgba(68,170,255,.2);color:var(--blue)}.qb.d:hover{background:rgba(68,170,255,.1)}
.qb.b{border-color:rgba(170,102,255,.2);color:var(--purple)}.qb.b:hover{background:rgba(170,102,255,.1)}
.qb.p{border-color:rgba(0,255,136,.2);color:var(--green1)}.qb.p:hover{background:rgba(0,255,136,.1)}
.qb.t{border-color:rgba(0,255,204,.2);color:var(--teal)}.qb.t:hover{background:rgba(0,255,204,.1)}

/* ══════════════════════════════════
   ALERTS
══════════════════════════════════ */
.abox{border-radius:10px;padding:13px;margin-bottom:8px;font-size:12px;line-height:1.6}
.abox.warn{background:rgba(255,170,0,.08);border:1px solid rgba(255,170,0,.25)}
.abox.danger{background:rgba(255,68,102,.08);border:1px solid rgba(255,68,102,.25)}
.abox.ok{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.2)}

/* ══════════════════════════════════
   PROGRESS BAR
══════════════════════════════════ */
.pbar{
  background:rgba(255,255,255,.06);
  border-radius:6px;height:6px;overflow:hidden;
}
.pbar-f{height:100%;border-radius:6px;transition:.4s;
  background:linear-gradient(90deg,var(--green3),var(--green1));}

/* ══════════════════════════════════
   MODAL
══════════════════════════════════ */
.mo{
  position:fixed;inset:0;
  background:rgba(0,0,0,.8);
  z-index:200;display:none;
  align-items:center;justify-content:center;
  padding:16px;backdrop-filter:blur(8px);
}
.mo.open{display:flex}
.modal{
  background:var(--glass);
  backdrop-filter:blur(24px);
  border:1px solid var(--border2);
  border-radius:var(--radius-lg);
  padding:24px;
  max-width:550px;width:100%;
  max-height:90vh;overflow-y:auto;
  box-shadow:var(--shadow3d);
  position:relative;
}
.modal::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,255,136,.4),transparent);
}
.modal h3{
  font-size:17px;font-weight:800;margin-bottom:16px;
  color:var(--green1);
}
.minfo{
  background:rgba(0,255,136,.05);
  border:1px solid var(--border);
  border-radius:10px;padding:10px 13px;
  margin-bottom:14px;font-size:12px;
}
.mbtns{display:flex;gap:8px;margin-top:16px}
.mbtns .btn1,.mbtns .btn2{flex:1}

/* ══════════════════════════════════
   TOAST
══════════════════════════════════ */
#toast{
  position:fixed;top:70px;right:16px;
  background:var(--grad-main);
  color:#061208;
  padding:12px 18px;border-radius:25px;
  font-weight:800;font-size:13px;z-index:300;
  opacity:0;transform:translateX(400px);
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;
  box-shadow:0 4px 20px rgba(0,255,136,.4);
}
#toast.show{opacity:1;transform:translateX(0)}
#toast.err{background:linear-gradient(135deg,var(--red),#cc2244);color:#fff}

/* ══════════════════════════════════
   AUTO-SAVE INDICATOR
══════════════════════════════════ */
.auto-save-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--gray);display:inline-block;
  transition:all .3s;margin-left:4px;
}
.auto-save-dot.saved{
  background:var(--green1);
  box-shadow:0 0 8px var(--green1);
  animation:savePop .5s ease;
}
@keyframes savePop{0%{transform:scale(1.5)}100%{transform:scale(1)}}

/* ══════════════════════════════════
   3D GLOW CARDS (dashboard summary)
══════════════════════════════════ */
.glow-card{
  position:relative;
  background:var(--grad-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;overflow:hidden;
  box-shadow:var(--shadow-card);
  transition:all .3s;
}
.glow-card:hover{
  transform:translateY(-3px) scale(1.01);
  box-shadow:var(--shadow3d);
}
.glow-card .gc-icon{
  font-size:28px;margin-bottom:8px;
  filter:drop-shadow(0 0 8px currentColor);
}
.glow-card .gc-val{
  font-size:22px;font-weight:900;
  text-shadow:0 0 20px currentColor;
}
.glow-card .gc-lbl{
  font-size:10px;color:var(--gray);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;
}
.gc-green .gc-val{color:var(--green1)}
.gc-red .gc-val{color:var(--red)}
.gc-blue .gc-val{color:var(--blue)}
.gc-amber .gc-val{color:var(--amber)}
.gc-teal .gc-val{color:var(--teal)}

/* ══════════════════════════════════
   FINANCIAL STATUS BADGES (inline)
══════════════════════════════════ */
.fin-badge{
  padding:5px 12px;border-radius:20px;
  font-weight:800;font-size:11px;
  display:inline-flex;align-items:center;gap:5px;
}
.fin-paid{background:rgba(0,255,136,.12);color:var(--green1);border:1px solid rgba(0,255,136,.25)}
.fin-pending{background:rgba(255,170,0,.08);color:var(--amber);border:1px solid rgba(255,170,0,.2)}
.fin-debt{background:rgba(255,68,102,.1);color:var(--red);border:1px solid rgba(255,68,102,.25)}
.fin-none{background:rgba(255,255,255,.05);color:var(--gray);border:1px solid var(--border)}

(function (global) {

      method: "POST",

  function buildOverlay(appId) {

      "<p>\u0627\u0644\u0628\u0631\u0646\u0627\u0645\u062c \u0645\u062d\u0645\u064a \u0628\u0643\u0644\u0645\u0629 \u0633\u0631 \u2014 \u0627\u0643\u062a\u0628\u0647\u0627 \u0644\u0644\u062f\u062e\u0648\u0644</p>" +

  function promptLogin(opts) {

  function init(opts) {

    }
    ensureLogin(opts.appId, opts);
  }

  function getToken(appId) {
    var s = sessions[appId];
    return s ? s.token : null;
  }

  function authParam(appId) {
    var t = getToken(appId);
    return t ? ("?auth=" + t) : "";
  }

  function logout(appId) {
    clearSession(appId);
    delete sessions[appId];
  }

  global.EGTPHAuth = {
    init: init,
    getToken: getToken,
    authParam: authParam,
    logout: logout
  };
})(window);
</script>

 state.settings.sync=state.settings.sync||{};let s=state.settings.sync;s.databaseURL='https://egtph-pay-default-rtdb.europe-west1.firebasedatabase.app';s.apiKey='AIzaSyD6Up-mmyDwqhr0UMBmV3aI5Xv-TjvoMDA';s.email='abdiyoucefislam@gmail.com';s.workspaceKey='EGTPH-pay-v45-9xK2wQ4mRtZp';s.auto=s.auto!==false;s.status=s.status||'not_authenticated';if(!s.deviceId)s.deviceId=uid('DEV');

// ── Cycle model: 30-day wage basis; calendar boundaries use payday 1..28. ──
function allPhases(w){let out=[{payday:Number(w.initialPayday||w.payday),effectiveFrom:w.startDate||'1900-01-01'}].concat((w.paydayHistory||[]).map(x=>({payday:Number(x.payday),effectiveFrom:x.effectiveFrom})));return out.filter(x=>validPayday(x.payday)&&x.effectiveFrom).sort((a,b)=>a.effectiveFrom.localeCompare(b.effectiveFrom));}

function findCycleForDate(w,date){let cs=normalCycles(w,addDays(date,45));let c=cs.find(x=>x.startDate<=date&&date<=x.endDate);return c||cs.find(x=>x.startDate>date)||null;}

function transitionsForWorker(w){return activeTx().filter(t=>t.workerId===w.workerId&&t.type==='transition_settlement');}

function targetList(w){let ref=today(), cycles=normalCycles(w,ref).map(c=>calcCycle(w,c,ref)).filter(x=>x.balance>0.01).map(x=>({key:x.cycle.cycleId,label:`دورة ${dateAr(x.cycle.startDate)} → ${dateAr(x.cycle.endDate)} — متبقي ${money(x.balance)}`,balance:x.balance,kind:'cycle',cycle:x.cycle}));let tr=transitionsForWorker(w).map(t=>({t,...transitionBalance(t)})).filter(x=>x.balance>0.01).map(x=>({key:'TRN:'+x.t.transactionId,label:`تسوية تغيير الاستحقاق ${dateAr(x.t.effectiveDate)} — متبقي ${money(x.balance)}`,balance:x.balance,kind:'transition',transition:x.t}));let current=currentCycle(w,ref);if(current&&!cycles.some(x=>x.key===current.cycleId))cycles.push({key:current.cycleId,label:`الدورة الحالية ${dateAr(current.startDate)} → ${dateAr(current.endDate)}`,balance:Infinity,kind:'cycle',cycle:current});return tr.concat(cycles).sort((a,b)=>a.kind===b.kind?(a.kind==='cycle'?a.cycle.startDate.localeCompare(b.cycle.startDate):a.t.effectiveDate.localeCompare(b.t.effectiveDate)):a.kind==='transition'?-1:1);}
function targetByKey(w,key){return targetList(w).find(x=>x.key===key)||null;}

function emit(type,payload){let evt={eventId:uid('EVT'),type,at:now(),deviceId:state.settings.sync.deviceId,payload:clone(payload)};applyEvent(evt);state.outbox[evt.eventId]=evt;audit(type,payload?.transactionId||payload?.workerId||'');persist();renderAll();return evt;}
function applyEvent(evt){if(!evt||!evt.eventId||state.appliedEvents[evt.eventId])return false;let p=evt.payload||{};
 if(evt.type==='WORKER_SAVE'){state.workers[p.workerId]=clone(p);}
 else if(evt.type==='TX_SAVE'){state.transactions[p.transactionId]=clone(p);}
 else if(evt.type==='TX_DELETE'){let t=state.transactions[p.transactionId];if(t){t.status='deleted';t.deletedAt=evt.at;t.deletedReason=p.reason||'';state.tombstones[p.transactionId]={transactionId:p.transactionId,deletedAt:evt.at,reason:p.reason||'',eventId:evt.eventId};}}
 else if(evt.type==='TX_RESTORE'){let t=state.transactions[p.transactionId];if(t){t.status='active';t.restoredAt=evt.at;t.restoredBy=state.settings.userName||'';delete state.tombstones[p.transactionId];}}
 else if(evt.type==='PAYDAY_CHANGE'){let w=state.workers[p.workerId];if(w){w.paydayHistory=w.paydayHistory||[];if(!w.paydayHistory.some(x=>x.effectiveFrom===p.effectiveFrom&&Number(x.payday)===Number(p.newPayday)))w.paydayHistory.push({payday:Number(p.newPayday),effectiveFrom:p.effectiveFrom,changedAt:evt.at});w.payday=Number(p.newPayday);state.transactions[p.transition.transactionId]=clone(p.transition);}}
 else if(evt.type==='WORKER_EXIT'){let w=state.workers[p.workerId];if(w){w.exitDate=p.exitDate;w.status='exited';}}
 state.appliedEvents[evt.eventId]=evt.at;return true;}

function saveWorkerFromForm(){let id=clean($('#workerId').value),isEdit=!!id,name=clean($('#workerName').value),start=clean($('#workerStart').value),salary=Number($('#workerSalary').value||0),payday=Number($('#workerPayday').value),type=clean($('#workerType').value);if(!name||!start||salary<=0||!validPayday(payday)){toast('أكمل الاسم وتاريخ الدخول والراتب ويوم الاستحقاق.','err');return;}if(!isEdit&&dateObj(start).getDate()>=29){toast('لا تدخل عاملاً يوم 29 أو 30 أو 31. اختر تاريخاً مناسباً.','err');return;}let w=isEdit?clone(workerById(id)):{workerId:uid('WRK'),createdAt:now(),paydayHistory:[],accountingStartDate:start};w.name=name;w.startDate=start;w.salary=salary;w.type=type;w.phone=clean($('#workerPhone').value);w.idNumber=clean($('#workerIDNo').value);w.equipment=clean($('#workerEquipment').value);w.updatedAt=now();if(!isEdit){w.initialPayday=payday;w.payday=payday;w.status='active';}else if(Number(w.payday)!==payday){toast('لا تغيّر يوم الاستحقاق هنا. استعمل زر توحيد تاريخ الاستحقاق.','warn');}
 emit('WORKER_SAVE',w);closeModal();toast(isEdit?'تم تعديل بيانات العامل.':'تمت إضافة العامل.');}

function openAdvance(workerId=''){let w=workerById(workerId||currentWorkerId||sortedWorkers(false)[0]?.workerId);if(!w)return;currentWorkerId=w.workerId;let targets=targetList(w),targetOpts=targets.map((t,i)=>`<option value="${esc(t.key)}" ${i===0?'selected':''}>${esc(t.label)}</option>`).join('');let debts=debtRecords(w).filter(d=>debtRemaining(d)>0.01);openModal('💰 تسجيل تسبيق',`<div class="minfo"><b>${esc(w.name)}</b> · التسبيق يخصم من الدورة المختارة. إذا تجاوز المتبقي، يقفل القديم ثم يوجّه الباقي للدورة الحالية بعد تأكيدك.</div><div class="v200-form-grid"><div class="fg"><label>المبلغ المحاسبي للتسبيق</label><input id="advAmount" type="number" min="1" oninput="updateAdvanceCash()"></div><div class="fg"><label>تاريخ الدفع الحقيقي</label><input id="advDate" type="date" value="${today()}"></div><div class="fg"><label>الدورة المالكة</label><select id="advTarget" class="v200-select">${targetOpts||'<option value="">الدورة الحالية</option>'}</select></div><div class="fg"><label>الدين المسدد داخل التسبيق</label><input id="advDebtPart" type="number" min="0" value="0" oninput="updateAdvanceCash()"></div><div class="fg"><label>الدين المعني</label><select id="advDebt" class="v200-select"><option value="">لا يوجد قسط دين</option>${debts.map(d=>`<option value="${d.transactionId}">${esc(d.note||'دين')} — متبقي ${money(debtRemaining(d))}</option>`).join('')}</select></div><div class="fg"><label>النقد الذي أخذه العامل</label><input id="advCash" readonly value="0,00 دج"></div><div class="fg" style="grid-column:1/-1"><label>ملاحظة</label><input id="advNote" placeholder="اختياري"></div></div><div class="v200-details" style="margin-top:12px">مثال: تسبيق 15 000 دج وقسط دين 5 000 دج = النقد للعامل 10 000 دج. الدورة تنقص 15 000 دج والدين ينقص 5 000 دج دون خصم ثانٍ.</div><div class="mbtns"><button class="btn2" onclick="closeModal()">إلغاء</button><button class="btn1" onclick="saveAdvance('${w.workerId}')">حفظ التسبيق</button></div>`);updateAdvanceCash();}
function updateAdvanceCash(){let a=Number($('#advAmount')?.value||0),d=Number($('#advDebtPart')?.value||0),out=$('#advCash');if(out)out.value=money(Math.max(0,a-d));}
function advanceTx(w,amount,date,target,debtPart=0,note='',group=''){let ownership={};if(target?.kind==='transition')ownership={transitionId:target.transition.transactionId};else if(target?.cycle)ownership={cycleId:target.cycle.cycleId,cycleStart:target.cycle.startDate,cycleEnd:target.cycle.endDate};return {transactionId:uid('TX'),type:'advance',workerId:w.workerId,effectiveDate:date,enteredAt:now(),grossAmount:Number(amount),cashPaid:Number(amount)-Number(debtPart||0),debtInstallment:Number(debtPart||0),ownership,note,groupId:group||uid('ADV'),status:'active',by:state.settings.userName||''};}
function saveAdvance(workerId){let w=workerById(workerId),amount=Number($('#advAmount').value||0),date=clean($('#advDate').value),debtPart=Number($('#advDebtPart').value||0),debtId=clean($('#advDebt').value),target=targetByKey(w,clean($('#advTarget').value)),note=clean($('#advNote').value);if(amount<=0||!date||debtPart<0||debtPart>amount||(debtPart>0&&!debtId)){toast('تحقق من المبلغ وقسط الدين.','err');return;}let group=uid('ADVGRP'),items=[];if(target&&isFinite(target.balance)&&amount>target.balance+.01&&target.balance>0){items.push({amount:target.balance,target});let current=targetList(w).find(x=>x.kind==='cycle'&&x.cycle.startDate<=date&&date<=x.cycle.endDate)||targetList(w).find(x=>x.kind==='cycle');items.push({amount:amount-target.balance,target:current||target});}else items.push({amount,target:target||targetList(w)[0]});let remainingDebt=debtPart;for(let it of items){let part=Math.min(remainingDebt,it.amount);remainingDebt-=part;emit('TX_SAVE',advanceTx(w,it.amount,date,it.target,part,note,group));}if(debtPart>0){emit('TX_SAVE',{transactionId:uid('TX'),type:'debt_payment',workerId:w.workerId,effectiveDate:date,enteredAt:now(),grossAmount:debtPart,debtId,source:'advance',parentGroupId:group,note:'قسط دين داخل تسبيق',status:'active'});}closeModal();toast(items.length>1?'تم تقسيم التسبيق: إغلاق القديم ثم الباقي للحالية.':'تم تسجيل التسبيق.');}

function ownershipForDate(w,date){let c=findCycleForDate(w,date);return c?{cycleId:c.cycleId,cycleStart:c.startDate,cycleEnd:c.endDate}:{ };}
function openHours(workerId=''){let w=workerById(workerId||currentWorkerId||sortedWorkers(false)[0]?.workerId);if(!w)return;currentWorkerId=w.workerId;openModal('⏱️ إضافة ساعات إضافية',`<div class="minfo">${esc(w.name)} — الساعات تضاف إلى الدورة التي يملكها تاريخها.</div><div class="v200-form-grid"><div class="fg"><label>عدد الساعات</label><input id="hrCount" type="number" min="0.25" step="0.25"></div><div class="fg"><label>سعر الساعة</label><input id="hrRate" type="number" min="0" value="400"></div><div class="fg"><label>التاريخ</label><input id="hrDate" type="date" value="${today()}"></div><div class="fg" style="grid-column:1/-1"><label>ملاحظة</label><input id="hrNote"></div></div><div class="mbtns"><button class="btn2" onclick="closeModal()">إلغاء</button><button class="btn1" onclick="saveHours('${w.workerId}')">إضافة الساعات</button></div>`);}

function saveBonus(workerId){let w=workerById(workerId),a=Number($('#bonAmount').value||0),date=clean($('#bonDate').value);if(a<=0||!date){toast('أدخل المبلغ والتاريخ.','err');return;}emit('TX_SAVE',{transactionId:uid('TX'),type:'bonus',workerId:w.workerId,effectiveDate:date,enteredAt:now(),grossAmount:a,ownership:ownershipForDate(w,date),note:clean($('#bonNote').value),status:'active'});closeModal();toast('تمت إضافة المكافأة.');}
function cycleGroupForDays(w,start,end){let g={};for(let d=start;d<=end;d=addDays(d,1)){let c=findCycleForDate(w,d);if(!c)continue;let k=c.cycleId;(g[k]=g[k]||{cycle:c,days:0,start:d,end:d}).days++;g[k].end=d;}return Object.values(g);}
function openAbsence(workerId=''){let w=workerById(workerId||currentWorkerId||sortedWorkers(false)[0]?.workerId);if(!w)return;currentWorkerId=w.workerId;openModal('📅 تسجيل غياب',`<div class="minfo">${esc(w.name)} — إذا امتد الغياب على أكثر من دورة، يقسم البرنامج الخصم تلقائياً حسب حدود الدورات.</div><div class="v200-form-grid"><div class="fg"><label>من تاريخ</label><input id="absStart" type="date" value="${today()}"></div><div class="fg"><label>إلى تاريخ</label><input id="absEnd" type="date" value="${today()}"></div><div class="fg"><label>الخصم اليومي</label><input id="absRate" type="number" min="0" value="${Math.round(w.salary/30)}"></div><div class="fg" style="grid-column:1/-1"><label>سبب الغياب</label><input id="absNote"></div></div><div class="mbtns"><button class="btn2" onclick="closeModal()">إلغاء</button><button class="btn1" onclick="saveAbsence('${w.workerId}')">تسجيل الغياب</button></div>`);}
function saveAbsence(workerId){let w=workerById(workerId),start=clean($('#absStart').value),end=clean($('#absEnd').value),rate=Number($('#absRate').value||0);if(!start||!end||end<start||rate<0){toast('تحقق من تواريخ الغياب والخصم.','err');return;}let groups=cycleGroupForDays(w,start,end);if(!groups.length){toast('تعذر ربط الغياب بدورة.','err');return;}for(let g of groups)emit('TX_SAVE',{transactionId:uid('TX'),type:'absence',workerId:w.workerId,effectiveDate:g.start,enteredAt:now(),grossAmount:g.days*rate,days:g.days,dailyDeduct:rate,rangeStart:g.start,rangeEnd:g.end,ownership:{cycleId:g.cycle.cycleId,cycleStart:g.cycle.startDate,cycleEnd:g.cycle.endDate},note:clean($('#absNote').value),status:'active'});closeModal();toast(groups.length>1?'تم تقسيم الغياب على الدورات.':'تم تسجيل الغياب.');}
function openDebt(workerId=''){let w=workerById(workerId||currentWorkerId||sortedWorkers(false)[0]?.workerId);if(!w)return;currentWorkerId=w.workerId;openModal('📋 تسجيل دين للمؤسسة',`<div class="minfo">${esc(w.name)} — الدين مستقل عن الراتب ولا يخصم كاملاً تلقائياً. أنت تحدد كل قسط عند تسجيله.</div><div class="v200-form-grid"><div class="fg"><label>قيمة الدين</label><input id="debtAmount" type="number" min="1"></div><div class="fg"><label>تاريخ الدين</label><input id="debtDate" type="date" value="${today()}"></div><div class="fg"><label>قسط مقترح</label><input id="debtInstallment" type="number" min="0" value="0"></div><div class="fg" style="grid-column:1/-1"><label>سبب الدين / ملاحظة</label><input id="debtNote"></div></div><div class="mbtns"><button class="btn2" onclick="closeModal()">إلغاء</button><button class="btn1" onclick="saveDebt('${w.workerId}')">حفظ الدين</button></div>`);}

function openPaydayChange(workerId){let w=workerById(workerId);if(!w)return;openModal('🔄 توحيد تاريخ الاستحقاق',`<div class="minfo"><b>${esc(w.name)}</b><br>تاريخ الدخول الحقيقي لا يتغير. تحدد فقط أول تاريخ بداية للدورة الجديدة.</div><div class="v200-form-grid"><div class="fg"><label>يوم الاستحقاق الحالي</label><input readonly value="يوم ${w.payday}"></div><div class="fg"><label>يوم الاستحقاق الجديد</label><select id="newPayday" class="v200-select">${Array.from({length:28},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('')}</select></div><div class="fg" style="grid-column:1/-1"><label>أول يوم تبدأ فيه الدورة الجديدة (يجب أن يطابق اليوم الجديد)</label><input id="newPaydayStart" type="date" value="${today()}" oninput="previewPaydayChange('${w.workerId}')"></div></div><div id="paydayPreview" class="v200-details" style="margin-top:12px"></div><div class="mbtns"><button class="btn2" onclick="closeModal()">إلغاء</button><button class="btn1" onclick="savePaydayChange('${w.workerId}')">تأكيد التوحيد</button></div>`);$('#newPayday').value=Math.min(28,Number(w.payday));previewPaydayChange(w.workerId);}
function paydayPreviewData(w,newDay,effective){if(!validPayday(newDay)||!effective)return null;let phaseCycles=normalCycles(w,addDays(effective,-1));let previous=phaseCycles.filter(c=>c.endDate<effective).slice(-1)[0];if(!previous)return null;let trStart=addDays(previous.endDate,1),trEnd=addDays(effective,-1),days=trEnd>=trStart?diffDays(trStart,trEnd)+1:0;return {previous,trStart,trEnd,days,amount:Number(w.salary||0)/30*days};}
function previewPaydayChange(workerId){let w=workerById(workerId),day=Number($('#newPayday')?.value||0),effective=clean($('#newPaydayStart')?.value);let box=$('#paydayPreview');if(!w||!box)return;if(!effective||dateObj(effective).getDate()!==day){box.innerHTML='<span class="negative">اختر تاريخاً يطابق يوم الاستحقاق الجديد.</span>';return;}let p=paydayPreviewData(w,day,effective);if(!p){box.innerHTML='<span class="negative">اختر تاريخاً بعد آخر دورة قديمة مكتملة.</span>';return;}box.innerHTML=`<b>آخر دورة قديمة:</b> ${dateAr(p.previous.startDate)} → ${dateAr(p.previous.endDate)}<br><b>تسوية انتقال مستقلة:</b> ${p.days?dateAr(p.trStart)+' → '+dateAr(p.trEnd):'لا توجد أيام'} · ${p.days} يوم · <b>${money(p.amount)}</b><br><span class="small-note">التسوية تشمل أجر الأيام الأساسي فقط. الغيابات والساعات والمكافآت والدين والتسبيقات بعد ذلك تنتقل إلى الدورة الجديدة.</span>`;}
function savePaydayChange(workerId){let w=workerById(workerId),day=Number($('#newPayday').value||0),effective=clean($('#newPaydayStart').value);if(!w||!effective||dateObj(effective).getDate()!==day||!validPayday(day)){toast('تحقق من تاريخ ويوم الاستحقاق الجديد.','err');return;}let p=paydayPreviewData(w,day,effective);if(!p){toast('التاريخ يجب أن يأتي بعد آخر دورة قديمة مكتملة.','err');return;}let transition={transactionId:uid('TX'),type:'transition_settlement',workerId:w.workerId,effectiveDate:p.trStart,enteredAt:now(),grossAmount:p.amount,days:p.days,rangeStart:p.trStart,rangeEnd:p.trEnd,note:`تسوية تغيير الاستحقاق من يوم ${w.payday} إلى يوم ${day}`,status:'active'};emit('PAYDAY_CHANGE',{workerId:w.workerId,newPayday:day,effectiveFrom:effective,transition});closeModal();toast('تم توحيد تاريخ الاستحقاق وإنشاء التسوية المستقلة.');}
function openExit(workerId){let w=workerById(workerId);if(!w)return;openModal('إنهاء عمل العامل',`<div class="minfo">الدورات السابقة تبقى مغلقة كما هي. تطبق قاعدة 15 يوماً فقط على الدورة التي يوجد فيها تاريخ الخروج.</div><div class="fg"><label>تاريخ الخروج</label><input id="exitDate" type="date" value="${today()}" min="${w.startDate}"></div><div class="mbtns"><button class="btn2" onclick="closeModal()">إلغاء</button><button class="btn3" onclick="saveExit('${w.workerId}')">تأكيد الخروج والتصفية</button></div>`);}
function saveExit(workerId){let date=clean($('#exitDate').value),w=workerById(workerId);if(!date||date<w.startDate){toast('تاريخ الخروج غير صحيح.','err');return;}emit('WORKER_EXIT',{workerId,exitDate:date});closeModal();showPage('settlement');setTimeout(()=>selectSettlement(workerId),0);toast('تم تسجيل الخروج. راجع التصفية النهائية.');}

// ── Deleted operations: restore only after exact transaction ID confirmation. ──
function deleteTx(id){let t=txById(id);if(!t||t.status==='deleted')return;openModal('حذف عملية',`<div class="notice danger">لن تدخل العملية في الحساب بعد الحذف، ولن تعود تلقائياً من المزامنة أو نسخة قديمة.</div><p><b>${typeLabel(t.type)}</b> · ${money(t.grossAmount)}<br><span class="mono">${esc(t.transactionId)}</span></p><div class="fg"><label>سبب الحذف</label><input id="deleteReason"></div><div class="mbtns"><button class="btn2" onclick="closeModal()">إلغاء</button><button class="btn3" onclick="confirmDelete('${t.transactionId}')">حذف العملية</button></div>`);}
function confirmDelete(id){emit('TX_DELETE',{transactionId:id,reason:clean($('#deleteReason').value)});closeModal();toast('تم نقل العملية إلى سلة المحذوفات.');}
function openRestoreCenter(){let list=Object.values(state.tombstones).sort((a,b)=>String(b.deletedAt).localeCompare(String(a.deletedAt)));openModal('♻️ استرجاع العمليات المحذوفة',`<div class="notice warn">لا تسترجع أي عملية تلقائياً. اختر العملية ثم اكتب ID الخاص بها كاملاً للموافقة.</div><div class="fg"><label>بحث</label><input id="restoreSearch" oninput="filterRestore(this.value)" placeholder="اسم العامل أو ID"></div><div id="restoreRows">${list.map(x=>{let t=txById(x.transactionId),w=workerById(t?.workerId);return `<div class="v200-cycle-card restoreItem" data-q="${esc(((w?.name||'')+' '+x.transactionId+' '+(t?.type||'')).toLowerCase())}"><b>${esc(w?.name||'—')}</b> · ${typeLabel(t?.type||'عملية')} · ${money(t?.grossAmount||0)}<br><span class="mono">${esc(x.transactionId)}</span><br><span class="small-note">حذفت: ${dateAr(x.deletedAt)} · ${esc(x.reason||'بدون سبب')}</span><div style="margin-top:8px"><button class="eb" onclick="openRestoreConfirm('${x.transactionId}')">استرجاع هذه العملية</button></div></div>`;}).join('')||'<div class="v200-empty">لا توجد عمليات محذوفة.</div>'}</div>`);}
function filterRestore(v){let q=clean(v).toLowerCase();$$('.restoreItem').forEach(x=>x.style.display=x.dataset.q.includes(q)?'':'none');}
function openRestoreConfirm(id){let t=txById(id),w=workerById(t?.workerId);openModal('تأكيد الاسترجاع بالـID',`<div class="notice danger">اكتب ID كاملاً. سيعود نفس السجل ونفس transactionId؛ لا ينشئ البرنامج عملية جديدة.</div><p>${esc(w?.name||'—')} · ${typeLabel(t?.type||'عملية')} · ${money(t?.grossAmount||0)}</p><div class="keybox mono">${esc(id)}</div><div class="fg" style="margin-top:12px"><label>اكتب ID للتأكيد</label><input id="restoreTyped" dir="ltr"></div><div class="mbtns"><button class="btn2" onclick="openRestoreCenter()">رجوع</button><button class="btn1" onclick="confirmRestore('${id}')">استرجاع</button></div>`);}
function confirmRestore(id){if(clean($('#restoreTyped').value)!==id){toast('ID غير مطابق؛ لم يتم الاسترجاع.','err');return;}emit('TX_RESTORE',{transactionId:id});closeModal();toast('تم الاسترجاع بنفس ID بعد موافقتك.');}

function typeLabel(t){return ({advance:'تسبيق',overtime:'ساعات إضافية',absence:'غياب',bonus:'مكافأة',debt:'دين',debt_payment:'قسط دين',transition_settlement:'تسوية تغيير استحقاق'})[t]||t;}
function statusText(balance,adv=0){if(Math.abs(balance)<.01)return adv>0?'<span class="v200-pill green">✅ مسددة بالتسبيقات</span>':'<span class="v200-pill green">✅ مسددة</span>';return balance>0?`<span class="v200-pill amber">⏳ عليك للعامل ${money(balance)}</span>`:`<span class="v200-pill red">⚠️ عليه للمؤسسة ${money(-balance)}</span>`;}

// ── Render ──
function showPage(id){if(currentPage!==id){pageHistory.push(currentPage);pageHistory=pageHistory.slice(-12);}currentPage=id;$$('.page').forEach(p=>p.classList.remove('active'));$('#page-'+id)?.classList.add('active');$$('.nv').forEach(e=>e.classList.toggle('active',e.id==='nav-'+id));$$('.bb').forEach(e=>e.classList.toggle('active',e.id==='bb-'+id));renderPage(id);window.scrollTo({top:0,behavior:'smooth'});}
function goBackPage(){let p=pageHistory.pop();if(p)showPage(p);else showPage('dashboard');}
function cycleTheme(){let b=document.body;let modes=['light','theme-blue','theme-purple','theme-red','theme-sand'];let cur=modes.findIndex(x=>b.classList.contains(x));b.classList.remove(...modes);b.classList.add(modes[(cur+1)%modes.length]);}
function renderAll(){renderSide();renderPage(currentPage);}
function renderPage(id){if(!state)return;let fn={dashboard:renderDashboard,workers:renderWorkers,advances:()=>renderRecords('advance','advances','💰 التسبيقات','تسجيل تسبيق'),hours:()=>renderRecords('overtime','hours','⏱️ الساعات الإضافية','إضافة ساعات'),absences:()=>renderRecords('absence','absences','📅 الغيابات','تسجيل غياب'),bonuses:()=>renderRecords('bonus','bonuses','🎁 المكافآت','إضافة مكافأة'),debts:renderDebts,settlement:renderSettlement,summary:renderSummary,print:renderPrint,settings:renderSettings};(fn[id]||renderDashboard)();}
function renderDashboard(){let workers=sortedWorkers(false),all=activeTx(),t=today();$('#page-dashboard').innerHTML=`<div class="v200-hero"><h2>عمليات سريعة</h2><p>اختر العامل ثم سجّل العملية. الحساب يظهر مباشرة بعبارة واضحة: عليك للعامل أو عليه للمؤسسة.</p><div class="v200-actions"><button onclick="openWorkerForm()">➕ عامل جديد</button><button onclick="chooseWorkerFor('advance')">💰 تسبيق</button><button onclick="chooseWorkerFor('hours')">⏱️ ساعات</button><button onclick="chooseWorkerFor('absence')">📅 غياب</button><button onclick="chooseWorkerFor('bonus')">🎁 مكافأة</button><button onclick="chooseWorkerFor('debt')">📋 دين</button></div></div><div class="v200-grid"><div class="v200-stat"><small>العمال النشطون</small><b>${workers.length}</b></div><div class="v200-stat"><small>عمليات اليوم</small><b>${all.filter(x=>x.effectiveDate===t).length}</b></div><div class="v200-stat"><small>أجور معلقة</small><b>${money(totalOutstandingWages())}</b></div><div class="v200-stat"><small>ديون قائمة</small><b>${money(workers.reduce((s,w)=>s+totalDebt(w),0))}</b></div></div><div class="sec" style="margin-top:18px"><div class="sechdr"><h3>👷 العمال حسب تاريخ الدخول</h3><div class="v200-toolbar"><select id="quickWorker" class="sinp" onchange="currentWorkerId=this.value"><option value="">اختر العامل للعمليات السريعة</option>${workerOptions(currentWorkerId)}</select><button class="btn2" onclick="showPage('workers')">عرض الجميع</button></div></div><div class="secbody"><div id="dashboardWorkers" class="v200-list">${workers.slice(0,8).map(workerCard).join('')||'<div class="v200-empty">لا يوجد عمال بعد.</div>'}</div></div></div>`;}
function workerCard(w){let c=currentCycle(w),x=c?calcCycle(w,c,today()):null,s=workerSettlement(w,today(),false);return `<div class="v200-worker"><div class="v200-worker-main"><div class="v200-worker-title">${esc(w.name)} ${w.status==='exited'?'<span class="v200-pill red">خرج</span>':''}</div><div class="v200-worker-sub">دخول: ${dateAr(w.startDate)} · الاستحقاق: يوم ${w.payday} · الراتب: ${money(w.salary)}<br><span class="mono">${esc(w.workerId)}</span></div></div><div class="v200-worker-status"><div class="small-note">الدورة الحالية ${c?dateAr(c.startDate)+' → '+dateAr(c.endDate):'—'}</div>${x?statusText(x.balance,x.advances):''}<div class="small-note" style="margin-top:4px">التصفية حتى اليوم: ${s.net>=0?'عليك للعامل ':'عليه للمؤسسة '}<b class="${s.net>=0?'warning':'negative'}">${money(absN(s.net))}</b></div></div><div class="v200-worker-actions"><button class="eb" title="تسبيق" onclick="openAdvance('${w.workerId}')">💰</button><button class="eb" title="ساعات" onclick="openHours('${w.workerId}')">⏱️</button><button class="eb" title="غياب" onclick="openAbsence('${w.workerId}')">📅</button><button class="eb" title="مكافأة" onclick="openBonus('${w.workerId}')">🎁</button><button class="eb" title="دين" onclick="openDebt('${w.workerId}')">📋</button><button class="pb" title="الحساب" onclick="selectSettlement('${w.workerId}')">💳</button></div></div>`;}
function renderWorkers(){let workers=sortedWorkers(true);$('#page-workers').innerHTML=`<div class="pgtitle">👷 العمال</div><div class="pgsub">الترتيب حسب تاريخ الدخول. تاريخ الدخول الحقيقي ثابت؛ تغيير الاستحقاق له عملية مستقلة.</div><div class="sec"><div class="sechdr"><h3>قائمة العمال</h3><div class="v200-toolbar"><input id="workerSearch" class="sinp" placeholder="بحث بالاسم أو ID" oninput="filterWorkers(this.value)"><button class="btn1" onclick="openWorkerForm()">➕ إضافة عامل</button></div></div><div class="secbody"><div id="workerList" class="v200-list">${workers.map(w=>`<div class="v200-worker workerItem" data-q="${esc((w.name+' '+w.workerId).toLowerCase())}">${workerCard(w).replace(/^<div class="v200-worker">|<\/div>$/g,'')}</div>`).join('')||'<div class="v200-empty">لا يوجد عمال.</div>'}</div></div></div>`;}
function filterWorkers(q){q=clean(q).toLowerCase();$$('.workerItem').forEach(x=>x.style.display=x.dataset.q.includes(q)?'':'none');}
function recordRows(type){return activeTx().filter(t=>t.type===type).sort((a,b)=>String(b.effectiveDate).localeCompare(String(a.effectiveDate))||String(b.enteredAt).localeCompare(String(a.enteredAt)));}
function renderRecords(type,id,title,add){let rows=recordRows(type);let click={advance:'openAdvance()',overtime:'openHours()',absence:'openAbsence()',bonus:'openBonus()'}[type]||'';$('#page-'+id).innerHTML=`<div class="pgtitle">${title}</div><div class="pgsub">كل عملية تحمل ID ثابتاً ولا تُحذف نهائياً؛ الحذف ينقلها فقط إلى مركز الاسترجاع.</div><div class="twrap"><div class="thdr"><h3>${title}</h3><button class="btn1" onclick="${click}">➕ ${add}</button></div><div class="v200-table-wrap"><table class="v200-table"><thead><tr><th>التاريخ</th><th>العامل</th><th>التفاصيل</th><th>المبلغ</th><th>ID</th><th></th></tr></thead><tbody>${rows.map(t=>recordRow(t)).join('')||'<tr><td colspan="6">لا توجد عمليات.</td></tr>'}</tbody></table></div></div>`;}
function recordRow(t){let w=workerById(t.workerId),detail='';if(t.type==='advance')detail=`نقد: ${money(t.cashPaid??t.grossAmount)}${Number(t.debtInstallment||0)>0?' · قسط دين: '+money(t.debtInstallment):''}`;else if(t.type==='overtime')detail=`${t.hours||0} سا × ${money(t.rate||0)}`;else if(t.type==='absence')detail=`${t.days||0} يوم · ${dateAr(t.rangeStart||t.effectiveDate)} → ${dateAr(t.rangeEnd||t.effectiveDate)}`;else detail=esc(t.note||'—');return `<tr><td>${dateAr(t.effectiveDate)}</td><td>${esc(w?.name||'—')}</td><td>${detail}</td><td>${money(t.grossAmount)}</td><td class="mono">${esc(t.transactionId)}</td><td><button class="db" onclick="deleteTx('${t.transactionId}')">🗑</button></td></tr>`;}
function renderDebts(){let rows=recordRows('debt');$('#page-debts').innerHTML=`<div class="pgtitle">📋 الديون</div><div class="pgsub">الدين مستقل عن الراتب. لا يخصم منه إلا القسط الذي تسجله أنت.</div><div class="twrap"><div class="thdr"><h3>ديون العمال</h3><button class="btn1" onclick="openDebt()">➕ تسجيل دين</button></div><div class="v200-table-wrap"><table class="v200-table"><thead><tr><th>العامل</th><th>تاريخ الدين</th><th>الأصل</th><th>المسدد</th><th>المتبقي</th><th>قسط</th><th></th></tr></thead><tbody>${rows.map(d=>{let w=workerById(d.workerId),paid=debtPaid(d.transactionId),rem=debtRemaining(d);return `<tr><td>${esc(w?.name||'—')}</td><td>${dateAr(d.effectiveDate)}</td><td>${money(d.principal??d.grossAmount)}</td><td>${money(paid)}</td><td class="${rem>0?'negative':'positive'}">${money(rem)}</td><td>${Number(d.installmentAmount||0)>0?money(d.installmentAmount):'—'}</td><td>${rem>0?`<button class="eb" onclick="openDebtPayment('${d.transactionId}')">تسجيل قسط</button>`:''} <button class="db" onclick="deleteTx('${d.transactionId}')">🗑</button></td></tr>`;}).join('')||'<tr><td colspan="7">لا توجد ديون.</td></tr>'}</tbody></table></div></div><div class="sec"><div class="sechdr"><h3>عمال خرجوا وعليهم دين</h3></div><div class="secbody">${sortedWorkers(true).filter(w=>w.status==='exited'&&totalDebt(w)>0).map(w=>`<div class="v200-cycle-card"><b>${esc(w.name)}</b> · <span class="negative">عليه ${money(totalDebt(w))}</span></div>`).join('')||'<div class="small-note">لا يوجد عمال خارجون عليهم دين.</div>'}</div></div>`;}
function selectSettlement(workerId){currentWorkerId=workerId;showPage('settlement');}
function renderSettlement(){let workers=sortedWorkers(true),w=workerById(currentWorkerId)||workers[0];if(w)currentWorkerId=w.workerId;$('#page-settlement').innerHTML=`<div class="pgtitle">💳 التصفية المالية</div><div class="pgsub">العبارة واضحة دائماً: <b>عليك للعامل</b> أو <b>عليه للمؤسسة</b>. التصفية تشمل الدورات السابقة والأجور المعلقة والديون.</div><div class="sec"><div class="sechdr"><h3>اختر العامل</h3><div class="v200-toolbar"><select id="settlementWorker" class="sinp" onchange="selectSettlement(this.value)">${workerOptions(w?.workerId,true)}</select>${w&&w.status!=='exited'?`<button class="btn3" onclick="openExit('${w.workerId}')">تسجيل خروج</button>`:''}</div></div><div class="secbody" id="settlementBody">${w?settlementHtml(w):'<div class="v200-empty">لا يوجد عامل.</div>'}</div></div>`;}
function settlementHtml(w){let isFinal=!!w.exitDate,s=workerSettlement(w,isFinal?w.exitDate:today(),isFinal);let cycleRows=s.cycles.map(x=>`<div class="v200-cycle-card"><div class="v200-cycle-row"><div><b>${dateAr(x.cycle.startDate)} → ${dateAr(x.cycle.endDate)}</b><div class="small-note">أساسي ${money(x.base)} · ساعات ${money(x.overtime)} · مكافآت ${money(x.bonus)} · غياب ${money(x.absence)} · قسط دين ${money(x.manualDebt)} · تسبيقات ${money(x.advances)}</div><div class="small-note">ترتيب الخصم: ساعات ${money(x.alloc.fromOvertime)} ثم مكافآت ${money(x.alloc.fromBonus)} ثم راتب ${money(x.alloc.fromBase)}</div></div><div>${statusText(x.balance,x.advances)}<div class="small-note">${x.baseMode==='exit'?'خروج: '+x.baseDays+' يوم':x.baseMode==='provisional'?'مؤقت حتى اليوم: '+x.baseDays+' يوم':'دورة كاملة'}</div></div></div></div>`).join('');let trans=s.trans.map(x=>`<div class="v200-cycle-card"><b>تسوية تغيير الاستحقاق</b> · ${dateAr(x.t.rangeStart)} → ${dateAr(x.t.rangeEnd)} · ${x.t.days} يوم<br><span class="small-note">أجر أيام أساسي فقط: ${money(x.gross)} · مدفوع: ${money(x.advances)}</span><div style="margin-top:4px">${statusText(x.balance,x.advances)}</div></div>`).join('');return `<div class="v200-grid"><div class="v200-stat"><small>دورات وأجور معلقة</small><b>${money(s.cyclesNet)}</b></div><div class="v200-stat"><small>الدين المتبقي للمؤسسة</small><b class="negative">${money(s.debt)}</b></div><div class="v200-stat"><small>${isFinal?'نتيجة التصفية النهائية':'التصفية المؤقتة حتى اليوم'}</small><b class="${s.net>=0?'warning':'negative'}">${s.net>=0?'عليك للعامل ':'عليه للمؤسسة '}${money(absN(s.net))}</b></div></div><div class="notice ${s.net>=0?'warn':'danger'}" style="margin-top:14px"><b>${isFinal?'التصفية النهائية':'التصفية المؤقتة'}:</b> ${s.net>=0?'المؤسسة تدفع للعامل ':'العامل مدين للمؤسسة '}<b>${money(absN(s.net))}</b>${isFinal?'<br><span class="small-note">تجمع الأجور المعلقة السابقة وآخر دورة وتطرح الدين المتبقي، مع بقاء كل دورة مفصلة أدناه.</span>':''}</div><h3 style="margin:18px 0 9px;color:var(--green1)">تفاصيل الدورات</h3>${cycleRows||'<div class="v200-empty">لا توجد دورات.</div>'}${trans?'<h3 style="margin:18px 0 9px;color:var(--green1)">تسويات تغيير الاستحقاق</h3>'+trans:''}`;}
function totalOutstandingWages(){return sortedWorkers(true).reduce((sum,w)=>{let s=workerSettlement(w,w.exitDate||today(),!!w.exitDate);return sum+Math.max(0,s.cyclesNet);},0);}
function renderSummary(){let ws=sortedWorkers(true),act=activeTx();let due=ws.reduce((s,w)=>s+Math.max(0,workerSettlement(w,w.exitDate||today(),!!w.exitDate).net),0),owed=ws.reduce((s,w)=>s+Math.max(0,-workerSettlement(w,w.exitDate||today(),!!w.exitDate).net),0);$('#page-summary').innerHTML=`<div class="pgtitle">📊 الحصيلة العامة</div><div class="pgsub">ملخص حسب البيانات الحالية؛ كل رقم يرجع لنفس محرك الحساب المستخدم في التصفية والطباعة.</div><div class="v200-grid"><div class="v200-stat"><small>عمال نشطون</small><b>${ws.filter(w=>w.status!=='exited').length}</b></div><div class="v200-stat"><small>عليك للعمال</small><b class="warning">${money(due)}</b></div><div class="v200-stat"><small>على العمال للمؤسسة</small><b class="negative">${money(owed)}</b></div><div class="v200-stat"><small>العمليات النشطة</small><b>${act.length}</b></div></div><div class="sec" style="margin-top:18px"><div class="sechdr"><h3>الحالة حسب العامل</h3></div><div class="secbody">${ws.map(w=>{let s=workerSettlement(w,w.exitDate||today(),!!w.exitDate);return `<div class="v200-cycle-card"><div class="v200-cycle-row"><div><b>${esc(w.name)}</b><br><span class="small-note">دخول ${dateAr(w.startDate)} · يوم الاستحقاق ${w.payday}</span></div><div>${s.net>=0?`<span class="warning">عليك ${money(s.net)}</span>`:`<span class="negative">عليه ${money(-s.net)}</span>`}</div></div></div>`;}).join('')}</div></div>`;}
function renderPrint(){let workers=sortedWorkers(true),w=workerById(currentWorkerId)||workers[0];$('#page-print').innerHTML=`<div class="pgtitle">🖨️ كشف وطباعة</div><div class="pgsub">الطباعة تقرأ نفس نتائج التصفية؛ لا يوجد حساب منفصل للطباعة.</div><div class="v200-print-controls no-print"><select id="printWorker" class="sinp" onchange="renderPrint()">${workerOptions(w?.workerId,true)}</select><button class="btn1" onclick="window.print()">🖨️ طباعة / حفظ PDF</button></div><div id="statementArea">${w?statementHtml(w):'<div class="v200-empty">لا يوجد عامل.</div>'}</div>`;let select=$('#printWorker');if(select)select.value=w?.workerId||'';}
function statementHtml(w){let s=workerSettlement(w,w.exitDate||today(),!!w.exitDate);return `<div class="v200-statement"><h2>EGTPH — كشف حساب العامل</h2><p><b>العامل:</b> ${esc(w.name)} · <b>ID:</b> <span class="mono">${esc(w.workerId)}</span><br><b>تاريخ الدخول:</b> ${dateAr(w.startDate)} · <b>يوم الاستحقاق:</b> ${w.payday} · <b>الراتب:</b> ${money(w.salary)}</p><table class="v200-table"><thead><tr><th>الدورة</th><th>أساسي</th><th>ساعات</th><th>مكافآت</th><th>غياب / قسط</th><th>تسبيقات</th><th>الصافي</th><th>الحالة</th></tr></thead><tbody>${s.cycles.map(x=>`<tr><td>${dateAr(x.cycle.startDate)} → ${dateAr(x.cycle.endDate)}</td><td>${money(x.base)}</td><td>${money(x.overtime)}</td><td>${money(x.bonus)}</td><td>${money(x.absence+x.manualDebt)}</td><td>${money(x.advances)}</td><td>${money(x.balance)}</td><td>${x.status}</td></tr>`).join('')}</tbody></table>${s.trans.length?`<h3 style="margin-top:16px">تسويات تغيير الاستحقاق</h3>${s.trans.map(x=>`<p>${dateAr(x.t.rangeStart)} → ${dateAr(x.t.rangeEnd)}: ${money(x.balance)}</p>`).join('')}`:''}<div class="notice ${s.net>=0?'warn':'danger'}" style="margin-top:16px"><b>${w.exitDate?'التصفية النهائية':'التصفية حتى اليوم'}:</b> ${s.net>=0?'عليك للعامل ':'عليه للمؤسسة '}<b>${money(absN(s.net))}</b></div></div>`;}
function renderSettings(){let s=state.settings.sync,status=authReady?'🟢 تم تسجيل الدخول — المزامنة مفعلة':'🔒 أدخل كلمة المرور أولاً لتبدأ المزامنة';$('#page-settings').innerHTML=`<div class="pgtitle">⚙️ الإعدادات</div><div class="pgsub">هنا فقط تجد الحفظ، الربط بين الهاتف والحاسوب، واسترجاع العمليات المحذوفة.</div><div class="v200-grid"><div class="v200-sync-card"><div class="v200-sync-status">${status}</div><p class="small-note">أول مرة على كل جهاز: تدخل كلمة مرور Firebase. بعدها يُحفظ token مؤقتاً ويتجدد تلقائياً. كلمة المرور لا تُخزّن داخل البرنامج.</p><div class="v200-toolbar"><button class="btn1" onclick="syncNow(true)">🔄 مزامنة الآن</button><button class="btn2" onclick="logoutThisDevice()">تسجيل خروج هذا الجهاز</button></div><p class="small-note">آخر مزامنة: ${esc(s.lastSyncAt||'لم تتم بعد')}</p></div><div class="v200-sync-card"><b>💾 النسخ الاحتياطية</b><p class="small-note">خذ نسخة قبل أي تعديل كبير.</p><div class="v200-toolbar"><button class="btn2" onclick="downloadJsonBackup()">تنزيل JSON</button><button class="btn2" onclick="downloadPortableHtml()">تنزيل HTML كامل</button></div></div><div class="v200-sync-card"><b>♻️ العمليات المحذوفة</b><p class="small-note">لا تعود أي عملية تلقائياً. الاسترجاع يكون باختيارك وبعد كتابة ID العملية.</p><button class="btn1" onclick="openRestoreCenter()">استرجاع العمليات المحذوفة</button></div></div><div class="sec" style="margin-top:18px"><div class="sechdr"><h3>سجل آخر العمليات</h3></div><div class="secbody"><div class="v200-list">${state.audit.slice(0,20).map(a=>`<div class="v200-cycle-card"><b>${esc(a.action)}</b><br><span class="small-note">${dateAr(a.at)} ${String(a.at||'').slice(11,16)} · ${esc(a.details||'')}</span></div>`).join('')||'<div class="small-note">لا يوجد سجل بعد.</div>'}</div></div></div>`;}
function renderSide(){if(!state)return;let ws=sortedWorkers(false);$('#sideFinStatus').innerHTML=ws.map((w,i)=>{let c=currentCycle(w),x=c?calcCycle(w,c,today()):null,s=workerSettlement(w,today(),false);return `<div style="background:${i%2?'rgba(255,255,255,.02)':'transparent'};border-bottom:1px solid rgba(255,255,255,.08);padding:7px 5px"><div style="display:flex;justify-content:space-between;gap:4px"><b style="font-size:10px;color:#fff">${i+1}. ${esc(w.name)}</b><span style="font-size:8px;color:#c9efda">يوم ${w.payday}</span></div><div style="font-size:9px;color:#b6d5c0;margin-top:2px">${c?dateAr(c.startDate)+' → '+dateAr(c.endDate):'—'}</div><div style="font-size:10px;font-weight:800;margin-top:3px;color:${s.net>=0?'#ffd47a':'#ff9ba7'}">${s.net>=0?'عليك ':'عليه '}${money(absN(s.net))}</div>${x?`<div style="font-size:9px;color:#dfece5;margin-top:2px">${x.status}</div>`:''}</div>`;}).join('')||'<div class="small-note">لا يوجد عمال.</div>';let top=$('#syncTopBtn');if(top)top.textContent=authReady?'☁️ متصل':'🔒 دخول';}

// ── Backup / portable export ──
function downloadFile(name,text,type='application/json;charset=utf-8'){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},1000);}
function exportState(){return clone(state);}function downloadJsonBackup(){downloadFile('EGTPH_v200_backup_'+today()+'.json',JSON.stringify(exportState(),null,2));toast('تم تنزيل نسخة JSON.');}
function downloadPortableHtml(){let h=document.documentElement.outerHTML.replace(/window\.__EGTPH_V200_SEED__\s*=\s*[\s\S]*?;\/\*EGTPH_V200_SEED_MARKER\*\//,'window.__EGTPH_V200_SEED__='+JSON.stringify(exportState()).replace(/<\//g,'<\\/')+';/*EGTPH_V200_SEED_MARKER*/');downloadFile('EGTPH_v200_'+today()+'.html',h,'text/html;charset=utf-8');toast('تم تنزيل HTML كامل بالبيانات الحالية.');}

// ── Authentication + immutable Firebase event sync ──
function syncBase(){let s=state.settings.sync;return s.databaseURL.replace(/\/+$/,'')+'/egtph/'+encodeURIComponent(s.workspaceKey)+'/'+SYNC_ROOT;}
async function syncFetch(path,opts={}){if(!authReady)throw new Error('أدخل كلمة المرور أولاً.');let token=window.EGTPHAuth?.getToken(AUTH_APP);if(!token)throw new Error('Token غير جاهز.');let sep=path.includes('?')?'&':'?';let res=await fetch(syncBase()+path+'.json'+sep+'auth='+encodeURIComponent(token),Object.assign({cache:'no-store'},opts));if(!res.ok)throw new Error('Firebase HTTP '+res.status);return res;}
async function syncNow(manual=false){if(!authReady){if(manual)toast('أدخل كلمة المرور أولاً؛ بعدها تبدأ المزامنة.','warn');return;}if(syncBusy)return;if(!navigator.onLine){toast('لا يوجد اتصال بالإنترنت.','err');return;}syncBusy=true;try{let remote=await (await syncFetch('')).json()||{};let all=Object.values(remote).filter(Boolean).sort((a,b)=>String(a.at).localeCompare(String(b.at))||String(a.eventId).localeCompare(String(b.eventId)));let pulled=0;for(let e of all){if(!state.appliedEvents[e.eventId]){applyEvent(e);pulled++;}}let pending=Object.values(state.outbox).sort((a,b)=>String(a.at).localeCompare(String(b.at)));let pushed=0;for(let e of pending){let existing=await (await syncFetch('/'+encodeURIComponent(e.eventId))).json();if(existing){delete state.outbox[e.eventId];continue;}let up=await syncFetch('/'+encodeURIComponent(e.eventId),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(e)});await up.json();delete state.outbox[e.eventId];pushed++;}state.settings.sync.lastSyncAt=now();state.settings.sync.status='synced';if(pulled)audit('مزامنة: '+pulled+' عملية من الجهاز الآخر','');await persist(true);renderAll();if(manual)toast(pushed||pulled?`تمت المزامنة: +${pulled} سحب / +${pushed} رفع`:'كل شيء متزامن.');}catch(e){state.settings.sync.status='error';await persist(true);if(manual)toast('تعذر الاتصال بالمزامنة: '+e.message,'err');console.error(e);}finally{syncBusy=false;}}
function startAuth(){window.EGTPHAuth.init({appId:AUTH_APP,apiKey:state.settings.sync.apiKey,email:state.settings.sync.email,onReady:async()=>{authReady=true;state.settings.sync.status='authenticated';await persist(true);renderAll();setTimeout(()=>syncNow(false),250);}});}
function logoutThisDevice(){window.EGTPHAuth.logout(AUTH_APP);authReady=false;state.settings.sync.status='not_authenticated';persist(true);renderAll();toast('تم تسجيل الخروج من هذا الجهاز. عند إعادة الفتح ستدخل كلمة المرور من جديد.','warn');}

async function boot(){await loadState();renderAll();startAuth();setInterval(()=>{if(authReady&&state.settings.sync.auto)syncNow(false);},90000);}
window.showPage=showPage;window.goBackPage=goBackPage;window.cycleTheme=cycleTheme;window.openWorkerForm=openWorkerForm;window.saveWorkerFromForm=saveWorkerFromForm;window.chooseWorkerFor=chooseWorkerFor;window.openAdvance=openAdvance;window.updateAdvanceCash=updateAdvanceCash;window.saveAdvance=saveAdvance;window.openHours=openHours;window.saveHours=saveHours;window.openBonus=openBonus;window.saveBonus=saveBonus;window.openAbsence=openAbsence;window.saveAbsence=saveAbsence;window.openDebt=openDebt;window.saveDebt=saveDebt;window.openDebtPayment=openDebtPayment;window.saveDebtPayment=saveDebtPayment;window.openPaydayChange=openPaydayChange;window.previewPaydayChange=previewPaydayChange;window.savePaydayChange=savePaydayChange;window.openExit=openExit;window.saveExit=saveExit;window.deleteTx=deleteTx;window.confirmDelete=confirmDelete;window.openRestoreCenter=openRestoreCenter;window.filterRestore=filterRestore;window.openRestoreConfirm=openRestoreConfirm;window.confirmRestore=confirmRestore;window.selectSettlement=selectSettlement;window.filterWorkers=filterWorkers;window.renderPrint=renderPrint;window.syncNow=syncNow;window.logoutThisDevice=logoutThisDevice;window.downloadJsonBackup=downloadJsonBackup;window.downloadPortableHtml=downloadPortableHtml;window.closeModal=closeModal;
window.addEventListener('DOMContentLoaded',boot);
</script>
</body></html>
