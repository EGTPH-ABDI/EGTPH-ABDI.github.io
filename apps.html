<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="dark light">
<title>لوحة برامج EGTPH</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cinzel:wght@600&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-deep:#15171c; --bg-elevate:#1f222a; --bg-elevate-2:#262a33;
  --line-dark:#2a2e37;
  --text-onDark:#e9ebee; --text-onDark-muted:#8b9099;
  --accent:#ff7a1a; --accent-dim:#cc6314; --accent-soft:rgba(255,122,26,.14); --accent-soft-2:rgba(255,122,26,.28);
  --content-bg:#f3f4f6; --ink:#15171c; --muted:#6b7280; --line-light:#e2e4e8; --card:#ffffff;
  --danger:#e0493c; --danger-soft:rgba(224,73,60,.12);
  --font-lat:"Inter",sans-serif;
  --font-ar:"IBM Plex Sans Arabic",sans-serif;
  --font-mono:"IBM Plex Mono",monospace;
  --topbar-h:56px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg-deep)}
body{font-family:var(--font-ar);color:var(--text-onDark);font-size:14px}
html[lang="fr"] body{font-family:var(--font-lat)}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit}
svg{display:block}
:focus-visible{outline:2.5px solid var(--accent);outline-offset:2px}
[hidden]{display:none!important}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}

.shell{display:flex;flex-direction:column;height:100%}

/* ---------- topbar ---------- */
.topbar{flex:0 0 var(--topbar-h);height:var(--topbar-h);display:flex;align-items:center;gap:8px;padding:0 12px;
  background:var(--bg-deep);border-bottom:1px solid var(--line-dark);position:relative;z-index:70}
.hamburger{display:none;width:36px;height:36px;border-radius:9px;align-items:center;justify-content:center;flex:0 0 36px}
.hamburger:hover{background:var(--bg-elevate)}
.hamburger svg{width:20px;height:20px;stroke:var(--text-onDark)}
.brand{display:flex;align-items:center;gap:9px;flex:0 0 auto;padding:6px 4px;border-radius:9px}
.brand:hover{background:var(--bg-elevate)}
.brand .crest{width:28px;height:28px;flex:0 0 28px}
.brand b{font-family:var(--font-mono);font-weight:600;color:var(--text-onDark);font-size:.86rem;letter-spacing:.08em}
.current-title{font-family:var(--font-mono);font-size:.76rem;color:var(--text-onDark-muted);letter-spacing:.03em;
  border-inline-start:1px solid var(--line-dark);padding-inline-start:12px;margin-inline-start:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(max-width:620px){.current-title{display:none}}
.app-tools{display:flex;align-items:center;gap:2px}
.icon-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-onDark-muted)}
.icon-btn:hover{background:var(--bg-elevate);color:var(--text-onDark)}
.icon-btn svg{width:16px;height:16px;stroke:currentColor}
.topbar-actions{display:flex;align-items:center;gap:8px;margin-inline-start:auto}
.edit-toggle{display:flex;align-items:center;gap:6px;font-size:.78rem;font-weight:600;color:var(--text-onDark);padding:8px 12px;border-radius:9px;border:1px solid var(--line-dark)}
.edit-toggle svg{width:14px;height:14px;stroke:var(--text-onDark)}
.edit-toggle:hover{background:var(--bg-elevate)}
.edit-toggle.active{background:var(--accent);color:#1a0f06;border-color:var(--accent)}
.edit-toggle.active svg{stroke:#1a0f06}
@media(max-width:480px){.edit-toggle span{display:none}}
.lang-btn{font-family:var(--font-mono);font-weight:700;font-size:.74rem;letter-spacing:.06em;padding:8px 13px;border-radius:9px;
  background:var(--accent);color:#1a0f06}
.lang-btn:hover{background:#ff8c3a}

/* ---------- body row ---------- */
.body-row{flex:1 1 auto;display:flex;min-height:0;position:relative}

/* ---------- sidebar ---------- */
.sidebar{flex:0 0 270px;display:flex;flex-direction:column;background:var(--bg-deep);border-inline-end:1px solid var(--line-dark);min-height:0}
.sidebar-search{flex:0 0 auto;padding:12px 12px 0}
.sidebar-search input{width:100%;padding:9px 12px;border-radius:9px;border:1.3px solid var(--line-dark);background:var(--bg-elevate);
  font-family:inherit;font-size:.84rem;color:var(--text-onDark)}
.sidebar-search input:focus{outline:none;border-color:var(--accent)}
.sidebar-search input::placeholder{color:var(--text-onDark-muted)}

.dash-nav{margin:10px 12px 4px;display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;
  font-size:.87rem;font-weight:600;color:var(--text-onDark);border-inline-start:3px solid transparent;cursor:pointer}
.dash-nav:hover{background:var(--bg-elevate)}
.dash-nav.active{background:var(--accent-soft);border-inline-start:3px solid var(--accent)}
.dash-nav.active svg{stroke:var(--accent)}
.dash-nav svg{width:18px;height:18px;stroke:var(--text-onDark-muted);flex:0 0 18px}

.sidebar-scroll{flex:1 1 auto;overflow-y:auto;padding:6px 10px 10px}
.cat-group{margin-bottom:14px}
.cat-label{font-family:var(--font-mono);font-size:.66rem;font-weight:600;letter-spacing:.1em;color:var(--text-onDark-muted);
  text-transform:uppercase;padding:8px 8px 5px}
.app-list{list-style:none}
.app-item{display:flex;align-items:stretch;border-radius:9px;margin-bottom:2px}
.app-item.active{background:var(--accent-soft)}
.app-item.active .app-link{border-inline-start:3px solid var(--accent);padding-inline-start:9px}
.app-item.hidden-by-search{display:none}
.app-link{flex:1 1 auto;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;border-inline-start:3px solid transparent;
  font-size:.87rem;color:var(--text-onDark);text-align:start;min-width:0;cursor:pointer}
.app-item:not(.active) .app-link:hover{background:var(--bg-elevate)}
.app-link .ic{flex:0 0 19px;width:19px;height:19px;stroke:var(--text-onDark-muted)}
.app-item.active .app-link .ic{stroke:var(--accent)}
.app-link .lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1 1 auto}
.rename-input{flex:1 1 auto;min-width:0;font-family:inherit;font-size:.87rem;padding:3px 6px;border-radius:6px;border:1.3px solid var(--accent);
  background:var(--bg-elevate-2);color:var(--text-onDark)}
.edit-controls{display:none;align-items:center;gap:1px;padding-inline-end:4px}
.sidebar.edit-mode .edit-controls{display:flex}
.ctl-btn{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--text-onDark-muted)}
.ctl-btn:hover{background:var(--bg-elevate-2);color:var(--text-onDark)}
.ctl-btn.danger:hover{background:rgba(220,80,60,.25);color:#ff8a78}
.ctl-btn:disabled{opacity:.25;pointer-events:none}
.ctl-btn svg{width:13px;height:13px;stroke:currentColor}

/* ---------- sidebar footer / add-app / password ---------- */
.sidebar-footer{flex:0 0 auto;border-top:1px solid var(--line-dark);padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.edit-only{display:none}
.sidebar.edit-mode .edit-only{display:block}
.add-app-toggle{display:flex;align-items:center;gap:6px;width:100%;justify-content:center;font-size:.8rem;font-weight:600;
  padding:8px;border-radius:9px;border:1.3px dashed var(--line-dark);color:var(--text-onDark-muted)}
.add-app-toggle:hover{border-color:var(--accent);color:var(--accent)}
.add-app-toggle svg{width:14px;height:14px;stroke:currentColor}
.add-app-form{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.add-app-form input,.add-app-form select{width:100%;padding:8px 10px;border-radius:8px;border:1.3px solid var(--line-dark);
  background:var(--bg-elevate);color:var(--text-onDark);font-size:.82rem}
.add-app-form input:focus,.add-app-form select:focus{outline:none;border-color:var(--accent)}
.add-app-actions{display:flex;gap:8px;margin-top:2px}
.add-app-save{flex:1 1 auto;padding:8px;border-radius:8px;background:var(--accent);color:#1a0f06;font-weight:700;font-size:.8rem;text-align:center}
.add-app-save:hover{background:#ff8c3a}
.add-app-cancel{flex:0 0 auto;padding:8px 12px;border-radius:8px;border:1px solid var(--line-dark);color:var(--text-onDark-muted);font-size:.8rem}
.add-app-cancel:hover{color:var(--text-onDark)}
.reset-link{font-size:.78rem;color:#ff8a78;font-weight:600;text-align:start;width:100%}
.reset-link:hover{text-decoration:underline}
.back-link{font-size:.8rem;color:var(--text-onDark-muted);font-weight:600}
.back-link:hover{color:var(--text-onDark)}
.pass-msg{font-size:.74rem;margin-top:2px}
.pass-msg.ok{color:#7fd99a}
.pass-msg.err{color:#ff8a78}

/* ---------- content area ---------- */
.content{flex:1 1 auto;position:relative;background:#fff;min-width:0}
.content iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#fff}

/* ---------- dashboard / welcome ---------- */
.welcome{position:absolute;inset:0;overflow-y:auto;background:var(--content-bg)}
.welcome-inner{max-width:960px;margin:0 auto;padding:30px 20px 50px}

.dash-hero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:26px 16px 32px;margin-bottom:8px}
.dash-hero-3d{width:108px;height:108px;perspective:600px;margin-bottom:14px}
.dash-hero-3d-inner{width:100%;height:100%;transform-style:preserve-3d;display:flex;align-items:center;justify-content:center;
  animation:idleTilt 7s ease-in-out infinite;filter:drop-shadow(0 14px 22px rgba(20,20,25,.18))}
@keyframes idleTilt{
  0%,100%{transform:rotateY(0deg) rotateX(0deg)}
  25%{transform:rotateY(14deg) rotateX(5deg)}
  50%{transform:rotateY(0deg) rotateX(-4deg)}
  75%{transform:rotateY(-14deg) rotateX(5deg)}
}
.dash-hero-3d-inner svg{width:96px;height:96px}
.dash-greeting{font-size:.92rem;color:var(--muted);font-weight:600}
.dash-clock{font-family:var(--font-mono);font-size:2.5rem;font-weight:600;color:var(--ink);letter-spacing:.02em;margin-top:4px}
.dash-date{font-size:.86rem;color:var(--muted);margin-top:4px;text-transform:capitalize}

.home-cat{margin-bottom:24px}
.home-cat-label{font-family:var(--font-mono);font-size:.7rem;font-weight:600;letter-spacing:.1em;color:var(--muted);
  text-transform:uppercase;margin-bottom:10px}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:12px}
.home-card{background:var(--card);border:1px solid var(--line-light);border-radius:13px;padding:14px 10px;display:flex;flex-direction:column;
  align-items:center;text-align:center;gap:9px;cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s}
.home-card:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(20,20,25,.1);border-color:var(--accent)}
.home-card .ic-box{width:46px;height:46px;border-radius:11px;background:var(--bg-deep);display:flex;align-items:center;justify-content:center}
.home-card .ic-box svg{width:22px;height:22px;stroke:var(--accent)}
.home-card .home-lbl{font-size:.78rem;color:var(--ink);font-weight:600;line-height:1.3}

/* ---------- loading / error state ---------- */
.loading,.frame-error{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--content-bg);gap:10px;flex-direction:column;padding:30px;text-align:center}
.spinner{width:28px;height:28px;border-radius:50%;border:3px solid var(--line-light);border-top-color:var(--accent);animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){.spinner{animation:none;border-top-color:var(--accent)}}
.loading span{font-size:.8rem;color:var(--muted);font-family:var(--font-mono)}
.frame-error .err-ic{width:46px;height:46px;border-radius:50%;background:var(--danger-soft);display:flex;align-items:center;justify-content:center}
.frame-error .err-ic svg{width:22px;height:22px;stroke:var(--danger)}
.frame-error h2{font-size:.98rem;color:var(--ink);font-weight:700}
.frame-error p{font-size:.84rem;color:var(--muted);max-width:320px}
.frame-error .err-detail{font-family:var(--font-mono);font-size:.72rem;color:var(--danger);background:var(--danger-soft);padding:6px 10px;border-radius:7px;max-width:90%;overflow-wrap:break-word}
.frame-error .err-actions{display:flex;gap:10px;margin-top:4px}
.err-btn{padding:9px 16px;border-radius:9px;font-size:.84rem;font-weight:600}
.err-btn.primary{background:var(--accent);color:#fff}
.err-btn.primary:hover{background:var(--accent-dim)}
.err-btn.ghost{border:1.3px solid var(--line-light);color:var(--ink)}
.err-btn.ghost:hover{border-color:var(--accent);color:var(--accent)}

/* ---------- in-app runtime error banner ---------- */
.runtime-err-banner{position:absolute;inset-inline:0;bottom:0;z-index:30;background:#2a1410;border-top:1px solid var(--danger);
  color:#ffd9d3;padding:10px 14px;display:flex;align-items:flex-start;gap:10px;font-size:.78rem}
.runtime-err-banner svg{width:16px;height:16px;stroke:#ff8a78;flex:0 0 16px;margin-top:1px}
.runtime-err-banner .msg{flex:1 1 auto;font-family:var(--font-mono);word-break:break-word}
.runtime-err-banner button{flex:0 0 auto;color:#ffd9d3;font-weight:700;font-size:.9rem;padding:0 4px}

/* ---------- overlay (mobile) ---------- */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:55;display:none}
.overlay.show{display:block}

/* ---------- lock screen ---------- */
.lock-screen{position:fixed;inset:0;z-index:9999;background:rgba(12,13,16,.94);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;padding:24px}
.lock-card{background:var(--bg-elevate);border:1px solid var(--line-dark);border-radius:16px;padding:32px 26px;width:100%;max-width:300px;
  text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.lock-card .crest{width:50px;height:50px;margin:0 auto 14px}
.lock-card h2{font-size:1rem;color:var(--text-onDark);font-weight:700;margin-bottom:4px}
.lock-card p{font-size:.8rem;color:var(--text-onDark-muted);margin-bottom:18px}
.lock-card input{width:100%;padding:11px 14px;border-radius:10px;border:1.3px solid var(--line-dark);background:var(--bg-elevate-2);
  color:var(--text-onDark);font-size:1rem;text-align:center;letter-spacing:.1em}
.lock-card input:focus{outline:none;border-color:var(--accent)}
.lock-card button{width:100%;margin-top:12px;padding:11px;border-radius:10px;background:var(--accent);color:#1a0f06;font-weight:700;font-size:.88rem}
.lock-card button:hover{background:#ff8c3a}
.lock-err{color:#ff8a78;font-size:.8rem;margin-top:10px;min-height:1em}

/* ---------- mobile ---------- */
@media(max-width:880px){
  .hamburger{display:flex}
  .sidebar{position:fixed;top:var(--topbar-h);bottom:0;width:86vw;max-width:320px;z-index:60;transition:transform .25s ease;box-shadow:0 10px 40px rgba(0,0,0,.4)}
  html[dir="rtl"] .sidebar{right:0;transform:translateX(100%)}
  html[dir="rtl"] .sidebar.open{transform:translateX(0)}
  html[dir="ltr"] .sidebar{left:0;transform:translateX(-100%)}
  html[dir="ltr"] .sidebar.open{transform:translateX(0)}
}
</style>
</head>
<body>

<div class="lock-screen" id="lockScreen" hidden>
  <div class="lock-card">
    <svg class="crest" viewBox="0 0 100 100" aria-hidden="true">
      <path d="M50 4 L90 18 V52 C90 74 72 90 50 96 C28 90 10 74 10 52 V18 Z" fill="none" stroke="#c8a86a" stroke-width="2.5"/>
      <path d="M50 11 L83 22 V51 C83 69 68 83 50 88 C32 83 17 69 17 51 V22 Z" fill="#0a161a"/>
      <text x="50" y="58" font-family="Cinzel,serif" font-size="30" fill="#c8a86a" text-anchor="middle" font-weight="600">EG</text>
      <path d="M34 66 h32" stroke="#c8a86a" stroke-width="1.6"/>
      <text x="50" y="78" font-family="Cinzel,serif" font-size="9" fill="#c8a86a" text-anchor="middle" letter-spacing="2">TPH</text>
    </svg>
    <h2 data-ar="مؤمّن بكلمة سر" data-fr="Protégé par mot de passe">مؤمّن بكلمة سر</h2>
    <p data-ar="أدخل كلمة السر للدخول" data-fr="Entrez le mot de passe pour continuer">أدخل كلمة السر للدخول</p>
    <form id="lockForm">
      <input type="password" id="lockInput" autocomplete="off" autofocus>
      <button type="submit" data-ar="دخول" data-fr="Entrer">دخول</button>
    </form>
    <div class="lock-err" id="lockErr"></div>
  </div>
</div>

<div class="shell">

  <header class="topbar">
    <button class="hamburger" id="menuToggle" aria-label="فتح القائمة" aria-expanded="false">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <a class="brand" href="#" id="brandHome">
      <svg class="crest" viewBox="0 0 100 100" aria-label="EGTPH">
        <path d="M50 4 L90 18 V52 C90 74 72 90 50 96 C28 90 10 74 10 52 V18 Z" fill="none" stroke="#c8a86a" stroke-width="2.5"/>
        <path d="M50 11 L83 22 V51 C83 69 68 83 50 88 C32 83 17 69 17 51 V22 Z" fill="#0a161a"/>
        <text x="50" y="58" font-family="Cinzel,serif" font-size="30" fill="#c8a86a" text-anchor="middle" font-weight="600">EG</text>
        <path d="M34 66 h32" stroke="#c8a86a" stroke-width="1.6"/>
        <text x="50" y="78" font-family="Cinzel,serif" font-size="9" fill="#c8a86a" text-anchor="middle" letter-spacing="2">TPH</text>
      </svg>
      <b>EGTPH</b>
    </a>
    <span class="current-title" id="currentTitle"></span>
    <span class="app-tools" id="appTools" hidden>
      <button class="icon-btn" id="reloadBtn" aria-label="reload" title="إعادة تحميل البرنامج">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 2.6-6.4L3 8"/><path d="M3 3v5h5"/></svg>
      </button>
      <button class="icon-btn" id="openDirectBtn" aria-label="open in new tab" title="فتح في نافذة جديدة">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14 21 3"/></svg>
      </button>
    </span>
    <div class="topbar-actions">
      <button class="edit-toggle" id="editToggle" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        <span data-ar="تعديل القائمة" data-fr="Modifier le menu">تعديل القائمة</span>
      </button>
      <button class="lang-btn" id="langBtn" aria-label="Changer de langue">FR</button>
    </div>
  </header>

  <div class="body-row">

    <nav class="sidebar" id="sidebar">
      <div class="sidebar-search">
        <input type="text" id="appSearch" autocomplete="off"
          data-ph-ar="بحث في البرامج…" data-ph-fr="Rechercher…" placeholder="بحث في البرامج…">
      </div>
      <div class="dash-nav" id="dashNav" role="button" tabindex="0">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
        <span data-ar="لوحة المعلومات" data-fr="Dashboard">لوحة المعلومات</span>
      </div>
      <div class="sidebar-scroll" id="sidebarScroll"></div>
      <div class="sidebar-footer">
        <div class="edit-only" id="addAppBlock">
          <button type="button" id="addAppToggle" class="add-app-toggle">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            <span data-ar="إضافة برنامج" data-fr="Ajouter un programme">إضافة برنامج</span>
          </button>
          <form id="addAppForm" class="add-app-form" hidden>
            <input type="text" id="newAppName" data-ph-ar="اسم البرنامج" data-ph-fr="Nom du programme" placeholder="اسم البرنامج" required>

/* ---------- simple hashing (no real security; just avoids plaintext at rest) ---------- */
function simpleHashSync(str){
  var h = 5381;
  for(var i=0;i<str.length;i++){ h = ((h*33) ^ str.charCodeAt(i)) >>> 0; }
  return 'sh_' + h.toString(16);
}
function hashPassword(pw){
  if(window.crypto && window.crypto.subtle && window.isSecureContext!==false){
    try{
      var enc = new TextEncoder().encode(pw);
      return crypto.subtle.digest('SHA-256', enc).then(function(buf){
        var bytes = new Uint8Array(buf);
        var hex = '';
        for(var i=0;i<bytes.length;i++){ hex += bytes[i].toString(16).padStart(2,'0'); }
        return hex;
      }).catch(function(){ return simpleHashSync(pw); });
    }catch(e){ return Promise.resolve(simpleHashSync(pw)); }
  }
  return Promise.resolve(simpleHashSync(pw));
}

function loadJSON(key, fallback){
  try{ var v=JSON.parse(localStorage.getItem(key)); return v==null?fallback:v; }catch(e){ return fallback; }
}
function saveJSON(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){} }

var customApps = (function(){
  var saved = loadJSON(CUSTOM_KEY, {});
  return (typeof saved==='object' && saved) ? saved : {};
})();
var names = (function(){
  var saved = loadJSON(NAMES_KEY, {});
  if(typeof saved!=='object'||!saved) saved={};
  return saved;
})();

function appExists(id){ return BUILT_IN.hasOwnProperty(id) || customApps.hasOwnProperty(id); }
function isCustomApp(id){ return customApps.hasOwnProperty(id); }

function getCat(id){ return BUILT_IN[id] ? BUILT_IN[id].cat : (customApps[id] ? customApps[id].cat : 'other'); }
function getIconKey(id){ return BUILT_IN[id] ? BUILT_IN[id].icon : 'custom'; }
function getDefaultLabel(id){
  if(BUILT_IN[id]) return isFr() ? BUILT_IN[id].fr : BUILT_IN[id].ar;
  return customApps[id] ? customApps[id].label : id;
}
function displayLabel(id){ return names[id] ? names[id] : getDefaultLabel(id); }
function isFr(){ return html.lang==='fr'; }

var order = (function(){
  var saved = loadJSON(ORDER_KEY, []);
  if(!Array.isArray(saved)) saved=[];
  var valid = saved.filter(function(id){ return appExists(id); });

  Object.keys(customApps).forEach(function(id){ if(valid.indexOf(id)===-1) valid.push(id); });
  return valid;
})();

function saveOrder(){ saveJSON(ORDER_KEY, order); }
function saveNames(){ saveJSON(NAMES_KEY, names); }
function saveCustom(){ saveJSON(CUSTOM_KEY, customApps); }

function renderSidebar(){

          '<button type="button" class="ctl-btn" data-action="rename" aria-label="rename"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>';

/* ---------- dashboard: clock / date / greeting / 3D tilt ---------- */
function getGreeting(){
  var h = new Date().getHours();
  if(isFr()) return h<18 ? 'Bonjour' : 'Bonsoir';
  return h<12 ? 'صباح الخير' : 'مساء الخير';
}
function updateClock(){
  var now = new Date();
  var pad = function(n){ return String(n).padStart(2,'0'); };
  dashClock.textContent = pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  var locale = isFr() ? 'fr-FR' : 'ar-DZ';
  try{
    dashDate.textContent = now.toLocaleDateString(locale, {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  }catch(e){
    dashDate.textContent = now.toLocaleDateString();
  }
  dashGreeting.textContent = getGreeting();
}
setInterval(updateClock, 1000);

(function(){
  var reduced = window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduced) return;
  function handleTilt(e){
    var rect = dashHero3d.getBoundingClientRect();
    var x = (e.clientX - rect.left)/rect.width - 0.5;
    var y = (e.clientY - rect.top)/rect.height - 0.5;
    dashHero3dInner.style.animation = 'none';
    dashHero3dInner.style.transform = 'rotateY('+(x*22).toFixed(1)+'deg) rotateX('+(-y*22).toFixed(1)+'deg)';
  }
  function resetTilt(){
    dashHero3dInner.style.transform = '';
    dashHero3dInner.style.animation = '';
  }
  dashHero3d.addEventListener('pointermove', handleTilt);
  dashHero3d.addEventListener('pointerleave', resetTilt);
  dashHero3d.addEventListener('pointerup', resetTilt);
})();

/* ---------- app switching ---------- */
function clearLoadTimer(){ if(loadTimer){ clearTimeout(loadTimer); loadTimer=null; } }
function detachErrListener(){
  if(errListenerWin && errListenerWin.__egtphErrHandler){
    try{ errListenerWin.removeEventListener('error', errListenerWin.__egtphErrHandler); }catch(e){}
  }
  errListenerWin=null;
}
function showRuntimeError(message){
  runtimeErrMsg.textContent = message;
  runtimeErrBanner.hidden = false;
}
runtimeErrClose.addEventListener('click', function(){ runtimeErrBanner.hidden=true; });

function attachErrListener(){
  detachErrListener();
  try{
    var win = frame.contentWindow;
    if(!win) return;
    var handler = function(ev){
      var msg = (ev && ev.message) ? ev.message : (isFr()?'Erreur inconnue':'خطأ غير معروف');
      showRuntimeError(msg);
    };
    win.addEventListener('error', handler);
    win.__egtphErrHandler = handler;
    errListenerWin = win;
  }catch(e){}
}

function setDashNavActive(on){
  dashNav.classList.toggle('active', on);
}

function selectApp(id, opts){
  opts = opts || {};
  if(!appExists(id)) return;
  activeId = id;
  setDashNavActive(false);
  document.querySelectorAll('.app-item').forEach(function(li){ li.classList.toggle('active', li.dataset.appId===id); });
  currentTitle.textContent = displayLabel(id);
  appTools.hidden = false;
  runtimeErrBanner.hidden = true;
  welcome.hidden = true;
  frame.hidden = true;
  frameError.hidden = true;
  loading.hidden = false;
  clearLoadTimer();
  detachErrListener();

  var url = getHref(id) + (getHref(id).indexOf('?')===-1 ? '?' : '&') + 't=' + Date.now();
  frame.src = url;

  loadTimer = setTimeout(function(){
    loading.hidden = true;
    frame.hidden = true;
    frameError.hidden = false;
    errDetail.hidden = true;
    errOpenDirect.href = getHref(id);
  }, LOAD_TIMEOUT_MS);

  saveJSON(LAST_KEY, id);
  if(!opts.skipHistory){ history.pushState({app:id}, '', '#'+id); }
  closeDrawer();
}
function showWelcome(opts){
  opts = opts || {};
  activeId = null;
  setDashNavActive(true);
  document.querySelectorAll('.app-item').forEach(function(li){ li.classList.remove('active'); });
  currentTitle.textContent = isFr() ? 'Dashboard' : 'لوحة المعلومات';
  appTools.hidden = true;
  runtimeErrBanner.hidden = true;
  clearLoadTimer();
  detachErrListener();
  renderWelcomeCards();
  updateClock();
  welcome.hidden=false; loading.hidden=true; frame.hidden=true; frameError.hidden=true;
  frame.removeAttribute('src');
  if(!opts.skipHistory){ history.pushState({}, '', location.pathname+location.search); }
  closeDrawer();
}
frame.addEventListener('load', function(){
  if(!frame.getAttribute('src')) return;
  clearLoadTimer();
  loading.hidden=true; frame.hidden=false; frameError.hidden=true;
  attachErrListener();
});

retryBtn.addEventListener('click', function(){ if(activeId) selectApp(activeId, {skipHistory:true}); });
reloadBtn.addEventListener('click', function(){ if(activeId) selectApp(activeId, {skipHistory:true}); });
openDirectBtn.addEventListener('click', function(){ if(activeId) window.open(getHref(activeId), '_blank', 'noopener'); });
dashNav.addEventListener('click', function(){ showWelcome(); });
dashNav.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); showWelcome(); } });

/* ---------- delegated clicks in sidebar (data-action, works for div or button) ---------- */
sidebarScroll.addEventListener('click', function(e){
  var btn = e.target.closest('[data-action]'); if(!btn) return;
  var li = btn.closest('.app-item'); if(!li) return;
  var id = li.dataset.appId, action = btn.dataset.action;
  if(action==='open'){ selectApp(id); }
  else if(action==='up' || action==='down'){ moveItem(id, action==='up'?-1:1); }
  else if(action==='rename'){ startRename(id, li.querySelector('.lbl')); }
  else if(action==='delete'){ deleteCustomApp(id); }
});
/* keyboard activation for the .app-link div — scoped to the link itself so it
   never fires while the rename <input> (a different target) has focus */
sidebarScroll.addEventListener('keydown', function(e){
  if(e.key!=='Enter' && e.key!==' ') return;
  if(!e.target.classList || !e.target.classList.contains('app-link')) return;
  e.preventDefault();
  var li = e.target.closest('.app-item'); if(!li) return;
  selectApp(li.dataset.appId);
});
function moveItem(id, dir){
  var cat = getCat(id);
  var catIds = order.filter(function(x){ return appExists(x) && getCat(x)===cat; });
  var idx = catIds.indexOf(id);
  var swapWith = catIds[idx+dir];
  if(!swapWith) return;
  var i1=order.indexOf(id), i2=order.indexOf(swapWith);
  order[i1]=swapWith; order[i2]=id;
  saveOrder();
  renderSidebar();
}
function startRename(id, labelSpan){
  if(!labelSpan) return;
  var current = displayLabel(id);
  var input = document.createElement('input');
  input.type='text'; input.className='rename-input'; input.value=current;
  labelSpan.replaceWith(input);
  input.focus(); input.select();
  var done=false;
  function commit(){
    if(done) return; done=true;
    var v = input.value.trim();
    if(v){ names[id]=v; } else { delete names[id]; }
    saveNames();
    renderSidebar();
    if(activeId===id) currentTitle.textContent = displayLabel(id);
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', function(e){
    if(e.key==='Enter'){ e.preventDefault(); input.blur(); }
    if(e.key==='Escape'){ done=true; renderSidebar(); }
    e.stopPropagation();
  });
}
function deleteCustomApp(id){
  if(!isCustomApp(id)) return;
  var msg = isFr() ? 'Supprimer ce programme du menu ?' : 'حذف هذا البرنامج من القائمة؟';
  if(!confirm(msg)) return;
  delete customApps[id]; saveCustom();
  delete names[id]; saveNames();
  order = order.filter(function(x){ return x!==id; }); saveOrder();
  if(activeId===id) showWelcome();
  renderSidebar();
}

/* ---------- add new app ---------- */
addAppToggle.addEventListener('click', function(){
  addAppToggle.hidden=true; addAppForm.hidden=false; newAppName.focus();
});
addAppCancel.addEventListener('click', function(){
  addAppForm.reset(); addAppForm.hidden=true; addAppToggle.hidden=false;
});
addAppForm.addEventListener('submit', function(e){
  e.preventDefault();
  var name = newAppName.value.trim();
  var url = newAppUrl.value.trim();
  var cat = newAppCat.value;
  if(!name || !url) return;
  var id = 'custom_' + Date.now().toString(36);
  customApps[id] = {label:name, href:url, cat:cat};
  saveCustom();
  order.push(id); saveOrder();
  addAppForm.reset(); addAppForm.hidden=true; addAppToggle.hidden=false;
  renderSidebar();
  if(welcome.hidden===false) renderWelcomeCards();
});

/* ---------- password protection ---------- */
function hasPassword(){ return !!loadJSON(PASS_KEY, null); }
function refreshPassUI(){
  var has = hasPassword();
  passToggleLabel.textContent = has ? (isFr()?'Changer le mot de passe':'تغيير كلمة السر') : (isFr()?'Protéger par mot de passe':'تأمين بكلمة سر');
  passRemove.hidden = !has;
}
passToggle.addEventListener('click', function(){
  passToggle.hidden=true; passForm.hidden=false; passMsg.textContent=''; passNew.focus();
});
passCancel.addEventListener('click', function(){
  passForm.reset(); passForm.hidden=true; passToggle.hidden=false; passMsg.textContent='';
});
passForm.addEventListener('submit', function(e){
  e.preventDefault();
  var p1 = passNew.value, p2 = passConfirm.value;
  if(!p1 || p1.length<4){ passMsg.textContent = isFr() ? 'Au moins 4 caractères.' : 'على الأقل 4 خانات.'; passMsg.className='pass-msg err'; return; }
  if(p1!==p2){ passMsg.textContent = isFr() ? 'Les mots de passe ne correspondent pas.' : 'كلمتا السر غير متطابقتين.'; passMsg.className='pass-msg err'; return; }
  hashPassword(p1).then(function(hash){
    saveJSON(PASS_KEY, hash);
    passMsg.textContent = isFr() ? 'Mot de passe enregistré.' : 'تم حفظ كلمة السر.';
    passMsg.className='pass-msg ok';
    refreshPassUI();
    setTimeout(function(){
      passForm.reset(); passForm.hidden=true; passToggle.hidden=false; passMsg.textContent='';
    }, 900);
  });
});
passRemove.addEventListener('click', function(){
  var msg = isFr() ? 'Retirer la protection par mot de passe ?' : 'إزالة الحماية بكلمة السر؟';
  if(!confirm(msg)) return;
  try{ localStorage.removeItem(PASS_KEY); }catch(e){}
  refreshPassUI();
});

/* ---------- lock screen ---------- */
function checkLock(){
  if(!hasPassword()){ lockScreen.hidden=true; return; }
  lockScreen.hidden=false;
  setTimeout(function(){ lockInput.focus(); }, 50);
}
lockForm.addEventListener('submit', function(e){
  e.preventDefault();
  var pw = lockInput.value;
  var stored = loadJSON(PASS_KEY, null);
  hashPassword(pw).then(function(hash){
    if(stored && hash===stored){
      lockScreen.hidden=true; lockErr.textContent=''; lockInput.value='';
    } else {
      lockErr.textContent = isFr() ? 'Mot de passe incorrect, réessayez.' : 'كلمة السر غير صحيحة، أعد المحاولة.';
      lockInput.value=''; lockInput.focus();
    }
  });
});

/* ---------- reset customization ---------- */
resetCustom.addEventListener('click', function(){
  var msg = isFr() ? "Réinitialiser l'ordre et les noms du menu ?" : 'إعادة ضبط ترتيب وتسمية القائمة؟';
  if(!confirm(msg)) return;
  var customIds = Object.keys(customApps);
  order = DEFAULT_ORDER.slice().concat(customIds);
  names = {};
  saveOrder(); saveNames();
  renderSidebar();
  if(welcome.hidden===false) renderWelcomeCards();
});

/* ---------- edit mode toggle ---------- */
editToggle.addEventListener('click', function(){
  var on = sidebar.classList.toggle('edit-mode');
  editToggle.classList.toggle('active', on);
  editToggle.setAttribute('aria-pressed', on?'true':'false');
  var span = editToggle.querySelector('span');
  span.textContent = on ? (isFr()?'Terminé':'تم') : (isFr()?'Modifier le menu':'تعديل القائمة');
  if(!on){
    addAppForm.reset(); addAppForm.hidden=true; addAppToggle.hidden=false;
    passForm.reset(); passForm.hidden=true; passToggle.hidden=false; passMsg.textContent='';
  }
});

/* ---------- search filter ---------- */
appSearch.addEventListener('input', applySearchFilter);
function applySearchFilter(){
  var q = appSearch.value.trim().toLowerCase();
  document.querySelectorAll('.cat-group').forEach(function(group){
    var groupHasMatch = false;
    group.querySelectorAll('.app-item').forEach(function(li){
      var id = li.dataset.appId;
      var hay = (getDefaultLabel(id)+' '+displayLabel(id)).toLowerCase();
      var match = !q || hay.indexOf(q)!==-1;
      li.classList.toggle('hidden-by-search', !match);
      if(match) groupHasMatch=true;
    });
    group.style.display = groupHasMatch ? '' : 'none';
  });
}

/* ---------- keyboard shortcuts ---------- */
document.addEventListener('keydown', function(e){
  if(e.key==='/' && document.activeElement!==appSearch && document.activeElement.tagName!=='INPUT'){
    e.preventDefault(); openDrawer(); appSearch.focus();
  } else if(e.key==='Escape'){
    if(sidebar.classList.contains('open')) closeDrawer();
  }
});

/* ---------- mobile drawer ---------- */
function openDrawer(){ sidebar.classList.add('open'); overlay.classList.add('show'); menuToggle.setAttribute('aria-expanded','true'); }
function closeDrawer(){ sidebar.classList.remove('open'); overlay.classList.remove('show'); menuToggle.setAttribute('aria-expanded','false'); }
menuToggle.addEventListener('click', function(){ sidebar.classList.contains('open') ? closeDrawer() : openDrawer(); });
overlay.addEventListener('click', closeDrawer);

/* ---------- brand = home ---------- */
brandHome.addEventListener('click', function(e){ e.preventDefault(); showWelcome(); });

/* ---------- language toggle ---------- */
function applyStaticTranslations(){
  document.querySelectorAll('[data-ar][data-fr]').forEach(function(el){
    var txt = isFr() ? el.getAttribute('data-fr') : el.getAttribute('data-ar');
    if(el.tagName==='INPUT'){ el.placeholder = txt; } else { el.textContent = txt; }
  });
  appSearch.placeholder = appSearch.getAttribute(isFr()?'data-ph-fr':'data-ph-ar');
  newAppName.placeholder = newAppName.getAttribute(isFr()?'data-ph-fr':'data-ph-ar');
  newAppUrl.placeholder = newAppUrl.getAttribute(isFr()?'data-ph-fr':'data-ph-ar');
  passNew.placeholder = passNew.getAttribute(isFr()?'data-ph-fr':'data-ph-ar');
  passConfirm.placeholder = passConfirm.getAttribute(isFr()?'data-ph-fr':'data-ph-ar');
  var editSpan = editToggle.querySelector('span');
  var on = sidebar.classList.contains('edit-mode');
  editSpan.textContent = on ? (isFr()?'Terminé':'تم') : (isFr()?'Modifier le menu':'تعديل القائمة');
  refreshPassUI();
}
function setLang(l){
  html.lang=l; html.dir=(l==='ar')?'rtl':'ltr'; langBtn.textContent=(l==='ar')?'FR':'عربي';
  saveJSON(LANG_KEY, l);
  applyStaticTranslations();
  renderSidebar();
  if(welcome.hidden===false){ renderWelcomeCards(); updateClock(); currentTitle.textContent = isFr() ? 'Dashboard' : 'لوحة المعلومات'; }
  if(activeId) currentTitle.textContent = displayLabel(activeId);
}
langBtn.addEventListener('click', function(){ setLang(html.lang==='ar'?'fr':'ar'); });

/* ---------- history (deep links) ---------- */
window.addEventListener('popstate', function(){
  var id = (location.hash||'').slice(1);
  if(id && appExists(id)) selectApp(id, {skipHistory:true});
  else showWelcome({skipHistory:true});
});

/* ---------- init ---------- */
(function init(){
  checkLock();
  var savedLang = loadJSON(LANG_KEY, null);
  if(savedLang==='fr'||savedLang==='ar'){
    html.lang=savedLang; html.dir=(savedLang==='ar')?'rtl':'ltr'; langBtn.textContent=(savedLang==='ar')?'FR':'عربي';
  }
  applyStaticTranslations();
  renderSidebar();
  updateClock();

  var hashId = (location.hash||'').slice(1);
  var lastId = loadJSON(LAST_KEY, null);
  var startId = (hashId && appExists(hashId)) ? hashId : ((lastId && appExists(lastId)) ? lastId : null);
  if(startId) selectApp(startId, {skipHistory:true});
  else showWelcome({skipHistory:true});
})();

})();
</script>
</body>
</html>
