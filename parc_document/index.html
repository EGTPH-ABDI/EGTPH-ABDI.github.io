<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../egtph-auth.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EGTPH — Matériel & Soumissions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Cinzel:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0c1c21;--ink-2:#11242a;--paper:#f6f2ea;--paper-2:#efe9dc;--card:#fffdf9;
  --line:#e3dccc;--line-2:#d8cfb8;--muted:#7a7468;--gold:#b08d4f;--gold-2:#c8a86a;--gold-soft:#ece0c6;
  --teal:#5e8f97;--danger:#9b3a2f;--ok:#3f7a57;--warn:#b7791f;--radius:14px;
  --shadow:0 1px 2px rgba(12,28,33,.05),0 14px 40px rgba(12,28,33,.09);
  --font-disp:"Marcellus",serif;--font-crest:"Cinzel",serif;--font-lat:"IBM Plex Sans",sans-serif;
  --font-ar:"IBM Plex Sans Arabic",sans-serif;--font-mono:"IBM Plex Mono",monospace;
}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);background-image:radial-gradient(circle at 1px 1px,rgba(176,141,79,.05) 1px,transparent 0);background-size:22px 22px;color:var(--ink);font:14px/1.5 var(--font-lat)}
body[dir="rtl"]{font-family:var(--font-ar)}
input,select,textarea,button{font-family:inherit}
.mono{font-family:var(--font-mono)}

.layout{display:flex;min-height:100vh}
.sidebar{width:240px;flex:none;background:linear-gradient(170deg,#11242a,#0c1c21 60%,#0a161a);color:#c7d2cd;display:flex;flex-direction:column;padding:18px 14px;position:sticky;top:0;height:100vh;z-index:30}
.brand{background:#fff;border-radius:10px;padding:6px 8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;min-height:54px}
.brand img{height:42px;width:auto;max-width:100%;object-fit:contain}
.brand-tag{text-align:center;font-size:9.5px;letter-spacing:2px;color:var(--gold-2);text-transform:uppercase;margin-bottom:16px}
.nav{display:flex;flex-direction:column;gap:3px}
.nav button{display:flex;align-items:center;gap:11px;padding:11px 12px;border:0;border-radius:11px;background:transparent;color:#bcc8c3;cursor:pointer;font-size:14px;text-align:start;width:100%}
.nav button:hover{background:rgba(255,255,255,.06);color:#fff}
.nav button.active{background:linear-gradient(135deg,#b08d4f,#9c7c40);color:#1a1206;font-weight:700;box-shadow:0 6px 16px rgba(176,141,79,.3)}
.nav svg{width:19px;height:19px;flex:none}
.side-foot{margin-top:auto;padding-top:14px;border-top:1px solid rgba(255,255,255,.1)}
.lang-btn{width:100%;background:rgba(255,255,255,.06);color:#e8eeec;border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:9px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px}
.lang-btn:hover{background:rgba(176,141,79,.25)}

.content{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:15;background:rgba(246,242,234,.82);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px 18px;display:flex;align-items:center;gap:12px}
.topbar .pg{font-family:var(--font-disp);font-size:20px;margin:0;flex:1}
body[dir="rtl"] .topbar .pg{font-family:var(--font-ar);font-weight:600}
.menu-btn{display:none;background:transparent;border:1px solid var(--line-2);border-radius:9px;padding:7px 9px;cursor:pointer;color:var(--ink)}
.menu-btn svg{width:20px;height:20px;display:block}
.topbar .tlogo{height:34px;width:auto;max-width:150px;object-fit:contain}
main{padding:18px;max-width:1000px;width:100%;margin:0 auto}
.scrim{display:none;position:fixed;inset:0;background:rgba(12,28,33,.45);z-index:25}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
h2.sec{font-family:var(--font-disp);font-size:22px;font-weight:400;margin:0 0 16px;line-height:1.2}
body[dir="rtl"] h2.sec{font-family:var(--font-ar);font-weight:600}
h2.sec .bar{display:block;width:54px;height:2px;background:var(--gold);margin-top:7px}
body[dir="rtl"] h2.sec .bar{margin-inline-start:0;margin-inline-end:auto}
.muted{color:var(--muted)}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px;text-align:center}
.stat .n{font-family:var(--font-disp);font-size:30px}.stat .l{font-size:12px;color:var(--muted);margin-top:3px}
.stat.bad .n{color:var(--danger)}.stat.warn .n{color:var(--warn)}.stat.ok .n{color:var(--ok)}
@media(max-width:680px){.stats{grid-template-columns:repeat(2,1fr)}}

.alert-row{display:flex;align-items:center;gap:10px;padding:11px;border-radius:11px;margin-bottom:8px;border:1px solid var(--line)}
.alert-row.bad{background:#f7e9e6;border-color:#e3c2bb}.alert-row.warn{background:#fbf2df;border-color:#ecdcb4}
.alert-row .veh{flex:1}.alert-row .veh b{display:block}.alert-row .veh small{color:var(--muted)}
.pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
.pill.bad{background:var(--danger);color:#fff}.pill.warn{background:var(--warn);color:#fff}.pill.ok{background:var(--ok);color:#fff}

.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
input,select,textarea{font:inherit;padding:9px 11px;border:1px solid var(--line-2);border-radius:10px;background:#fff;color:var(--ink);width:100%}
input:focus,select:focus,textarea:focus{outline:0;border-color:var(--gold);box-shadow:0 0 0 3px rgba(176,141,79,.13)}
.toolbar input,.toolbar select{width:auto}
.btn{background:linear-gradient(135deg,#b08d4f,#9c7c40);color:#1a1206;border:0;padding:10px 16px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;box-shadow:0 4px 12px rgba(176,141,79,.22)}
.btn:hover{filter:brightness(1.05)}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line-2);box-shadow:none;font-weight:500}
.btn.ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn.danger{background:var(--danger);color:#fff;box-shadow:none}
.btn.gray{background:#6b7770;color:#fff;box-shadow:none}
.btn.sm{padding:6px 11px;font-size:12px}

table.grid{width:100%;border-collapse:collapse;font-size:13px}
table.grid th,table.grid td{border:1px solid var(--line);padding:8px;text-align:start;vertical-align:top}
table.grid th{background:var(--paper-2);font-size:12px;font-weight:600}
.catbar{background:linear-gradient(170deg,#11242a,#0c1c21);color:#f3ecdc;padding:8px 12px;border-radius:10px;margin:16px 0 7px;font-weight:600;font-size:13px;border-inline-start:4px solid var(--gold)}
.num{text-align:center;font-weight:700;font-family:var(--font-mono)}
.tag{font-size:10.5px;padding:2px 8px;border-radius:20px;background:var(--gold-soft);color:#7a5a1f;font-weight:700}
.tag.veh{background:#dfeee8;color:var(--ok)}

.overlay{position:fixed;inset:0;background:rgba(12,28,33,.5);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:20px;overflow:auto}
.overlay.show{display:flex}
.modal{background:var(--card);border-radius:var(--radius);max-width:640px;width:100%;padding:20px;margin:auto;box-shadow:var(--shadow)}
.modal h3{font-family:var(--font-disp);font-weight:400;margin:0 0 14px;font-size:20px}
body[dir="rtl"] .modal h3{font-family:var(--font-ar);font-weight:600}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:560px){.row2,.row3{grid-template-columns:1fr}}
.field{margin-bottom:11px}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
.doc-box{border:1px dashed var(--line-2);border-radius:12px;padding:13px;margin-top:11px}
.doc-box h4{margin:0 0 8px;font-size:13px;color:var(--gold);font-weight:700}
.thumb{max-height:60px;border:1px solid var(--line);border-radius:6px;margin-top:6px;display:block}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap}
.chk{display:flex;align-items:center;gap:8px;font-size:13px}.chk input{width:auto}
.opts label.chk{margin:6px 16px 6px 0;display:inline-flex}
body[dir="rtl"] .opts label.chk{margin:6px 0 6px 16px}

/* design panel */
.seg{display:inline-flex;flex-wrap:wrap;gap:6px}
.seg button{background:#fff;border:1px solid var(--line-2);border-radius:9px;padding:8px 13px;cursor:pointer;font-size:13px;color:var(--ink)}
.seg button.on{background:linear-gradient(135deg,#b08d4f,#9c7c40);color:#1a1206;border-color:transparent;font-weight:600}
.swatches{display:flex;gap:10px;flex-wrap:wrap}
.sw{width:34px;height:34px;border-radius:50%;cursor:pointer;border:2px solid #fff;box-shadow:0 0 0 1px var(--line-2)}
.sw.on{box-shadow:0 0 0 2px var(--ink),0 0 0 5px rgba(176,141,79,.25)}
.preview{border:1px solid var(--line);border-radius:12px;padding:16px;background:#fff;margin-top:6px}

/* document OCR */
.ocr-tools{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-top:8px}
.ocr-status{font-size:11.5px;color:var(--muted);margin-top:7px;min-height:18px}
.ocr-status.busy{color:var(--warn);font-weight:600}.ocr-status.warn{color:var(--warn);font-weight:600}.ocr-status.ok{color:var(--ok)}.ocr-status.error{color:var(--danger);font-weight:600}
.ocr-note{font-size:11.5px;color:var(--muted);margin:8px 0 0}
.ocr-raw{margin-top:8px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:8px}
.ocr-raw summary{cursor:pointer;font-size:12px;color:var(--gold);font-weight:600}
.ocr-raw pre{white-space:pre-wrap;word-break:break-word;max-height:180px;overflow:auto;font:11px/1.4 var(--font-mono);margin:8px 0 0;color:var(--ink)}


/* ===== SOUMISSION — IMPORT P.V / RAPPORT OCR ===== */
.pv-ocr-card{border-color:rgba(176,141,79,.48)}
.pv-ocr-card .sec{margin-bottom:8px}
.pv-ocr-desc{margin:0 0 13px;color:var(--muted);font-size:12.5px}
.pv-ocr-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.pv-ocr-file{margin-top:9px;padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:var(--paper);font-size:12px;color:var(--muted);word-break:break-word}
.pv-ocr-status{min-height:20px;margin-top:9px;font-size:12.5px}
.pv-ocr-status.busy{color:var(--warn);font-weight:600}
.pv-ocr-status.ok{color:var(--ok);font-weight:600}
.pv-ocr-status.warn{color:var(--warn);font-weight:600}
.pv-ocr-status.error{color:var(--danger);font-weight:600}
.pv-ocr-summary{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin:12px 0 8px}
.pv-ocr-summary b{font-size:13px}
.pv-ocr-mode{font-size:11px;color:var(--muted);padding:3px 8px;border:1px solid var(--line);border-radius:20px;background:#fff}
.pv-match-wrap{overflow:auto;max-height:360px;border:1px solid var(--line);border-radius:10px;background:#fff}
table.pv-match{width:100%;border-collapse:collapse;font-size:12px}
table.pv-match th,table.pv-match td{border-bottom:1px solid var(--line);padding:8px;vertical-align:top;text-align:start}
table.pv-match tr:last-child td{border-bottom:0}
table.pv-match th{position:sticky;top:0;background:var(--paper-2);z-index:1;font-weight:700}
.pv-match-name b{display:block;font-size:12.5px}
.pv-match-name small{display:block;color:var(--muted);margin-top:2px}
.pv-match-reason{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.pv-match-badge{display:inline-flex;align-items:center;border-radius:20px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap}
.pv-match-badge.sure{background:#e4f2e9;color:var(--ok)}
.pv-match-badge.review{background:#fbf2df;color:var(--warn)}
.pv-match-badge.ambiguous{background:#f7e9e6;color:var(--danger)}
.pv-match-badge.excluded{background:#ececec;color:#555}
.pv-match-badge.conflict{background:#f3e5f5;color:#6a1b9a}
.pv-match-proof{margin-top:5px;font-size:10px;color:var(--muted);font-family:var(--font-mono)}
.pv-evidence-log{margin-top:5px}
.pv-evidence-log summary{cursor:pointer;color:var(--gold);font-weight:600}
.pv-evidence-log div{margin-top:4px;padding-top:4px;border-top:1px dashed var(--line);font-size:10px;line-height:1.35}
.pv-match-score{font-family:var(--font-mono);font-weight:700;white-space:nowrap}
.pv-match-evidence{max-width:300px;color:var(--muted);font-size:10.5px;word-break:break-word}
.pv-ocr-note{margin:8px 0 0;font-size:11px;color:var(--muted)}
.pv-ocr-empty{margin-top:10px;padding:10px;border:1px dashed var(--line-2);border-radius:10px;color:var(--muted);font-size:12px}
.pv-ocr-raw{margin-top:10px}
.pv-ocr-raw summary{cursor:pointer;font-size:12px;color:var(--gold);font-weight:600}
.pv-ocr-raw pre{white-space:pre-wrap;word-break:break-word;max-height:260px;overflow:auto;border:1px solid var(--line);border-radius:9px;background:#fff;padding:9px;font:10.5px/1.45 var(--font-mono)}
@media(max-width:680px){
  .pv-ocr-actions .btn{flex:1;min-width:140px}
  table.pv-match th:nth-child(4),table.pv-match td:nth-child(4){display:none}
}

@media(max-width:880px){
  .sidebar{position:fixed;inset-block:0;inset-inline-start:0;transform:translateX(-110%);transition:transform .25s ease;box-shadow:0 0 40px rgba(0,0,0,.3)}
  body[dir="rtl"] .sidebar{transform:translateX(110%)}
  .sidebar.open{transform:translateX(0)}
  .menu-btn{display:inline-flex}
  .scrim.show{display:block}
}

/* ===== PRINT ===== */
#print-root{display:none}
@media print{ .layout,.scrim{display:none!important} #print-root{display:block!important} @page{size:A4;margin:13mm} }
#print-root{font-family:"Times New Roman",Georgia,serif;color:#000;direction:ltr;-webkit-print-color-adjust:exact;print-color-adjust:exact}
#print-root .radp{text-align:center;font-style:italic;font-size:13px;margin-bottom:8px}
#print-root .ph{display:flex;justify-content:space-between;align-items:center;border-bottom:2.5px solid #b08d4f;padding-bottom:8px}
#print-root .ph .l{display:flex;align-items:center;gap:12px}
#print-root .ph .nm b{font-size:16px}#print-root .ph .nm small{display:block;font-size:11px;color:#333}
#print-root .ph .r{text-align:right;font-size:11px;color:#333}
#print-root h1{text-align:center;font-size:19px;margin:14px 0 6px;padding-bottom:5px;border-bottom:2px solid #b08d4f;display:inline-block;width:100%}
#print-root .refs{text-align:center;font-size:11.5px;margin:0 0 10px;color:#222}
#print-root .proj{border:1px solid #000;border-radius:4px;padding:7px 10px;margin:0 0 12px;font-size:13px}
#print-root .proj div{margin:2px 0}
#print-root .cat{font-weight:bold;background:#11242a;color:#fff;padding:5px 8px;margin:12px 0 0;font-size:13px}
#print-root table{width:100%;border-collapse:collapse;font-size:12px}
#print-root th,#print-root td{border:1px solid #000;padding:4px 6px}
#print-root th{background:#e9e3d4;text-align:center}
#print-root td.c{text-align:center}#print-root .num{text-align:center;font-weight:bold;font-family:inherit}
#print-root .sign{margin-top:28px;text-align:right;font-size:13px}
#print-root .sign .pl{margin-bottom:34px}#print-root .sign b{font-size:14px}
</style>
</head>
<body>
<div id="print-root"></div>
<style id="designVars"></style>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="brand" id="sideLogo"></div>
    <div class="brand-tag">Hydraulique · Bâtiment · T.P</div>
    <div class="nav" id="nav"></div>
    <div class="side-foot"><button class="lang-btn" id="langBtn"></button></div>
  </aside>
  <div class="scrim" id="scrim"></div>
  <div class="content">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
      <h1 class="pg" id="pageTitle"></h1>
      <img class="tlogo" id="topLogo" alt="">
    </div>
    <main id="view"></main>
  </div>
</div>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

function _nextStoreRev(){
  let t=Date.now();
  try{t+=(performance.now()%1)/1000;}catch(e){}
  if(t<=_storeRevLast)t=_storeRevLast+0.001;
  _storeRevLast=t;
  return t;
}

function _openKvDb(name,store,promiseKind){
  const current=promiseKind==="img"?_imgDbPromise:_stateDbPromise;
  if(current)return current;
  const p=new Promise(resolve=>{
    if(!("indexedDB" in window)){resolve(null);return;}
    let req;
    try{req=indexedDB.open(name,1);}catch(e){resolve(null);return;}
    req.onupgradeneeded=()=>{
      try{const db=req.result;if(!db.objectStoreNames.contains(store))db.createObjectStore(store);}
      catch(e){}
    };
    req.onsuccess=()=>{
      const db=req.result;
      try{db.onversionchange=()=>{try{db.close();}catch(e){}};}catch(e){}
      resolve(db);
    };
    req.onerror=()=>resolve(null);
    req.onblocked=()=>resolve(null);
  });
  if(promiseKind==="img")_imgDbPromise=p;else _stateDbPromise=p;
  p.then(db=>{
    if(db)return;
    if(promiseKind==="img"&&_imgDbPromise===p)_imgDbPromise=null;
    if(promiseKind!=="img"&&_stateDbPromise===p)_stateDbPromise=null;
  });
  return p;
}
function openImgDb(){return _openKvDb(IMG_DB_NAME,IMG_DB_STORE,"img");}
function openStateDb(){return _openKvDb(STATE_DB_NAME,STATE_DB_STORE,"state");}

async function _idbGet(dbPromise,store,k){
  const db=await dbPromise;if(!db)return null;
  return await new Promise(resolve=>{
    try{
      const tx=db.transaction(store,"readonly"),q=tx.objectStore(store).get(String(k));
      q.onsuccess=()=>resolve(q.result==null?null:q.result);
      q.onerror=()=>resolve(null);
    }catch(e){resolve(null);}
  });
}
async function _idbSet(dbPromise,store,k,v){
  const db=await dbPromise;if(!db)return false;
  return await new Promise(resolve=>{
    try{
      const tx=db.transaction(store,"readwrite");
      tx.objectStore(store).put(v,String(k));
      tx.oncomplete=()=>resolve(true);
      tx.onerror=()=>resolve(false);
      tx.onabort=()=>resolve(false);
    }catch(e){resolve(false);}
  });
}
async function _idbDel(dbPromise,store,k){
  const db=await dbPromise;if(!db)return false;
  return await new Promise(resolve=>{
    try{
      const tx=db.transaction(store,"readwrite");
      tx.objectStore(store).delete(String(k));
      tx.oncomplete=()=>resolve(true);
      tx.onerror=()=>resolve(false);
      tx.onabort=()=>resolve(false);
    }catch(e){resolve(false);}
  });
}

function _parseSavedState(raw){

  }catch(e){return null;}
}
function _stateMod(o){return Number(o&&o._mod)||0;}
function _stateStoreRev(o){return Number(o&&o._storeRev)||0;}
function _stateIsNewer(a,b){
  if(!a)return false;if(!b)return true;
  const ar=_stateStoreRev(a),br=_stateStoreRev(b);
  if(ar||br)return ar>br;
  return _stateMod(a)>_stateMod(b);
}

async function migrateLegacyImagesToIndexedDB(){
  const db=await openImgDb();
  if(!db)return {moved:0,failed:0,total:0};
  const keys=[];
  try{
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.startsWith("img_"))keys.push(k);
    }
  }catch(e){return {moved:0,failed:0,total:0};}
  let moved=0,failed=0;
  for(const legacyKey of keys){
    let value=null;
    try{value=localStorage.getItem(legacyKey);}catch(e){failed++;continue;}
    if(value==null)continue;
    const imageKey=legacyKey.slice(4);
    if(await idbSetImg(imageKey,value)){
      try{localStorage.removeItem(legacyKey);}catch(e){}
      delete MEM[legacyKey];
      moved++;
    }else failed++;
  }
  return {moved,failed,total:keys.length};
}

function mergeCloud(remote){

  // 3) العتاد: الأحدث (_mod) يغلب، الجديد يُضاف، المحذوف لا يعود أبداً
  const byId={};DATA.equipment.forEach(e=>{byId[e.id]=e;});

function bindPvOcrUi(){

function loadPdfLibrary(){
  if(window.pdfjsLib&&window.pdfjsLib.getDocument)return Promise.resolve(window.pdfjsLib);
  if(_pvPdfLibPromise)return _pvPdfLibPromise;
  _pvPdfLibPromise=(async()=>{
    try{
      const mod=await import(`https://cdn.jsdelivr.net/npm/pdfjs-dist@${PV_PDFJS_VERSION}/build/pdf.mjs`);
      if(!mod||!mod.getDocument)throw new Error("PDF.js module unavailable");
      mod.GlobalWorkerOptions.workerSrc=`https://cdn.jsdelivr.net/npm/pdfjs-dist@${PV_PDFJS_VERSION}/build/pdf.worker.mjs`;
      return mod;
    }catch(primaryError){
      return await new Promise((resolve,reject)=>{
        const sc=document.createElement("script");sc.async=true;sc.dataset.egtphPdf="1";
        sc.src=`https://cdn.jsdelivr.net/npm/pdfjs-dist@${PV_PDFJS_FALLBACK_VERSION}/build/pdf.min.js`;
        sc.onload=()=>{
          if(!window.pdfjsLib||!window.pdfjsLib.getDocument){reject(primaryError);return;}
          window.pdfjsLib.GlobalWorkerOptions.workerSrc=`https://cdn.jsdelivr.net/npm/pdfjs-dist@${PV_PDFJS_FALLBACK_VERSION}/build/pdf.worker.min.js`;
          resolve(window.pdfjsLib);
        };
        sc.onerror=()=>reject(primaryError);document.head.appendChild(sc);
      });
    }
  })().catch(err=>{_pvPdfLibPromise=null;throw err;});
  return _pvPdfLibPromise;
}
function pvReadAsDataUrl(file){

function pvPdfTextFromItems(content){
  const items=(content&&content.items||[]).filter(it=>it&&String(it.str||"").trim());
  if(!items.length)return "";
  const rows=[];
  items.forEach(it=>{
    const y=it.transform&&Number(it.transform[5])||0,x=it.transform&&Number(it.transform[4])||0,s=cleanOCR(it.str);
    let row=rows.find(r=>Math.abs(r.y-y)<=2.5);
    if(!row){row={y,parts:[]};rows.push(row);}
    row.parts.push({x,s});
  });
  rows.sort((a,b)=>b.y-a.y);
  return rows.map(r=>r.parts.sort((a,b)=>a.x-b.x).map(p=>p.s).join(" ").trim()).filter(Boolean).join("\n");
}
function pvTextNeedsOcr(value){
  const norm=pvNormWords(value),chars=(norm.match(/[a-z0-9\u0600-\u06ff]/gi)||[]).length;
  return chars<140;
}
function pvMergeText(a,b){
  const seen=new Set(),out=[];
  [a,b].forEach(src=>ocrLines(src||"").forEach(line=>{const k=foldOCR(line);if(k&&!seen.has(k)){seen.add(k);out.push(line);}}));
  return out.join("\n");
}

function pvTsvLines(tsv){
  const src=String(tsv||"").trim();if(!src)return [];
  const rows=src.split(/\r?\n/);if(rows.length<2)return [];
  const head=rows.shift().split("\t"),idx={};head.forEach((v,i)=>idx[v]=i);
  const required=["page_num","block_num","par_num","line_num","left","top","width","height","conf","text"];
  if(required.some(k=>idx[k]===undefined))return [];
  const groups=new Map();
  rows.forEach(row=>{
    const c=row.split("\t"),txt=cleanOCR(c[idx.text]||"");if(!txt)return;
    const conf=Number(c[idx.conf]);if(Number.isFinite(conf)&&conf<0)return;
    const key=[c[idx.page_num],c[idx.block_num],c[idx.par_num],c[idx.line_num]].join(":");
    if(!groups.has(key))groups.set(key,{words:[],top:Infinity,left:Infinity,bottom:0,right:0,conf:[]});
    const g=groups.get(key),left=Number(c[idx.left])||0,top=Number(c[idx.top])||0,width=Number(c[idx.width])||0,height=Number(c[idx.height])||0;
    g.words.push({x:left,text:txt});g.left=Math.min(g.left,left);g.top=Math.min(g.top,top);g.right=Math.max(g.right,left+width);g.bottom=Math.max(g.bottom,top+height);
    if(Number.isFinite(conf)&&conf>=0)g.conf.push(conf);
  });

    text:g.words.sort((a,b)=>a.x-b.x).map(w=>w.text).join(" ").trim(),
    left:g.left,top:g.top,right:g.right,bottom:g.bottom,
    confidence:g.conf.length?g.conf.reduce((a,b)=>a+b,0)/g.conf.length:0

}
function pvOcrResultPayload(result){
  const data=result&&result.data||{},raw=String(data.text||""),lines=pvTsvLines(data.tsv||"");
  const spatial=lines.map(l=>l.text).join("\n"),rawCount=pvWordTokens(raw).length,spatialCount=pvWordTokens(spatial).length;
  const text=spatialCount>=Math.max(4,Math.floor(rawCount*.35))?spatial:raw;
  return {text,rawText:raw,confidence:Number(data.confidence)||0,spatialLines:lines.length};
}
async function pvRecognizeWithOutputs(worker,image){

  catch(e){return worker.recognize(image);}

function pvPdfPageNeedsOcr(text,hasRaster){
  if(pvTextNeedsOcr(text))return true;
  if(!hasRaster)return false;
  const rows=pvCountRowSignals(text),strong=pvBaseMatchEquipmentText(text).filter(m=>m.status==="sure").length;
  // Hybrid PDFs often contain a text header but the equipment table itself is one scanned image.
  return rows<3||strong<3;
}
async function pvPdfPageHasRaster(page,pdfjs){
  try{
    const ops=await page.getOperatorList(),O=pdfjs&&pdfjs.OPS;
    if(!ops||!O)return false;
    const imageOps=[O.paintImageXObject,O.paintJpegXObject,O.paintInlineImageXObject].filter(v=>Number.isFinite(v));
    return imageOps.length?ops.fnArray.some(fn=>imageOps.includes(fn)):false;
  }catch(e){return false;}
}
function pvSupportKey(src,index){return String(src&&src.passId||src&&src.id||("source-"+index));}

  const family=kind==="digital"?"digital":scope.includes("whole-gray")||scope==="psm6"?"gray":scope.includes("whole-binary")||scope==="psm11"?"binary":scope.startsWith("band-")?"band":scope||kind;
  return {
    id:m.id,status:m.status,score:m.score||0,reasons:[...(m.reasons||[])],strongKey:m.strongKey||"",refField:m.refField||"",
    refScore:m.refScore||0,textScore:m.textScore||0,evidenceTextScore:m.evidenceTextScore||0,rowNo:m.rowNo??null,evidence:m.evidence||"",negated:!!m.negated,
    passId:pvSupportKey(src,index),page:Number(src&&src.page)||0,scope,kind,family,

function pvConsensusMatch(id,supports){

  const posFamilies=new Set(positive.map(s=>s.family||s.scope||s.kind)),negFamilies=new Set(negative.map(s=>s.family||s.scope||s.kind));

  const best=supports.slice().sort((a,b)=>(b.score-a.score)||(b.refScore-a.refScore)||(b.textScore-a.textScore))[0]||{};
  const exactContext=positive.find(s=>s.strongKey&&pvStrongKeyOwnerIds(s.strongKey).length===1&&["matricule","serie"].includes(s.refField)&&s.refScore>=98&&s.evidenceTextScore>=78);
  const exactInvoiceContext=positive.find(s=>s.strongKey&&pvStrongKeyOwnerIds(s.strongKey).length===1&&s.refField==="facture"&&s.refScore>=98&&s.evidenceTextScore>=82);

  return {id,status,checked:status==="sure",score:Math.min(100,Math.round(Math.max(best.score||0,status==="sure"&&corroboratedPositive?96:0))),reasons,evidence:best.evidence||"",evidenceLog,pages,passCount,posPasses,negPasses,positiveFamilies:[...posFamilies],negativeFamilies:[...negFamilies],strongKey:best.strongKey||"",refField:best.refField||"",refScore:best.refScore||0,textScore:best.textScore||0,evidenceTextScore:best.evidenceTextScore||0};
}
function pvAnalyseDocumentSources(sources,mergedText){
  const groups=new Map(),cleanSources=(sources||[]).filter(s=>s&&String(s.text||"").trim());
  cleanSources.forEach((src,index)=>{
    const analysed=pvAnalyseEquipmentText(src.text);
    analysed.matches.forEach(m=>{if(!groups.has(m.id))groups.set(m.id,[]);groups.get(m.id).push(pvSupportFromMatch(m,src,index));});
  });

  const merged=pvAnalyseEquipmentText(mergedText||"");
  merged.matches.forEach(m=>{
    if(groups.has(m.id))return;
    groups.set(m.id,[pvSupportFromMatch({...m,status:m.status==="excluded"?"excluded":"review"},{passId:"merged",page:0,scope:"merged",kind:"merged",independent:false},9999)]);
  });
  const matches=[...groups.entries()].map(([id,sups])=>pvConsensusMatch(id,sups));
  const rank={sure:0,review:1,ambiguous:2,conflict:3,excluded:4};
  matches.sort((a,b)=>(rank[a.status]-rank[b.status])||(Number(a.id)-Number(b.id))||(b.score-a.score));

async function pvRecognizeImage(worker,dataUrl,page,total){
  _pvOcrProgress={page,total};
  const img=await loadImageDataUrl(dataUrl),rect={x:.01,y:.01,w:.98,h:.98},passes=[];
  const run=async(id,mode,binary,box=rect,maxLong=3200,scope="whole")=>{
    try{if(worker.setParameters)await worker.setParameters({tessedit_pageseg_mode:String(mode),preserve_interword_spaces:"1",user_defined_dpi:"300"});}catch(e){}
    const variant=buildOcrVariant(img,box,maxLong,binary),result=await pvRecognizeWithOutputs(worker,variant),payload=pvOcrResultPayload(result);
    const pass={passId:`p${page}-${id}`,page,scope,kind:"ocr",text:payload.text,confidence:payload.confidence,spatialLines:payload.spatialLines,independent:true};
    passes.push(pass);return pass;
  };
  const first=await run("whole-gray",6,false,rect,3400,"whole-gray");
  let merged=first.text,maxConf=first.confidence;
  let tableSignal=pvHasEquipmentSignal(merged)||pvCountRowSignals(merged)>=3;
  if(pvTextNeedsOcr(merged)||first.confidence<70||tableSignal){
    const second=await run("whole-binary",11,true,rect,3400,"whole-binary");merged=pvMergeText(merged,second.text);maxConf=Math.max(maxConf,second.confidence);
    tableSignal=tableSignal||pvHasEquipmentSignal(merged)||pvCountRowSignals(merged)>=3;
  }
  if(tableSignal){
    const bands=ocrBandRects(img);
    for(let i=0;i<bands.length;i++){
      const part=await run("band-"+(i+1),6,false,bands[i],3200,"band-"+(i+1));merged=pvMergeText(merged,part.text);maxConf=Math.max(maxConf,part.confidence);
    }
  }
  return {text:merged,confidence:maxConf,passes};
}
async function pvCreateWorker(total){
  pvSetStatus(t("pvOcrOcrLib"),"busy");const OCR=await loadOcrLibrary();
  return OCR.createWorker("fra+eng",1,{logger:m=>{
    if(m&&m.status&&typeof m.progress==="number"){
      pvSetStatus(tVars("pvOcrOcrPage",{page:_pvOcrProgress.page||1,total:_pvOcrProgress.total||total||1,p:Math.round(m.progress*100)}),"busy");
    }
  }});
}
async function pvRenderPdfPage(page){
  const base=page.getViewport({scale:1}),long=Math.max(base.width,base.height);
  let scale=Math.max(1.5,Math.min(3.5,3000/Math.max(1,long)));
  let viewport=page.getViewport({scale});
  const maxPixels=10000000,pixels=viewport.width*viewport.height;
  if(pixels>maxPixels){scale*=Math.sqrt(maxPixels/pixels);viewport=page.getViewport({scale});}
  const cv=document.createElement("canvas");cv.width=Math.max(1,Math.round(viewport.width));cv.height=Math.max(1,Math.round(viewport.height));
  const ctx=cv.getContext("2d",{alpha:false});ctx.fillStyle="#fff";ctx.fillRect(0,0,cv.width,cv.height);
  await page.render({canvasContext:ctx,viewport}).promise;
  const url=cv.toDataURL("image/png");cv.width=1;cv.height=1;return url;
}
async function pvReadPdf(file){
  pvSetStatus(t("pvOcrPdfLib"),"busy");const pdfjs=await loadPdfLibrary();
  const bytes=new Uint8Array(await file.arrayBuffer()),pdf=await pdfjs.getDocument({data:bytes}).promise;
  if(pdf.numPages>PV_OCR_MAX_PAGES)throw new Error("PV_TOO_MANY:"+pdf.numPages);
  const pages=[],ocrQueue=[],sources=[];
  for(let i=1;i<=pdf.numPages;i++){
    pvSetStatus(tVars("pvOcrPdfPage",{page:i,total:pdf.numPages}),"busy");
    const page=await pdf.getPage(i);let txt="";
    try{txt=pvPdfTextFromItems(await page.getTextContent());}catch(e){txt="";}
    let hasRaster=false;try{hasRaster=await pvPdfPageHasRaster(page,pdfjs);}catch(e){}
    const needsOcr=pvPdfPageNeedsOcr(txt,hasRaster);pages.push({n:i,text:txt,hasRaster});
    if(txt.trim())sources.push({passId:`p${i}-digital`,page:i,scope:"digital",kind:"digital",text:txt,confidence:100,independent:true});
    if(needsOcr)ocrQueue.push(i);
    try{page.cleanup();}catch(e){}
  }
  let worker=null,ocrPages=0;
  try{
    if(ocrQueue.length)worker=await pvCreateWorker(pdf.numPages);
    for(const pageNo of ocrQueue){
      const rec=pages[pageNo-1],page=await pdf.getPage(pageNo),url=await pvRenderPdfPage(page);
      const ocr=await pvRecognizeImage(worker,url,rec.n,pdf.numPages);rec.text=pvMergeText(rec.text,ocr.text);sources.push(...ocr.passes);ocrPages++;
      try{page.cleanup();}catch(e){}
    }
  }finally{try{if(worker)await worker.terminate();}catch(e){}}
  const text=pages.map(p=>`--- PAGE ${p.n} ---\n${p.text}`).join("\n");
  return {text,sources,meta:{pages:pdf.numPages,ocrPages,sourcePasses:sources.length,mode:ocrPages===0?"digital":ocrPages===pdf.numPages?"ocr":"mixed"}};
}
async function pvReadImage(file){
  const raw=await pvReadAsDataUrl(file);let worker=null;
  try{
    worker=await pvCreateWorker(1);const ocr=await pvRecognizeImage(worker,raw,1,1);
    return {text:`--- PAGE 1 ---\n${ocr.text}`,sources:ocr.passes,meta:{pages:1,ocrPages:1,sourcePasses:ocr.passes.length,mode:"ocr"}};
  }finally{try{if(worker)await worker.terminate();}catch(e){}}
}
async function runPvDocumentAnalysis(){
  if(pvImportState.busy)return;
  const file=pvImportState.file,kind=pvFileKind(file),runId=++_pvRunSeq;
  if(!file){pvSetStatus(t("pvOcrNoFile"),"error");return;}
  if(!kind){pvSetStatus(t("pvOcrBadType"),"error");return;}
  if(file.size>PV_OCR_MAX_BYTES){pvSetStatus(t("pvOcrTooLarge"),"error");return;}
  pvImportState.busy=true;pvImportState.text="";pvImportState.matches=[];pvImportState.meta=null;pvRefreshResults();
  try{
    const result=kind==="pdf"?await pvReadPdf(file):await pvReadImage(file);
    if(runId!==_pvRunSeq)return;
    pvImportState.text=result.text||"";
    const analysed=pvAnalyseDocumentSources(result.sources||[],pvImportState.text);
    pvImportState.matches=analysed.matches;
    pvImportState.meta={...(result.meta||{}),sourcePasses:analysed.sourceCount||0,rowsFound:analysed.sequence.rowsFound||0,sequenceFull:!!analysed.sequence.full,recognized:analysed.sequence.recognized||0,documentRows:analysed.sequence.documentRows||0,missingRegister:analysed.sequence.missingRegister||[],unmatchedRefs:analysed.sequence.unmatchedRefs||[],inferred:analysed.sequence.inferred||0,conflicts:analysed.matches.filter(m=>m.status==="conflict").length};
    const sure=pvImportState.matches.filter(m=>m.status==="sure").length,review=pvImportState.matches.filter(m=>m.status!=="sure"&&m.status!=="excluded").length;
    pvSetStatus(analysed.sequence.full?tVars("pvOcrSequenceOk",{n:analysed.sequence.recognized||sure,m:analysed.sequence.inferred||0}):(pvImportState.matches.length?tVars("pvOcrResult",{sure,review}):t("pvOcrNoMatch")),sure?"ok":"warn");
  }catch(err){
    console.error("PV OCR",err);
    if(String(err&&err.message||"").startsWith("PV_TOO_MANY:")){
      const n=String(err.message).split(":")[1]||"?";pvSetStatus(tVars("pvOcrTooManyPages",{n}),"error");
    }else pvSetStatus(t("pvOcrLoadFail"),"error");
  }finally{if(runId===_pvRunSeq){pvImportState.busy=false;pvRefreshResults();}}
}

    if(a.length===4&&(a.startsWith("19")||a.startsWith("20"))){y=a;mo=b;d=c;}
    else{d=a;mo=b;y=c.length===2?"20"+c:c;}

  if(field==="num"){
    const norm=type==="ct"?v=>formatCtNumber(v).toUpperCase().replace(/[.\s]/g,""):v=>normalizeDocumentRef(v).toUpperCase().replace(/\s+/g,"");

function mergeOcrResults(results,type){

  if(type==="pm")parsed.num=_bestFieldCandidate(arr,"num",_strongPermitNumber,normalizeDocumentRef)||parsed.num;

async function _recognizeVariant(worker,type,dataUrl,sourceLong,variant){

async function recognizeBestOcr(worker,type,image){
  const img=await loadImageDataUrl(image),info=ocrSourceInfo(img),results=[],need={as:3,ct:3,pm:3,cg:2}[type]||1;
  try{if(worker.setParameters)await worker.setParameters({tessedit_pageseg_mode:"11",preserve_interword_spaces:"1",user_defined_dpi:"300"});}catch(e){}
  results.push(await _recognizeVariant(worker,type,buildOcrVariant(img,{x:.015,y:.01,w:.97,h:.98},3400,false),info.long,"whole-gray"));

  // القراءة الثانية إلزامية: لا نعتبر قيمة مختلفة عن البيانات المسجلة قابلة للاستبدال من قراءة وحيدة.
  try{if(worker.setParameters)await worker.setParameters({tessedit_pageseg_mode:"3",preserve_interword_spaces:"1",user_defined_dpi:"300"});}catch(e){}
  results.push(await _recognizeVariant(worker,type,buildOcrVariant(img,{x:.015,y:.01,w:.97,h:.98},3400,true),info.long,"whole-binary"));

  if(trustedFieldCount(type,merged)>=need&&corroboratedFieldCount(type,merged)>=need)return merged;

  try{if(worker.setParameters)await worker.setParameters({tessedit_pageseg_mode:"6",preserve_interword_spaces:"1",user_defined_dpi:"300"});}catch(e){}
  for(const [i,rect] of ocrBandRects(img).entries()){
    results.push(await _recognizeVariant(worker,type,buildOcrVariant(img,rect,3200,true),info.long,"band-"+(i+1)));
    merged=mergeOcrResults(results,type);
    if(trustedFieldCount(type,merged)>=need&&corroboratedFieldCount(type,merged)>=need)return merged;
  }
  return mergeOcrResults(results,type);
}

async function analyseDocument(tt,draftImages,draftOcr,draftOcrSources){
  const image=(draftOcrSources&&draftOcrSources[tt])||draftImages[tt];if(!image){setOcrStatus(tt,t("ocrNoImage"),"error");return;}
  const btn=document.getElementById("ocr_"+tt);if(btn)btn.disabled=true;setOcrStatus(tt,t("ocrLoading"),"busy");
  let worker=null;
  try{
    const OCR=await loadOcrLibrary();const lang=(document.getElementById("ocr_lang")||{}).value||"ara+fra+eng";
    worker=await OCR.createWorker(lang,1,{logger:m=>{if(m&&m.status){const p=typeof m.progress==="number"?" "+Math.round(m.progress*100)+"%":"";setOcrStatus(tt,t("ocrWorking")+p,"busy");}}});
    const best=await recognizeBestOcr(worker,tt,image);
    const trusted=trustedOcrParsed(tt,best.parsed,best.confidence);
    draftOcr[tt]={text:best.text,confidence:best.confidence,parsed:best.parsed,trusted:trusted,supports:best.supports||{},sourceLong:best.sourceLong||0,updatedAt:new Date().toISOString()};
    setOcrPreview(tt,image,draftOcr[tt]);
    if(!best.text){setOcrStatus(tt,t("ocrNoText"),"error");return;}
    const recognized=parsedFieldCount(trusted),need={as:3,ct:3,pm:3,cg:2}[tt]||1;
    if(!recognized){
      if(best.confidence<OCR_MIN_CONFIDENCE)setOcrStatus(tt,tVars("ocrLowNoFill",{p:best.confidence}),"error");
      else setOcrStatus(tt,t("ocrNone"),"error");
      return;
    }
    const applied=applyOcrFields(tt,trusted,best.supports||{}),changed=applied.filled+applied.replaced;
    if(applied.replaced){setOcrStatus(tt,tVars("ocrReplaced",{n:applied.replaced}),"ok");}
    else if(applied.weakConflicts){setOcrStatus(tt,tVars("ocrWeakConflicts",{n:applied.weakConflicts}),"warn");}
    else if((best.sourceLong||0)>0&&(best.sourceLong||0)<1700&&recognized<need){setOcrStatus(tt,tVars("ocrLegacyPartial",{px:best.sourceLong,n:recognized}),"warn");}
    else if(best.confidence<OCR_MIN_CONFIDENCE){
      if(changed)setOcrStatus(tt,tVars("ocrLowTrusted",{p:best.confidence,n:changed}),"warn");
      else setOcrStatus(tt,tVars("ocrLowTrustedKept",{p:best.confidence,n:recognized}),"warn");
    }else if(changed)setOcrStatus(tt,tVars("ocrDone",{n:changed}),"ok");
    else setOcrStatus(tt,tVars("ocrKept",{n:recognized}),"ok");
  }catch(err){console.error("OCR",err);setOcrStatus(tt,t("ocrFailed"),"error");}
  finally{try{if(worker)await worker.terminate();}catch(e){}if(btn)btn.disabled=!draftImages[tt];}
}

}
function docCell(d){if(!d||!d.fin)return`<span class="muted">${t("nonRens")}</span>`;const st=statusOf(d.fin),n=daysLeft(d.fin);
  const lbl=st==="bad"?t("expireL"):(st==="warn"?n+" "+t("inDays"):t("valide"));return `${fmtDate(d.fin)} <span class="pill ${st}">${lbl}</span>`;}

/* ===== DESIGN PANEL ===== */
function renderDesign(){
  const d=DATA.design;
  const fonts=[["classic","fClassic"],["modern","fModern"],["formal","fFormal"]];
  const sizes=[["s","szS"],["m","szM"],["l","szL"],["xl","szXL"],["xxl","szXXL"]];
  $("#view").innerHTML=`<div class="card"><h2 class="sec">${t("design")}<span class="bar"></span></h2>
    <div class="field"><label>${t("desFont")}</label><div class="seg" id="segFont">${fonts.map(([k,l])=>`<button data-v="${k}" class="${d.font===k?"on":""}">${t(l)}</button>`).join("")}</div></div>
    <div class="field"><label>${t("desSize")}</label><div class="seg" id="segSize">${sizes.map(([k,l])=>`<button data-v="${k}" class="${d.size===k?"on":""}">${t(l)}</button>`).join("")}</div></div>
    <div class="field"><label class="chk"><input type="checkbox" id="dBold" ${d.bold?"checked":""}> ${t("desBold")}</label></div>
    <div class="field"><label>${t("desAccent")}</label><div class="swatches" id="swA">${Object.entries(ACC).map(([k,v])=>`<div class="sw ${d.accent===k?"on":""}" data-v="${k}" style="background:${v}" title="${k}"></div>`).join("")}</div></div>
    <div class="toolbar" style="margin-top:6px"><button class="btn gray sm" id="dReset">${t("resetDes")}</button></div>
  </div>
  <div class="card"><h2 class="sec">${t("preview")}<span class="bar"></span></h2>
    <div class="preview" id="dPrev"></div></div>`;
  const upd=async()=>{applyDesign();drawPrev();await saveAll();};
  document.querySelectorAll("#segFont button").forEach(b=>b.onclick=()=>{DATA.design.font=b.dataset.v;renderDesign();upd();});
  document.querySelectorAll("#segSize button").forEach(b=>b.onclick=()=>{DATA.design.size=b.dataset.v;renderDesign();upd();});
  $("#dBold").onchange=e=>{DATA.design.bold=e.target.checked;upd();};
  document.querySelectorAll("#swA .sw").forEach(s=>s.onclick=()=>{DATA.design.accent=s.dataset.v;renderDesign();upd();});
  $("#dReset").onclick=()=>{DATA.design={font:"classic",size:"m",bold:false,accent:"gold"};renderDesign();upd();};
  drawPrev();
}
function drawPrev(){
  const d=DATA.design,ac=ACC[d.accent]||ACC.gold,px=SZ[d.size]||12.5,bw=d.bold?600:400;
  let fam=d.font==="formal"?`"Times New Roman",serif`:`"IBM Plex Sans","IBM Plex Sans Arabic",sans-serif`;
  let tf=d.font==="classic"?`"Marcellus",serif`:fam;
  const el=$("#dPrev");if(!el)return;
  el.innerHTML=`<div style="font-family:${tf};font-size:${Math.round(px*1.5)}px;color:#111;border-bottom:2px solid ${ac};display:inline-block;padding-bottom:4px;margin-bottom:8px">${esc(t("pvTitle"))}</div>
    <div style="font-family:${fam};font-size:${px}px;font-weight:${bw};color:#222;margin-bottom:8px">${esc(t("pvPara"))}</div>
    <div style="background:${ac};color:#fff;font-family:${tf};font-size:${px}px;padding:4px 8px;border-radius:4px;display:inline-block">${esc(CATS[1])}</div>
    <div class="mono" style="font-size:${px}px;margin-top:8px">04.10906.02 — 2025</div>`;
}

/* ===== SETTINGS ===== */
function renderSet(){
  const c=DATA.company;
  $("#view").innerHTML=`<div class="card"><h2 class="sec">${t("entreprise")}<span class="bar"></span></h2>
    <div class="field"><label>${t("raison")}</label><input id="s_name" value="${esc(c.name)}"></div>
    <div class="row2"><div class="field"><label>RC N°</label><input id="s_rc" value="${esc(c.rc)}"></div>
      <div class="field"><label>${t("ville")}</label><input id="s_ville" value="${esc(c.ville||"")}"></div></div>
    <div class="field"><label>${t("refExp")}</label><input id="s_exp" value="${esc(c.expertise||"")}"></div>
    <div class="field"><label>${t("refHui")}</label><input id="s_huis" value="${esc(c.huissier||"")}"></div>
    <div class="field"><label>${t("logo")}</label><div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">${logoImg(54)}
        <label class="btn ghost sm" style="cursor:pointer">${t("replace")}<input type="file" id="s_logo" accept="image/*" style="display:none"></label>
        ${c.logo?`<button class="btn gray sm" id="s_logoReset">${t("blasonBack")}</button>`:`<span class="muted">${t("blasonIn")}</span>`}</div></div>
    <button class="btn" id="s_save">${t("save")}</button></div>
  <div class="card"><h2 class="sec">${t("backup")}<span class="bar"></span></h2>
    <p class="muted" style="margin-top:0">${t("savedAuto")} ☁️ مُتزامن عبر السحابة بين الأجهزة.</p>
    <div class="toolbar"><button class="btn ghost" id="exp">${t("exp")}</button>
      <label class="btn ghost" style="cursor:pointer">${t("imp")}<input type="file" id="imp" accept="application/json,.json" style="display:none"></label>
      <button class="btn danger" id="reset">${t("reset")}</button></div></div>`;
  $("#s_logo").onchange=ev=>{const f=ev.target.files[0];if(!f)return;compressImage(f,async(data)=>{if(!data){alert("Image illisible.");return;}DATA.company.logo=data;await saveAll();applyLang();renderSet();});};
  const lr=$("#s_logoReset");if(lr)lr.onclick=async()=>{DATA.company.logo="";await saveAll();applyLang();renderSet();};
  $("#s_save").onclick=async()=>{DATA.company.name=$("#s_name").value.trim();DATA.company.rc=$("#s_rc").value.trim();DATA.company.ville=$("#s_ville").value.trim();DATA.company.expertise=$("#s_exp").value.trim();DATA.company.huissier=$("#s_huis").value.trim();await saveAll();applyLang();alert(t("saved"));};
  $("#exp").onclick=()=>{const b=new Blob([JSON.stringify(DATA,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="parc_egtph_"+new Date().toISOString().slice(0,10)+".json";a.click();};
  $("#imp").onchange=ev=>{const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=async()=>{try{const o=JSON.parse(r.result);if(!o.equipment)throw 0;DATA=o;DATA.company=Object.assign({},SEED.company,DATA.company||{});DATA.print=Object.assign({},SEED.print,DATA.print||{});DATA.design=Object.assign({},SEED.design,DATA.design||{});if(!Array.isArray(DATA.deletedIds))DATA.deletedIds=[];selIds=null;await saveAll();applyLang();applyDesign();alert(t("imported"));renderSet();}catch(e){alert(t("badFile"));}};r.readAsText(f);};
  $("#reset").onclick=async()=>{if(!confirm(t("confirmReset")))return;DATA=JSON.parse(JSON.stringify(SEED));selIds=null;await saveAll();applyLang();applyDesign();renderSet();};
}
init();
setTimeout(cloudSync,500);
setTimeout(startCloudStream,1500);
setInterval(cloudSync,15000); // فحص دوري خفيف كخطّة بديلة لو انقطع SSE
</script>
