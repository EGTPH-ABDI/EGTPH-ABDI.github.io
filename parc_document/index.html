<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="../egtph-auth.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EGTPH — Matériel & Soumissions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Cinzel:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0c1c21;--ink-2:#11242a;--paper:#f6f2ea;--paper-2:#efe9dc;--card:#fffdf9;
  --line:#e3dccc;--line-2:#d8cfb8;--muted:#7a7468;--gold:#b08d4f;--gold-2:#c8a86a;--gold-soft:#ece0c6;
  --teal:#5e8f97;--danger:#9b3a2f;--ok:#3f7a57;--warn:#b7791f;--radius:14px;
  --shadow:0 1px 2px rgba(12,28,33,.05),0 14px 40px rgba(12,28,33,.09);
  --font-disp:"Marcellus",serif;--font-crest:"Cinzel",serif;--font-lat:"IBM Plex Sans",sans-serif;
  --font-ar:"IBM Plex Sans Arabic",sans-serif;--font-mono:"IBM Plex Mono",monospace;
}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);background-image:radial-gradient(circle at 1px 1px,rgba(176,141,79,.05) 1px,transparent 0);background-size:22px 22px;color:var(--ink);font:14px/1.5 var(--font-lat)}
body[dir="rtl"]{font-family:var(--font-ar)}
input,select,textarea,button{font-family:inherit}
.mono{font-family:var(--font-mono)}

.layout{display:flex;min-height:100vh}
.sidebar{width:240px;flex:none;background:linear-gradient(170deg,#11242a,#0c1c21 60%,#0a161a);color:#c7d2cd;display:flex;flex-direction:column;padding:18px 14px;position:sticky;top:0;height:100vh;z-index:30}
.brand{background:#fff;border-radius:10px;padding:6px 8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;min-height:54px}
.brand img{height:42px;width:auto;max-width:100%;object-fit:contain}
.brand-tag{text-align:center;font-size:9.5px;letter-spacing:2px;color:var(--gold-2);text-transform:uppercase;margin-bottom:16px}
.nav{display:flex;flex-direction:column;gap:3px}
.nav button{display:flex;align-items:center;gap:11px;padding:11px 12px;border:0;border-radius:11px;background:transparent;color:#bcc8c3;cursor:pointer;font-size:14px;text-align:start;width:100%}
.nav button:hover{background:rgba(255,255,255,.06);color:#fff}
.nav button.active{background:linear-gradient(135deg,#b08d4f,#9c7c40);color:#1a1206;font-weight:700;box-shadow:0 6px 16px rgba(176,141,79,.3)}
.nav svg{width:19px;height:19px;flex:none}
.side-foot{margin-top:auto;padding-top:14px;border-top:1px solid rgba(255,255,255,.1)}
.lang-btn{width:100%;background:rgba(255,255,255,.06);color:#e8eeec;border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:9px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px}
.lang-btn:hover{background:rgba(176,141,79,.25)}

.content{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:15;background:rgba(246,242,234,.82);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px 18px;display:flex;align-items:center;gap:12px}
.topbar .pg{font-family:var(--font-disp);font-size:20px;margin:0;flex:1}
body[dir="rtl"] .topbar .pg{font-family:var(--font-ar);font-weight:600}
.menu-btn{display:none;background:transparent;border:1px solid var(--line-2);border-radius:9px;padding:7px 9px;cursor:pointer;color:var(--ink)}
.menu-btn svg{width:20px;height:20px;display:block}
.topbar .tlogo{height:34px;width:auto;max-width:150px;object-fit:contain}
main{padding:18px;max-width:1000px;width:100%;margin:0 auto}
.scrim{display:none;position:fixed;inset:0;background:rgba(12,28,33,.45);z-index:25}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
h2.sec{font-family:var(--font-disp);font-size:22px;font-weight:400;margin:0 0 16px;line-height:1.2}
body[dir="rtl"] h2.sec{font-family:var(--font-ar);font-weight:600}
h2.sec .bar{display:block;width:54px;height:2px;background:var(--gold);margin-top:7px}
body[dir="rtl"] h2.sec .bar{margin-inline-start:0;margin-inline-end:auto}
.muted{color:var(--muted)}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px;text-align:center}
.stat .n{font-family:var(--font-disp);font-size:30px}.stat .l{font-size:12px;color:var(--muted);margin-top:3px}
.stat.bad .n{color:var(--danger)}.stat.warn .n{color:var(--warn)}.stat.ok .n{color:var(--ok)}
@media(max-width:680px){.stats{grid-template-columns:repeat(2,1fr)}}

.alert-row{display:flex;align-items:center;gap:10px;padding:11px;border-radius:11px;margin-bottom:8px;border:1px solid var(--line)}
.alert-row.bad{background:#f7e9e6;border-color:#e3c2bb}.alert-row.warn{background:#fbf2df;border-color:#ecdcb4}
.alert-row .veh{flex:1}.alert-row .veh b{display:block}.alert-row .veh small{color:var(--muted)}
.pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
.pill.bad{background:var(--danger);color:#fff}.pill.warn{background:var(--warn);color:#fff}.pill.ok{background:var(--ok);color:#fff}

.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
input,select,textarea{font:inherit;padding:9px 11px;border:1px solid var(--line-2);border-radius:10px;background:#fff;color:var(--ink);width:100%}
input:focus,select:focus,textarea:focus{outline:0;border-color:var(--gold);box-shadow:0 0 0 3px rgba(176,141,79,.13)}
.toolbar input,.toolbar select{width:auto}
.btn{background:linear-gradient(135deg,#b08d4f,#9c7c40);color:#1a1206;border:0;padding:10px 16px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;box-shadow:0 4px 12px rgba(176,141,79,.22)}
.btn:hover{filter:brightness(1.05)}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line-2);box-shadow:none;font-weight:500}
.btn.ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn.danger{background:var(--danger);color:#fff;box-shadow:none}
.btn.gray{background:#6b7770;color:#fff;box-shadow:none}
.btn.sm{padding:6px 11px;font-size:12px}

table.grid{width:100%;border-collapse:collapse;font-size:13px}
table.grid th,table.grid td{border:1px solid var(--line);padding:8px;text-align:start;vertical-align:top}
table.grid th{background:var(--paper-2);font-size:12px;font-weight:600}
.catbar{background:linear-gradient(170deg,#11242a,#0c1c21);color:#f3ecdc;padding:8px 12px;border-radius:10px;margin:16px 0 7px;font-weight:600;font-size:13px;border-inline-start:4px solid var(--gold)}
.num{text-align:center;font-weight:700;font-family:var(--font-mono)}
.tag{font-size:10.5px;padding:2px 8px;border-radius:20px;background:var(--gold-soft);color:#7a5a1f;font-weight:700}
.tag.veh{background:#dfeee8;color:var(--ok)}

.overlay{position:fixed;inset:0;background:rgba(12,28,33,.5);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:20px;overflow:auto}
.overlay.show{display:flex}
.modal{background:var(--card);border-radius:var(--radius);max-width:640px;width:100%;padding:20px;margin:auto;box-shadow:var(--shadow)}
.modal h3{font-family:var(--font-disp);font-weight:400;margin:0 0 14px;font-size:20px}
body[dir="rtl"] .modal h3{font-family:var(--font-ar);font-weight:600}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:560px){.row2,.row3{grid-template-columns:1fr}}
.field{margin-bottom:11px}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
.doc-box{border:1px dashed var(--line-2);border-radius:12px;padding:13px;margin-top:11px}
.doc-box h4{margin:0 0 8px;font-size:13px;color:var(--gold);font-weight:700}
.thumb{max-height:60px;border:1px solid var(--line);border-radius:6px;margin-top:6px;display:block}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap}
.chk{display:flex;align-items:center;gap:8px;font-size:13px}.chk input{width:auto}
.opts label.chk{margin:6px 16px 6px 0;display:inline-flex}
body[dir="rtl"] .opts label.chk{margin:6px 0 6px 16px}

/* design panel */
.seg{display:inline-flex;flex-wrap:wrap;gap:6px}
.seg button{background:#fff;border:1px solid var(--line-2);border-radius:9px;padding:8px 13px;cursor:pointer;font-size:13px;color:var(--ink)}
.seg button.on{background:linear-gradient(135deg,#b08d4f,#9c7c40);color:#1a1206;border-color:transparent;font-weight:600}
.swatches{display:flex;gap:10px;flex-wrap:wrap}
.sw{width:34px;height:34px;border-radius:50%;cursor:pointer;border:2px solid #fff;box-shadow:0 0 0 1px var(--line-2)}
.sw.on{box-shadow:0 0 0 2px var(--ink),0 0 0 5px rgba(176,141,79,.25)}
.preview{border:1px solid var(--line);border-radius:12px;padding:16px;background:#fff;margin-top:6px}

/* document OCR */
.ocr-tools{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-top:8px}
.ocr-status{font-size:11.5px;color:var(--muted);margin-top:7px;min-height:18px}
.ocr-status.busy{color:var(--warn);font-weight:600}.ocr-status.warn{color:var(--warn);font-weight:600}.ocr-status.ok{color:var(--ok)}.ocr-status.error{color:var(--danger);font-weight:600}
.ocr-note{font-size:11.5px;color:var(--muted);margin:8px 0 0}
.ocr-raw{margin-top:8px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:8px}
.ocr-raw summary{cursor:pointer;font-size:12px;color:var(--gold);font-weight:600}
.ocr-raw pre{white-space:pre-wrap;word-break:break-word;max-height:180px;overflow:auto;font:11px/1.4 var(--font-mono);margin:8px 0 0;color:var(--ink)}

@media(max-width:880px){
  .sidebar{position:fixed;inset-block:0;inset-inline-start:0;transform:translateX(-110%);transition:transform .25s ease;box-shadow:0 0 40px rgba(0,0,0,.3)}
  body[dir="rtl"] .sidebar{transform:translateX(110%)}
  .sidebar.open{transform:translateX(0)}
  .menu-btn{display:inline-flex}
  .scrim.show{display:block}
}

/* ===== PRINT ===== */
#print-root{display:none}
@media print{ .layout,.scrim{display:none!important} #print-root{display:block!important} @page{size:A4;margin:13mm} }
#print-root{font-family:"Times New Roman",Georgia,serif;color:#000;direction:ltr;-webkit-print-color-adjust:exact;print-color-adjust:exact}
#print-root .radp{text-align:center;font-style:italic;font-size:13px;margin-bottom:8px}
#print-root .ph{display:flex;justify-content:space-between;align-items:center;border-bottom:2.5px solid #b08d4f;padding-bottom:8px}
#print-root .ph .l{display:flex;align-items:center;gap:12px}
#print-root .ph .nm b{font-size:16px}#print-root .ph .nm small{display:block;font-size:11px;color:#333}
#print-root .ph .r{text-align:right;font-size:11px;color:#333}
#print-root h1{text-align:center;font-size:19px;margin:14px 0 6px;padding-bottom:5px;border-bottom:2px solid #b08d4f;display:inline-block;width:100%}
#print-root .refs{text-align:center;font-size:11.5px;margin:0 0 10px;color:#222}
#print-root .proj{border:1px solid #000;border-radius:4px;padding:7px 10px;margin:0 0 12px;font-size:13px}
#print-root .proj div{margin:2px 0}
#print-root .cat{font-weight:bold;background:#11242a;color:#fff;padding:5px 8px;margin:12px 0 0;font-size:13px}
#print-root table{width:100%;border-collapse:collapse;font-size:12px}
#print-root th,#print-root td{border:1px solid #000;padding:4px 6px}
#print-root th{background:#e9e3d4;text-align:center}
#print-root td.c{text-align:center}#print-root .num{text-align:center;font-weight:bold;font-family:inherit}
#print-root .sign{margin-top:28px;text-align:right;font-size:13px}
#print-root .sign .pl{margin-bottom:34px}#print-root .sign b{font-size:14px}
</style>
</head>
<body>
<div id="print-root"></div>
<style id="designVars"></style>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="brand" id="sideLogo"></div>
    <div class="brand-tag">Hydraulique · Bâtiment · T.P</div>
    <div class="nav" id="nav"></div>
    <div class="side-foot"><button class="lang-btn" id="langBtn"></button></div>
  </aside>
  <div class="scrim" id="scrim"></div>
  <div class="content">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
      <h1 class="pg" id="pageTitle"></h1>
      <img class="tlogo" id="topLogo" alt="">
    </div>
    <main id="view"></main>
  </div>
</div>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

    else if((+re._mod||0)>(+loc._mod||0)){Object.assign(loc,re);changed=true;}
  });
  // 4) الإعدادات (شركة/طباعة/تصميم/لغة) — وحدة واحدة، الأحدث يغلب بالكامل
  const lm=+(DATA._mod||0), rm=+(remote._mod||0);
  if(rm>lm){
    if(remote.company)DATA.company=Object.assign({},SEED.company,remote.company);
    if(remote.print)DATA.print=Object.assign({},SEED.print,remote.print);
    if(remote.design)DATA.design=Object.assign({},SEED.design,remote.design);
    if(remote.lang)DATA.lang=remote.lang;
    DATA._mod=rm;changed=true;
  }
  // 5) حارس مزدوج: تطبيق الحذف مرّة أخرى بعد الدمج
  _applyDel(DATA.deletedIds);
  return changed;
}
async function fbFetchData(){

  if(!r.ok)throw new Error("GET "+r.status);

async function fbPush(){
  if(_cloudBusy)return false;
  // ⚠️ حارس المسح الكارثي: لا رفع أبداً قبل قراءة ناجحة للسحابة هذه الجلسة
  if(!_cloudSynced){ try{ await fbPull(); }catch(e){} if(!_cloudSynced)return false; }
  if(!navigator.onLine)return false;
  _cloudBusy=true;
  try{
    const body=JSON.stringify(fbBuildData());
    const r=await fetch(FB_URL+FB_BASE+".json"+_fbAuthQS(),{method:"PUT",headers:{"Content-Type":"application/json"},body});
    if(!r.ok)throw new Error("PUT "+r.status);
    window._cloudDirty=false;
    _cloudBusy=false;return true;
  }catch(e){ _cloudBusy=false; return false; }
}
async function fbPull(){
  if(_cloudBusy)return false;
  if(!navigator.onLine)return false;
  _cloudBusy=true;
  let remote=null,readErr=null;
  try{ remote=await fbFetchData(); }catch(e){ readErr=e; }
  if(readErr){ _cloudBusy=false; return false; } // فشل القراءة → لا رفع إطلاقاً (حماية)
  _cloudSynced=true;
  if(remote){
    window._cloudApplying=true;
    try{ const ch=mergeCloud(remote); if(ch){ await saveAll(); try{render();}catch(e){} } }
    finally{ window._cloudApplying=false; }
  }
  _cloudBusy=false;
  return true;
}

let _sse=null,_sseRetry=null,_sseDeb=null;
function startCloudStream(){
  if(!("EventSource" in window))return;

  if(!navigator.onLine)return;
  try{

    _sse.addEventListener("put",onCh);_sse.addEventListener("patch",onCh);
    _sse.onerror=()=>{ try{_sse.close();}catch(e){} _sse=null; if(_sseRetry)clearTimeout(_sseRetry); _sseRetry=setTimeout(startCloudStream,8000); };
  }catch(e){_sse=null;}

function daysLeft(d){if(!d)return null;const t=new Date(d);if(isNaN(t))return null;const n=new Date();n.setHours(0,0,0,0);return Math.round((t-n)/86400000);}
function statusOf(d){const n=daysLeft(d);if(n===null)return null;if(n<0)return"bad";if(n<=30)return"warn";return"ok";}

/* ===== CENTRAL EGTPH ALERT BRIDGE — PARC DOCUMENTAIRE =====
   Ce pont ne transmet aucune image, aucun OCR brut et aucune donnée sensible.
   Il dérive uniquement les alertes réelles : assurance, contrôle technique,
   permis de circuler et référence de carte grise manquants ou arrivant à échéance.
   Le tableau parent (apps.html) les synchronise ensuite dans son propre espace Firebase.
*/
let _parcAlertTimer=null;
function parcAlertStamp(e){
  const n=Number((e&&e._mod)||0)||Number((DATA&&DATA._mod)||0);
  return n>0?n:Date.now();
}
function parcAlertLabel(e){
  const name=String((e&&e.name)||"Véhicule").trim();
  const model=String((e&&e.model)||"").trim();
  const mat=String((e&&e.matricule)||"").trim();
  return (name+(model?" — "+model:"")+(mat?" ("+mat+")":"")).trim();
}
function parcDocAlert(id,e,kind,doc,required){
  const stamp=parcAlertStamp(e);
  const entity=parcAlertLabel(e);
  const date=doc&&doc.fin?String(doc.fin):"";
  const hasRequiredNumber=kind!=="carte_grise" || !!(doc&&String(doc.num||"").trim());
  const dateStatus=kind==="carte_grise"?null:statusOf(date);
  const missing=required && (kind==="carte_grise"?!hasRequiredNumber:!date);
  let title="",message="",severity="info",status="resolved";

  if(missing){
    status="open";severity=kind==="carte_grise"?"warning":"critical";
    if(kind==="assurance"){title="تأمين غير مسجل / Assurance manquante";message=entity+" — تاريخ انتهاء التأمين غير مسجل.";}
    else if(kind==="controle_technique"){title="مراقبة تقنية غير مسجلة / Contrôle technique manquant";message=entity+" — تاريخ صلاحية المراقبة التقنية غير مسجل.";}
    else if(kind==="permis_circuler"){title="رخصة سير غير مسجلة / Permis de circuler manquant";message=entity+" — تاريخ صلاحية رخصة السير غير مسجل.";}
    else {title="بطاقة رمادية ناقصة / Carte grise manquante";message=entity+" — رقم أو مرجع البطاقة الرمادية غير مسجل.";}
  }else if(dateStatus==="bad"){
    status="open";severity="critical";
    if(kind==="assurance"){title="تأمين منتهٍ / Assurance expirée";}
    else if(kind==="controle_technique"){title="مراقبة تقنية منتهية / Contrôle technique expiré";}
    else {title="رخصة سير منتهية / Permis de circuler expiré";}
    message=entity+" — انتهت الصلاحية في "+date+".";
  }else if(dateStatus==="warn"){
    status="open";severity="warning";
    const days=daysLeft(date);
    if(kind==="assurance"){title="تأمين قريب من الانتهاء / Assurance à renouveler";}
    else if(kind==="controle_technique"){title="مراقبة تقنية قريبة / Contrôle technique à renouveler";}
    else {title="رخصة سير قريبة من الانتهاء / Permis de circuler à renouveler";}
    message=entity+" — تنتهي الصلاحية بعد "+days+" يومًا ("+date+").";
  }

  return {
    id:"parc_document_"+String(id)+"_"+kind,
    app:"parc_document",
    source:"Parc documentaire",
    severity:severity,
    title:title,
    message:message,
    dueAt:date,
    entityId:String(id),
    entityLabel:entity,
    status:status,
    updatedAt:stamp
  };
}
function buildParcDashboardAlerts(){
  if(!DATA||!Array.isArray(DATA.equipment))return [];
  const alerts=[];
  DATA.equipment.filter(e=>e&&e.veh).forEach(e=>{
    const id=e.id;
    alerts.push(parcDocAlert(id,e,"assurance",e.assurance||{},true));
    if(e.needsCT)alerts.push(parcDocAlert(id,e,"controle_technique",e.ct||{},true));
    if(e.needsPermis)alerts.push(parcDocAlert(id,e,"permis_circuler",e.permis||{},true));
    alerts.push(parcDocAlert(id,e,"carte_grise",e.cg||{},true));
  });
  // Supprime aussi du tableau central les alertes d'un véhicule supprimé.
  (Array.isArray(DATA.deletedIds)?DATA.deletedIds:[]).forEach(d=>{
    if(!d||d.id==null)return;
    const stamp=Number(d.t)||Date.now();
    ["assurance","controle_technique","permis_circuler","carte_grise"].forEach(kind=>{
      alerts.push({
        id:"parc_document_"+String(d.id)+"_"+kind,
        app:"parc_document",
        source:"Parc documentaire",
        status:"resolved",
        updatedAt:stamp
      });
    });
  });
  return alerts;
}
function emitParcDashboardAlerts(){
  if(!DATA)return;
  if(!window.parent||window.parent===window)return;
  try{
    window.parent.postMessage({
      type:"egtph-dashboard-alerts",
      alerts:buildParcDashboardAlerts()
    },location.origin);
  }catch(e){}
}
function scheduleParcDashboardAlerts(){
  if(_parcAlertTimer)clearTimeout(_parcAlertTimer);
  _parcAlertTimer=setTimeout(emitParcDashboardAlerts,120);
}

function compressImage(file,cb){const r=new FileReader();r.onerror=()=>cb(null);
  r.onload=()=>{const img=new Image();img.onerror=()=>cb(null);
    img.onload=()=>{let w=img.width,h=img.height;const max=1400;if(w>max||h>max){const s=Math.min(max/w,max/h);w=Math.round(w*s);h=Math.round(h*s);}
      const cv=document.createElement("canvas");cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img,0,0,w,h);
      try{cb(cv.toDataURL("image/jpeg",0.7));}catch(e){cb(null);}};img.src=r.result;};r.readAsDataURL(file);}
function _documentJpeg(img,max,quality){let w=img.naturalWidth||img.width,h=img.naturalHeight||img.height;if(w>max||h>max){const s=Math.min(max/w,max/h);w=Math.max(1,Math.round(w*s));h=Math.max(1,Math.round(h*s));}
  const cv=document.createElement("canvas");cv.width=w;cv.height=h;const ctx=cv.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);return cv.toDataURL("image/jpeg",quality);}
function processDocumentImage(file,cb){const r=new FileReader();r.onerror=()=>cb(null);
  r.onload=()=>{const img=new Image();img.onerror=()=>cb(null);
    img.onload=()=>{try{cb({store:_documentJpeg(img,1400,0.72),ocr:_documentJpeg(img,2400,0.94)});}catch(e){cb(null);}};img.src=r.result;};r.readAsDataURL(file);}

/* ===== EDIT MODAL + OCR DOCUMENTS ===== */
const DOC_TYPES=["cg","as","ct","pm"];
const OCR_MIN_CONFIDENCE=60;
let _ocrLibPromise=null;

function cloneJSON(v){try{return JSON.parse(JSON.stringify(v||{}));}catch(e){return {};}}
function tVars(k,vars){let out=t(k);Object.entries(vars||{}).forEach(([n,v])=>{out=out.replace("{"+n+"}",String(v));});return out;}
function latinDigits(v){return String(v||"").replace(/[٠-٩]/g,d=>"٠١٢٣٤٥٦٧٨٩".indexOf(d)).replace(/[۰-۹]/g,d=>"۰۱۲۳۴۵۶۷۸۹".indexOf(d));}
function cleanOCR(v){return latinDigits(v).replace(/\u00a0/g," ").replace(/[|_]+/g," ").replace(/\s+/g," ").trim();}
function foldOCR(v){return cleanOCR(v).normalize("NFD").replace(/[\u0300-\u036f\u064b-\u065f\u0670]/g,"").replace(/[أإآٱ]/g,"ا").replace(/ى/g,"ي").toLowerCase();}
function ocrLines(text){return latinDigits(text).split(/\r?\n/).map(cleanOCR).filter(Boolean);}
function _dateDigits(v){return String(v||"").replace(/[OoQq]/g,"0").replace(/[IlL]/g,"1");}
function validISODate(y,mo,d){
  y=Number(y);mo=Number(mo);d=Number(d);
  if(y<1900||y>2100||mo<1||mo>12||d<1||d>31)return "";
  const iso=`${String(y).padStart(4,"0")}-${String(mo).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const dt=new Date(iso+"T00:00:00");
  return isNaN(dt)||dt.getFullYear()!==y||dt.getMonth()+1!==mo||dt.getDate()!==d?"":iso;
}
const OCR_MONTHS={
  jan:1,janv:1,janvier:1,january:1,"جانفي":1,"يناير":1,
  fev:2,fevr:2,fevrier:2,feb:2,february:2,"فيفري":2,"فبراير":2,
  mar:3,mars:3,march:3,"مارس":3,
  avr:4,avril:4,apr:4,april:4,"افريل":4,"أفريل":4,"ابريل":4,"أبريل":4,
  mai:5,may:5,"ماي":5,
  juin:6,june:6,jun:6,"جوان":6,"يونيو":6,
  juil:7,juillet:7,july:7,jul:7,"جويلية":7,"يوليو":7,
  aout:8,aug:8,august:8,"اوت":8,"أوت":8,"اغسطس":8,"أغسطس":8,
  sep:9,sept:9,septembre:9,september:9,"سبتمبر":9,
  oct:10,octobre:10,october:10,"اكتوبر":10,"أكتوبر":10,
  nov:11,novembre:11,november:11,"نوفمبر":11,
  dec:12,decembre:12,december:12,"ديسمبر":12
};
function parseISODate(v){
  const raw=latinDigits(v);
  let m=raw.match(/(?:^|[^\dA-Za-z])([0-9OoQqIlL]{1,4})\s*[.\/-]\s*([0-9OoQqIlL]{1,2})\s*[.\/-]\s*([0-9OoQqIlL]{2,4})(?=$|[^\dA-Za-z])/);
  if(m){
    const a=_dateDigits(m[1]),b=_dateDigits(m[2]),c=_dateDigits(m[3]);
    let y,mo,d;
    if(a.length===4&&(a.startsWith("19")||a.startsWith("20"))){y=a;mo=b;d=c;}
    else{d=a;mo=b;y=c.length===2?"20"+c:c;}
    const iso=validISODate(y,mo,d);if(iso)return iso;
  }
  m=raw.match(/(?:^|[^\dA-Za-z])([0-9OoQqIlL]{1,2})\s+([A-Za-zÀ-ÿ\u0600-\u06FF.]{3,18})\s+([0-9OoQqIlL]{2,4})(?=$|[^\dA-Za-z])/i);
  if(m){
    const token=foldOCR(m[2]).replace(/\./g,""),day=_dateDigits(m[1]),yearToken=_dateDigits(m[3]);
    const mo=OCR_MONTHS[token],y=yearToken.length===2?"20"+yearToken:yearToken;
    if(mo){const iso=validISODate(y,mo,day);if(iso)return iso;}
  }
  return "";
}
function datesFromText(text){
  const out=[];
  const re=/(?:[0-9OoQqIlL]{1,4}\s*[.\/-]\s*[0-9OoQqIlL]{1,2}\s*[.\/-]\s*[0-9OoQqIlL]{2,4}|[0-9OoQqIlL]{1,2}\s+[A-Za-zÀ-ÿ\u0600-\u06FF.]{3,18}\s+[0-9OoQqIlL]{2,4})/gi;
  for(const m of latinDigits(text).matchAll(re)){const d=parseISODate(m[0]);if(d&&!out.includes(d))out.push(d);}
  return out;
}
function _rxTest(rx,value){rx.lastIndex=0;const ok=rx.test(value);rx.lastIndex=0;return ok;}
function _rxMatch(rx,value){rx.lastIndex=0;const m=rx.exec(value);rx.lastIndex=0;return m;}
const DATE_LABEL_RX=/(?:date|start|effective|issue|end|expiry|expire|debut|début|fin|echeance|échéance|validite|validité|expiration|inspection|controle|contrôle|visite|delivr|délivr|ساري|تاريخ|صلاحية|انتهاء|البداية|النهاية|السريان|المراقبة|الفحص|الزيارة|التسليم|الإصدار|الاصدار)/i;
const FIELD_LABEL_RX=/^(?:n\s*[°oº]?\s*(?:(?:de|d[’\'])\s*)?(?:contrat|police|pv|p\.?v\.?|matricule|immatriculation|serie|chassis|permis|carte|certificat)|date\b|start\b|effective\b|issue\b|end\b|expiry\b|inspection\b|registration\b|vin\b|make\b|model\b|year\b|policy\b|contract\b|permit\b|authorization\b|annee\b|année\b|validite\b|validité\b|police\b|matricule\b|immatriculation\b|serie\b|série\b|chassis\b|marque\b|type\b|modele\b|modèle\b|assurance\b|controle\b|contrôle\b|permis\b|رقم\b|تاريخ\b|الصلاحية\b|التأمين\b|المراقبة\b|الفحص\b|الرخصة\b|الترخيص\b|التسجيل\b|الهيكل\b|التسلسلي\b|العلامة\b|النوع\b|الطراز\b|السنة\b)/i;
function isDateLabelLine(v){return _rxTest(DATE_LABEL_RX,foldOCR(v));}
function isLikelyFieldLabel(v){return _rxTest(FIELD_LABEL_RX,foldOCR(v));}
function looksDateOnly(v){
  const s=cleanOCR(v),d=parseISODate(s);if(!d)return false;
  const rest=foldOCR(s)
    .replace(/[0-9oqil]{1,4}\s*[.\/-]\s*[0-9oqil]{1,2}\s*[.\/-]\s*[0-9oqil]{2,4}/g,"")
    .replace(/[0-9oqil]{1,2}\s+[a-z\u0600-\u06ff.]{3,18}\s+[0-9oqil]{2,4}/g,"")
    .replace(/[\s:;,.()\-–—/]+/g,"");
  return rest.length===0||isDateLabelLine(s);
}
function normalizeDocumentRef(v){
  return cleanOCR(v)
    .replace(/^[\s:;,\-–—/\\]+/,"")
    .replace(/[\s:;,\-–—/\\]+$/,"")
    .replace(/\s*([./-])\s*/g,"$1")
    .replace(/\(\s+/g,"(").replace(/\s+\)/g,")")
    .slice(0,140);
}
function isLikelyDocumentRef(v){
  const s=normalizeDocumentRef(v);
  if(s.length<4||isDateLabelLine(s)||looksDateOnly(s))return false;
  const digits=(s.match(/\d/g)||[]).length;
  if(digits<3)return false;
  const f=foldOCR(s).replace(/[^a-z0-9\u0600-\u06ff]+/g," ");
  if(/^(?:n|no|numero|contrat|police|pv|p v|vignette|reference|ref|matricule|serie|chassis)(?:\s+(?:n|no|numero|contrat|police|pv|p v|vignette|reference|ref|matricule|serie|chassis))*$/.test(f))return false;
  return true;
}
function candidateAfterLabel(lines,labels,validator=isLikelyDocumentRef){
  for(let i=0;i<lines.length;i++){
    const m=_rxMatch(labels,lines[i]);if(!m)continue;
    let v=normalizeDocumentRef(lines[i].slice(m.index+m[0].length));
    if(v&&validator(v))return v;
    for(let j=i+1;j<Math.min(lines.length,i+4);j++){
      const cand=normalizeDocumentRef(lines[j]);
      if(!cand)continue;
      if(validator(cand))return cand;
      if(isLikelyFieldLabel(cand)||isDateLabelLine(cand))break;
    }
  }
  return "";
}
function labelledDate(lines,labels){
  for(let i=0;i<lines.length;i++){
    if(!_rxTest(labels,lines[i]))continue;
    const same=parseISODate(lines[i]);if(same)return same;
    for(let j=i+1;j<Math.min(lines.length,i+3);j++){
      if(j>i+1&&isDateLabelLine(lines[j]))break;
      const found=parseISODate(lines[j]);if(found)return found;
      if(isDateLabelLine(lines[j]))break;
    }
  }
  return "";
}
function findPlate(text){
  const src=latinDigits(text);
  const candidates=src.match(/\b\d{4,6}\s*[-.]\s*\d{3}\s*[-.]\s*\d{2}\b/g)||[];
  if(candidates.length)return candidates[0].replace(/\s+/g,"");
  const spaced=src.match(/\b\d{4,6}\s+\d{3}\s+\d{2}\b/g)||[];
  return spaced.length?spaced[0].trim().replace(/\s+/g,"-"):"";
}
function findVin(text){
  const candidates=latinDigits(text).toUpperCase().match(/\b[A-HJ-NPR-Z0-9]{17}\b/g)||[];
  return candidates.find(v=>/[A-Z]/.test(v)&&/\d/.test(v))||"";
}
function findLabelledVin(lines){
  const v=candidateAfterLabel(lines,/(?:N[°Oº]?\s*(?:DE\s*)?(?:SERIE|S[ÉE]RIE|CHASSIS)|\bVIN\b|(?:SERIAL|CHASSIS)\s*(?:NO\.?|NUMBER)?|رقم\s*(?:الهيكل|التسلسلي|السلسلة))/i,s=>/^[A-HJ-NPR-Z0-9]{11,17}$/i.test(s)&&/[A-Z]/i.test(s)&&/\d/.test(s));
  return v?v.toUpperCase():"";
}
function findInsuranceNumber(lines,all){
  const labelled=candidateAfterLabel(lines,/(?:N[°Oº]?\s*(?:DE\s*)?(?:CONTRAT\s*\/?\s*POLICE|CONTRAT|POLICE)|CONTRAT\s*\/?\s*POLICE|POLICE\s*N[°Oº]?|(?:POLICY|CONTRACT)\s*(?:NO\.?|NUMBER)|رقم\s*(?:العقد|البوليصة|الوثيقة))/i);
  if(labelled)return labelled;
  const direct=all.match(/\b[A-Z]\s*\d{3,}(?:\s*[.\-/]\s*\d+){2,}(?:\s*\([A-Z]?\d+\))?/i);
  return direct?normalizeDocumentRef(direct[0]):"";
}
function formatCtNumber(v){return cleanOCR(v).replace(/\s*\/\s*/g," / ").replace(/\bP\.?\s*V\.?\b/gi,"PV").replace(/\s+/g," ").trim();}
function findCtNumber(lines,all){
  const labelled=candidateAfterLabel(lines,/(?:N[°Oº]?\s*\/?\s*(?:PV|P\.V\.)|N[°Oº]?\s*(?:DE\s*)?(?:PV|P\.V\.|PROCES[- ]?VERBAL|VIGNETTE)|PV\s*N[°Oº]?|VIGNETTE\s*N[°Oº]?|(?:REPORT|INSPECTION|CERTIFICATE)\s*(?:NO\.?|NUMBER)|رقم\s*(?:المحضر|الفحص|المراقبة))/i);
  if(labelled)return formatCtNumber(labelled);
  const direct=all.match(/\b\d{5,}\s*\/\s*(?:(?:PV|P\.V\.|VIGNETTE)\s*)?\d{4,}\b/i);
  return direct?formatCtNumber(direct[0]):"";

      <div class="doc-box" id="ctBox" style="${e.needsCT?"":"display:none"}"><h4>${t("controleTech")}</h4><div class="row3"><div class="field"><label>${t("numPv")}</label><input id="d_ct_num" value="${esc(e.ct.num||"")}"></div><div class="field"><label>${t("dateCtrl")}</label><input type="date" id="d_ct_deb" value="${esc(e.ct.deb||"")}"></div><div class="field"><label>${t("validite")}</label><input type="date" id="d_ct_fin" value="${esc(e.ct.fin||"")}"></div></div>${imgCtl("ct",draftImages.ct,draftOcr.ct)}</div>
      <div class="doc-box" id="permBox" style="${e.needsPermis?"":"display:none"}"><h4>${t("permisCirc")}</h4><div class="field"><label>${t("numRef")}</label><input id="d_pm_num" value="${esc(e.permis.num||"")}"></div><div class="row2"><div class="field"><label>${t("dateDeliv")}</label><input type="date" id="d_pm_deb" value="${esc(e.permis.deb||"")}"></div><div class="field"><label>${t("validite")}</label><input type="date" id="d_pm_fin" value="${esc(e.permis.fin||"")}"></div></div>${imgCtl("pm",draftImages.pm,draftOcr.pm)}</div>
    </div>
    <div class="modal-actions">${id?`<button class="btn danger" id="m_del" type="button">${t("del")}</button>`:""}<button class="btn gray" id="m_cancel" type="button">${t("cancel")}</button><button class="btn" id="m_save" type="button">${t("save")}</button></div>`;
  $("#overlay").classList.add("show");
  $("#m_veh").onchange=ev=>{$("#docZone").style.display=ev.target.checked?"block":"none";};
  $("#m_ct").onchange=ev=>{$("#ctBox").style.display=ev.target.checked?"block":"none";};
  $("#m_perm").onchange=ev=>{$("#permBox").style.display=ev.target.checked?"block":"none";};
  $("#m_cancel").onclick=closeModal;if(id)$("#m_del").onclick=()=>delItem(id);
  DOC_TYPES.forEach(tt=>{
    setOcrPreview(tt,draftImages[tt],draftOcr[tt]);
    const inp=document.getElementById("file_"+tt);if(inp)inp.onchange=ev=>handleImg(ev,draftImages,imageDirty,draftOcr,tt,draftOcrSources);
    const rm=document.getElementById("rm_"+tt);if(rm)rm.onclick=()=>{draftImages[tt]=null;draftOcrSources[tt]=null;imageDirty[tt]=true;delete draftOcr[tt];setOcrPreview(tt,null,null);};
    const oc=document.getElementById("ocr_"+tt);if(oc)oc.onclick=()=>analyseDocument(tt,draftImages,draftOcr,draftOcrSources);
  });
  $("#m_save").onclick=()=>saveItem(e,draftImages,imageDirty,draftOcr);
}
function imgCtl(tt,img,record){return `<div class="ocr-tools"><label class="btn ghost sm" style="cursor:pointer;display:inline-block">${t("joindre")}<input type="file" id="file_${tt}" accept="image/*" style="display:none"></label><button class="btn ghost sm" id="ocr_${tt}" type="button" ${img?"":"disabled"}>${t("analyseOCR")}</button><button class="btn gray sm" id="rm_${tt}" type="button">${t("retirer")}</button></div><div id="thumb_${tt}">${img?`<img class="thumb" src="${img}" alt="">`:""}</div><div class="ocr-status" id="ocr_status_${tt}"></div><div id="ocr_raw_${tt}">${record&&record.text?`<details class="ocr-raw"><summary>${t("ocrText")} — ${Math.round(Number(record.confidence)||0)}%</summary><pre>${esc(record.text)}</pre></details>`:""}</div>`;}
function handleImg(ev,draftImages,imageDirty,draftOcr,tt,draftOcrSources){const input=ev.target,f=input.files&&input.files[0];if(!f)return;if(f.type&&!f.type.startsWith("image/")){alert(t("ocrBadImage"));input.value="";return;}processDocumentImage(f,data=>{input.value="";if(!data){alert(t("ocrBadImage"));return;}draftImages[tt]=data.store;draftOcrSources[tt]=data.ocr;imageDirty[tt]=true;delete draftOcr[tt];setOcrPreview(tt,data.store,null);});}
async function saveItem(e,draftImages,imageDirty,draftOcr){
  e.name=$("#m_name").value.trim();e.model=$("#m_model").value.trim();e.cat=Number($("#m_cat").value);e.matricule=$("#m_mat").value.trim();e.facture=$("#m_fac").value.trim();e.annee=$("#m_an").value.trim();e.etat=$("#m_etat").value.trim();e.obs=$("#m_obs").value.trim();e.veh=$("#m_veh").checked;
  if(e.veh){e.serie=$("#m_serie").value.trim();e.needsCT=$("#m_ct").checked;e.needsPermis=$("#m_perm").checked;e.cg={num:$("#d_cg_num").value.trim()};e.assurance={num:$("#d_as_num").value.trim(),deb:$("#d_as_deb").value,fin:$("#d_as_fin").value,ref:$("#d_as_ref").value};e.ct={num:$("#d_ct_num").value.trim(),deb:$("#d_ct_deb").value,fin:$("#d_ct_fin").value};e.permis={num:$("#d_pm_num").value.trim(),deb:$("#d_pm_deb").value,fin:$("#d_pm_fin").value};}
  if(!e.name){alert(t("required"));return;}e.ocr=draftOcr;e._mod=nextMod();
  if(!DATA.equipment.find(x=>x.id===e.id))DATA.equipment.push(e);
  for(const tt of DOC_TYPES){if(!imageDirty[tt])continue;if(draftImages[tt])await setImg(e.id+"_"+tt,draftImages[tt]);else await delImg(e.id+"_"+tt);}
  await saveAll();closeModal();show(CUR);
}
async function delItem(id){if(!confirm(t("confirmDel")))return;if(!Array.isArray(DATA.deletedIds))DATA.deletedIds=[];DATA.deletedIds.push({id:id,t:nextMod()});if(DATA.deletedIds.length>2000)DATA.deletedIds=DATA.deletedIds.slice(-2000);DATA.equipment=DATA.equipment.filter(x=>x.id!==id);for(const tt of DOC_TYPES)await delImg(id+"_"+tt);await saveAll();closeModal();show(CUR);}
function closeModal(){$("#overlay").classList.remove("show");$("#modal").innerHTML="";}
$("#overlay").addEventListener("click",ev=>{if(ev.target.id==="overlay")closeModal();});

/* ===== PARC ===== */
function renderParc(){
  const veh=DATA.equipment.filter(e=>e.veh);
  let entries=[];
  veh.forEach(e=>{
    if(e.assurance&&e.assurance.fin)entries.push({e,type:t("assurance"),fin:e.assurance.fin});
    if(e.needsCT&&e.ct&&e.ct.fin)entries.push({e,type:t("controleTech"),fin:e.ct.fin});
    if(e.needsPermis&&e.permis&&e.permis.fin)entries.push({e,type:t("permisCirc"),fin:e.permis.fin});});
  entries.sort((a,b)=>new Date(a.fin)-new Date(b.fin));
  const bad=entries.filter(x=>statusOf(x.fin)==="bad").length,warn=entries.filter(x=>statusOf(x.fin)==="warn").length;
  const missing=veh.filter(e=>(!(e.assurance&&e.assurance.fin))||(e.needsCT&&!(e.ct&&e.ct.fin))||(e.needsPermis&&!(e.permis&&e.permis.fin))).length;
  const alerts=entries.filter(x=>statusOf(x.fin)!=="ok");
  let html=`<div class="toolbar"><button class="btn" id="addVehBtn">${t("addVeh")}</button></div><div class="stats">
    <div class="stat"><div class="n">${DATA.equipment.length}</div><div class="l">${t("equipements")}</div></div>
    <div class="stat"><div class="n">${veh.length}</div><div class="l">${t("vehiculesN")}</div></div>
    <div class="stat warn"><div class="n">${warn}</div><div class="l">${t("expire30")}</div></div>
    <div class="stat bad"><div class="n">${bad}</div><div class="l">${t("expired")}</div></div></div>
    <div class="card"><h2 class="sec">${t("alertsTitle")}<span class="bar"></span></h2>`;
  if(!alerts.length) html+=`<p class="muted">${t("noAlert")}${missing?`<br>ℹ️ ${missing} ${t("missing")}`:""}</p>`;
  else alerts.forEach(x=>{const st=statusOf(x.fin),n=daysLeft(x.fin);const lbl=st==="bad"?`${t("expireL")} +${Math.abs(n)} ${t("inDays")}`:`${n} ${t("inDays")}`;
    html+=`<div class="alert-row ${st}"><div class="veh"><b>${esc(x.e.name)} ${esc(x.e.model||"")}</b><small>${esc(x.e.matricule||"")} • ${x.type} • ${fmtDate(x.fin)}</small></div><span class="pill ${st}">${lbl}</span></div>`;});
  html+=`</div><div class="card"><h2 class="sec">${t("suivi")}<span class="bar"></span></h2><div style="overflow:auto"><table class="grid"><thead><tr><th>${t("designation")}</th><th>${t("matSerie")}</th><th>${t("assurance")}</th><th>${t("controleTech")}</th><th>${t("permisCol")}</th></tr></thead><tbody>`;
  veh.forEach(e=>{html+=`<tr><td><b>${esc(e.name)}</b><br><small class="muted">${esc(e.model||"")}</small></td>
    <td>${esc(e.matricule||"—")}${e.serie?`<br><small class="muted">${esc(e.serie)}</small>`:""}</td>
    <td>${docCell(e.assurance)}</td><td>${e.needsCT?docCell(e.ct):`<span class="muted">${t("nonRequis")}</span>`}</td><td>${e.needsPermis?docCell(e.permis):`<span class="muted">${t("nonRequis")}</span>`}</td></tr>`;});
  html+=`</tbody></table></div></div>`;$("#view").innerHTML=html;
  $("#addVehBtn").onclick=()=>openEdit(null,true);
}
function docCell(d){if(!d||!d.fin)return`<span class="muted">${t("nonRens")}</span>`;const st=statusOf(d.fin),n=daysLeft(d.fin);
  const lbl=st==="bad"?t("expireL"):(st==="warn"?n+" "+t("inDays"):t("valide"));return `${fmtDate(d.fin)} <span class="pill ${st}">${lbl}</span>`;}

/* ===== DESIGN PANEL ===== */
function renderDesign(){
  const d=DATA.design;
  const fonts=[["classic","fClassic"],["modern","fModern"],["formal","fFormal"]];
  const sizes=[["s","szS"],["m","szM"],["l","szL"],["xl","szXL"],["xxl","szXXL"]];
  $("#view").innerHTML=`<div class="card"><h2 class="sec">${t("design")}<span class="bar"></span></h2>
    <div class="field"><label>${t("desFont")}</label><div class="seg" id="segFont">${fonts.map(([k,l])=>`<button data-v="${k}" class="${d.font===k?"on":""}">${t(l)}</button>`).join("")}</div></div>
    <div class="field"><label>${t("desSize")}</label><div class="seg" id="segSize">${sizes.map(([k,l])=>`<button data-v="${k}" class="${d.size===k?"on":""}">${t(l)}</button>`).join("")}</div></div>
    <div class="field"><label class="chk"><input type="checkbox" id="dBold" ${d.bold?"checked":""}> ${t("desBold")}</label></div>
    <div class="field"><label>${t("desAccent")}</label><div class="swatches" id="swA">${Object.entries(ACC).map(([k,v])=>`<div class="sw ${d.accent===k?"on":""}" data-v="${k}" style="background:${v}" title="${k}"></div>`).join("")}</div></div>
    <div class="toolbar" style="margin-top:6px"><button class="btn gray sm" id="dReset">${t("resetDes")}</button></div>
  </div>
  <div class="card"><h2 class="sec">${t("preview")}<span class="bar"></span></h2>
    <div class="preview" id="dPrev"></div></div>`;
  const upd=async()=>{applyDesign();drawPrev();await saveAll();};
  document.querySelectorAll("#segFont button").forEach(b=>b.onclick=()=>{DATA.design.font=b.dataset.v;renderDesign();upd();});
  document.querySelectorAll("#segSize button").forEach(b=>b.onclick=()=>{DATA.design.size=b.dataset.v;renderDesign();upd();});
  $("#dBold").onchange=e=>{DATA.design.bold=e.target.checked;upd();};
  document.querySelectorAll("#swA .sw").forEach(s=>s.onclick=()=>{DATA.design.accent=s.dataset.v;renderDesign();upd();});
  $("#dReset").onclick=()=>{DATA.design={font:"classic",size:"m",bold:false,accent:"gold"};renderDesign();upd();};
  drawPrev();
}
function drawPrev(){
  const d=DATA.design,ac=ACC[d.accent]||ACC.gold,px=SZ[d.size]||12.5,bw=d.bold?600:400;
  let fam=d.font==="formal"?`"Times New Roman",serif`:`"IBM Plex Sans","IBM Plex Sans Arabic",sans-serif`;
  let tf=d.font==="classic"?`"Marcellus",serif`:fam;
  const el=$("#dPrev");if(!el)return;
  el.innerHTML=`<div style="font-family:${tf};font-size:${Math.round(px*1.5)}px;color:#111;border-bottom:2px solid ${ac};display:inline-block;padding-bottom:4px;margin-bottom:8px">${esc(t("pvTitle"))}</div>
    <div style="font-family:${fam};font-size:${px}px;font-weight:${bw};color:#222;margin-bottom:8px">${esc(t("pvPara"))}</div>
    <div style="background:${ac};color:#fff;font-family:${tf};font-size:${px}px;padding:4px 8px;border-radius:4px;display:inline-block">${esc(CATS[1])}</div>
    <div class="mono" style="font-size:${px}px;margin-top:8px">04.10906.02 — 2025</div>`;
}

/* ===== SETTINGS ===== */
function renderSet(){
  const c=DATA.company;
  $("#view").innerHTML=`<div class="card"><h2 class="sec">${t("entreprise")}<span class="bar"></span></h2>
    <div class="field"><label>${t("raison")}</label><input id="s_name" value="${esc(c.name)}"></div>
    <div class="row2"><div class="field"><label>RC N°</label><input id="s_rc" value="${esc(c.rc)}"></div>
      <div class="field"><label>${t("ville")}</label><input id="s_ville" value="${esc(c.ville||"")}"></div></div>
    <div class="field"><label>${t("refExp")}</label><input id="s_exp" value="${esc(c.expertise||"")}"></div>
    <div class="field"><label>${t("refHui")}</label><input id="s_huis" value="${esc(c.huissier||"")}"></div>
    <div class="field"><label>${t("logo")}</label><div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">${logoImg(54)}
        <label class="btn ghost sm" style="cursor:pointer">${t("replace")}<input type="file" id="s_logo" accept="image/*" style="display:none"></label>
        ${c.logo?`<button class="btn gray sm" id="s_logoReset">${t("blasonBack")}</button>`:`<span class="muted">${t("blasonIn")}</span>`}</div></div>
    <button class="btn" id="s_save">${t("save")}</button></div>
  <div class="card"><h2 class="sec">${t("backup")}<span class="bar"></span></h2>
    <p class="muted" style="margin-top:0">${t("savedAuto")} ☁️ مُتزامن عبر السحابة بين الأجهزة.</p>
    <div class="toolbar"><button class="btn ghost" id="exp">${t("exp")}</button>
      <label class="btn ghost" style="cursor:pointer">${t("imp")}<input type="file" id="imp" accept="application/json,.json" style="display:none"></label>
      <button class="btn danger" id="reset">${t("reset")}</button></div></div>`;
  $("#s_logo").onchange=ev=>{const f=ev.target.files[0];if(!f)return;compressImage(f,async(data)=>{if(!data){alert("Image illisible.");return;}DATA.company.logo=data;await saveAll();applyLang();renderSet();});};
  const lr=$("#s_logoReset");if(lr)lr.onclick=async()=>{DATA.company.logo="";await saveAll();applyLang();renderSet();};
  $("#s_save").onclick=async()=>{DATA.company.name=$("#s_name").value.trim();DATA.company.rc=$("#s_rc").value.trim();DATA.company.ville=$("#s_ville").value.trim();DATA.company.expertise=$("#s_exp").value.trim();DATA.company.huissier=$("#s_huis").value.trim();await saveAll();applyLang();alert(t("saved"));};
  $("#exp").onclick=()=>{const b=new Blob([JSON.stringify(DATA,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="parc_egtph_"+new Date().toISOString().slice(0,10)+".json";a.click();};
  $("#imp").onchange=ev=>{const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=async()=>{try{const o=JSON.parse(r.result);if(!o.equipment)throw 0;DATA=o;DATA.company=Object.assign({},SEED.company,DATA.company||{});DATA.print=Object.assign({},SEED.print,DATA.print||{});DATA.design=Object.assign({},SEED.design,DATA.design||{});if(!Array.isArray(DATA.deletedIds))DATA.deletedIds=[];selIds=null;await saveAll();applyLang();applyDesign();alert(t("imported"));renderSet();}catch(e){alert(t("badFile"));}};r.readAsText(f);};
  $("#reset").onclick=async()=>{if(!confirm(t("confirmReset")))return;DATA=JSON.parse(JSON.stringify(SEED));selIds=null;await saveAll();applyLang();applyDesign();renderSet();};
}
init();
setTimeout(cloudSync,500);
setTimeout(startCloudStream,1500);
setInterval(cloudSync,15000); // فحص دوري خفيف كخطّة بديلة لو انقطع SSE
</script>
